<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<base href="amsterdam/"/>
<title>AI Interview Knowledge Hub</title>
<link href="assets/amsterdam-favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="assets/site.css" rel="stylesheet"/>
</head>
<body>
<div class="app-shell">
<aside class="library">
<div class="brand">
<div aria-label="Amsterdam AI Infra logo" class="brand-logo amsterdam-logo">
<span>A</span>
</div>
<div>
<div class="eyebrow">Study Workspace</div>
<h1>AI Interview Knowledge Hub</h1>
<p>Project stories, architecture references, tech stack depth, and paper notes in one reading surface.</p>
</div>
</div>
<nav aria-label="Documents" class="doc-list" id="docList"></nav>
</aside>
<main class="reader">
<section class="reader-top">
<div class="reader-hero">
<div class="reader-title-block">
<div class="kicker" id="activeGroup">Knowledge Map</div>
<h2 id="activeTitle">Choose a document</h2>
<p id="activeSubtitle">Start from a learning path or open any document from the library.</p>
</div>

</div>
</section>
<section class="frame-wrap">
<div class="frame-toolbar">
<span class="live-dot"></span>
<span id="readerMode">Reader Console</span>
<span class="toolbar-spacer"></span>
<span id="readerTags"></span>
</div>
<iframe id="readerFrame" src="html/amsterdam-project1.html" title="Study document"></iframe>
</section>
</main>
</div>
<script src="assets/data.js"></script>
<script src="assets/site.js"></script>
</body>
</html>
