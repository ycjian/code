<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<base href="study-website/"/>
<title>MMM Interview Command Center</title>
<link href="moveworks/assets/moveworks-favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="moveworks/assets/site.css" rel="stylesheet"/>
</head>
<body>
<div class="app-shell">
<aside class="library">
<div class="brand">
<div aria-label="MMM prep logo" class="brand-logo moveworks-logo">
<span>MW</span>
</div>
<div>
<div class="eyebrow">Interview Workspace</div>
<h1>MMM Command Center</h1>
<p>Search platform, GenAI, ML infra, coding, recruiter, and adjacent prep in one focused reader.</p>
</div>
</div>
<nav aria-label="Documents" class="doc-list" id="docList"></nav>
</aside>
<main class="reader">
<section class="reader-top">
<div class="reader-hero">
<div class="reader-title-block">
<div class="kicker" id="activeGroup">MMM Prep</div>
<h2 id="activeTitle">Choose a document</h2>
<p id="activeSubtitle">Open a source from the left rail. Every source file has a rendered reading page and a source link.</p>
</div>

</div>
</section>
<section class="frame-wrap">
<div class="frame-toolbar">
<span class="live-dot"></span>
<span id="readerMode">Interview Console</span>
<span class="toolbar-spacer"></span>
<span id="readerTags"></span>
</div>
<iframe id="readerFrame" src="moveworks/docs/moveworks.html" title="MMM study document"></iframe>
</section>
</main>
</div>
<script src="moveworks/assets/data.js"></script>
<script src="moveworks/assets/site-root.js"></script>
</body>
</html>
