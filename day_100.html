## 986. Interval List Intersections (Interval List Intersections)
**Difficulty**: medium | **Key Concept**: two pointers, intervals

**Original Problem**:
Given two sorted lists of disjoint intervals, return their intersections.  
中文翻译：给定两个有序且各自不重叠的区间列表，返回所有交集区间。

**Example**:
Input: firstList = [[0,2],[5,10]], secondList = [[1,5],[8,12]]  
Output: [[1,2],[5,5],[8,10]]

```java
class Solution {
  public int[][] intervalIntersection(int[][] firstList, int[][] secondList) {
    List<int[]> ans = new ArrayList<>();
    int i = 0;
    int j = 0;
    while (i < firstList.length && j < secondList.length) {
      int start = Math.max(firstList[i][0], secondList[j][0]);
      int end = Math.min(firstList[i][1], secondList[j][1]);
      if (start <= end) ans.add(new int[]{start, end});
      if (firstList[i][1] < secondList[j][1]) i++;
      else j++;
    }
    return ans.toArray(new int[ans.size()][]);
  }
}
```

Explanation:
- 两个区间的交集左端取较大值，右端取较小值。
- 谁的结束更早，谁就不可能再和后面的当前区间相交，移动谁。

## 40. Combination Sum II (Combination Sum II)
**Difficulty**: medium | **Key Concept**: backtracking, sorting

**Original Problem**:
Find unique combinations where candidates sum to target; each number may be used once.  
中文翻译：找出和为 `target` 的所有不重复组合，每个候选数字最多使用一次。

**Example**:
Input: candidates = [10,1,2,7,6,1,5], target = 8  
Output: [[1,1,6],[1,2,5],[1,7],[2,6]]

```java
class Solution {
  public List<List<Integer>> combinationSum2(int[] candidates, int target) {
    Arrays.sort(candidates);
    List<List<Integer>> ans = new ArrayList<>();
    backtrack(candidates, target, 0, new ArrayList<>(), ans);
    return ans;
  }

  private void backtrack(int[] nums, int remain, int start, List<Integer> path, List<List<Integer>> ans) {
    if (remain == 0) {
      ans.add(new ArrayList<>(path));
      return;
    }
    for (int i = start; i < nums.length && nums[i] <= remain; i++) {
      if (i > start && nums[i] == nums[i - 1]) continue;
      path.add(nums[i]);
      backtrack(nums, remain - nums[i], i + 1, path, ans);
      path.remove(path.size() - 1);
    }
  }
}
```

Explanation:
- 排序后可以剪枝，并让相同数字相邻方便去重。
- 同一层递归跳过重复数字，避免生成相同组合。

## 17. Letter Combinations of a Phone Number (Letter Combinations of a Phone Number)
**Difficulty**: medium | **Key Concept**: backtracking, string

**Original Problem**:
Given digits from `2` to `9`, return all possible letter combinations they could represent on a phone keypad.  
中文翻译：给定 `2` 到 `9` 的数字字符串，返回电话键盘上可能表示的所有字母组合。

**Example**:
Input: digits = "23"  
Output: ["ad","ae","af","bd","be","bf","cd","ce","cf"]

```java
class Solution {
  private String[] map = {"", "", "abc", "def", "ghi", "jkl", "mno", "pqrs", "tuv", "wxyz"};

  public List<String> letterCombinations(String digits) {
    List<String> ans = new ArrayList<>();
    if (digits.isEmpty()) return ans;
    backtrack(digits, 0, new StringBuilder(), ans);
    return ans;
  }

  private void backtrack(String digits, int idx, StringBuilder path, List<String> ans) {
    if (idx == digits.length()) {
      ans.add(path.toString());
      return;
    }
    String letters = map[digits.charAt(idx) - '0'];
    for (char ch : letters.toCharArray()) {
      path.append(ch);
      backtrack(digits, idx + 1, path, ans);
      path.deleteCharAt(path.length() - 1);
    }
  }
}
```

Explanation:
- 每个数字对应一组字母，问题就是逐位选择字母。
- 回溯路径长度等于数字长度时，得到一个完整组合。

## 516. Longest Palindromic Subsequence (Longest Palindromic Subsequence)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Given a string, return the length of its longest palindromic subsequence.  
中文翻译：给定字符串，返回最长回文子序列的长度。

**Example**:
Input: s = "bbbab"  
Output: 4

```java
class Solution {
  public int longestPalindromeSubseq(String s) {
    int n = s.length();
    int[][] dp = new int[n][n];
    for (int i = n - 1; i >= 0; i--) {
      dp[i][i] = 1;
      for (int j = i + 1; j < n; j++) {
        if (s.charAt(i) == s.charAt(j)) dp[i][j] = dp[i + 1][j - 1] + 2;
        else dp[i][j] = Math.max(dp[i + 1][j], dp[i][j - 1]);
      }
    }
    return dp[0][n - 1];
  }
}
```

Explanation:
- `dp[i][j]` 表示子串 `s[i..j]` 的最长回文子序列长度。
- 两端相等就向内加 2，否则取去掉左端或右端的较大值。

## 381. Insert Delete GetRandom O(1) - Duplicates allowed (Insert Delete GetRandom O(1) - Duplicates allowed)
**Difficulty**: hard | **Key Concept**: design, hashmap, random

**Original Problem**:
Design a collection that supports insert, remove, and getRandom in average `O(1)`, allowing duplicates.  
中文翻译：设计允许重复元素的集合，支持平均 `O(1)` 插入、删除和随机返回元素。

**Example**:
Input: ["RandomizedCollection","insert","insert","insert","getRandom","remove","getRandom"]  
Output: [null,true,false,true,random,true,random]

```java
class RandomizedCollection {
  private List<Integer> nums = new ArrayList<>();
  private Map<Integer, Set<Integer>> map = new HashMap<>();
  private Random rand = new Random();

  public boolean insert(int val) {
    boolean fresh = !map.containsKey(val) || map.get(val).isEmpty();
    map.computeIfAbsent(val, x -> new HashSet<>()).add(nums.size());
    nums.add(val);
    return fresh;
  }

  public boolean remove(int val) {
    if (!map.containsKey(val) || map.get(val).isEmpty()) return false;
    int idx = map.get(val).iterator().next();
    int last = nums.get(nums.size() - 1);
    map.get(val).remove(idx);
    nums.set(idx, last);
    map.get(last).add(idx);
    map.get(last).remove(nums.size() - 1);
    nums.remove(nums.size() - 1);
    return true;
  }

  public int getRandom() {
    return nums.get(rand.nextInt(nums.size()));
  }
}
```

Explanation:
- 数组支持 `O(1)` 随机访问，哈希表记录每个值出现的所有下标。
- 删除时把末尾元素换到被删位置，并同步更新下标集合。

## 53. Maximum Subarray (Maximum Subarray)
**Difficulty**: medium | **Key Concept**: dynamic programming, array

**Original Problem**:
Given an integer array, find the contiguous subarray with the largest sum and return that sum.  
中文翻译：给定整数数组，找到和最大的连续子数组，并返回该最大和。

**Example**:
Input: nums = [-2,1,-3,4,-1,2,1,-5,4]  
Output: 6

```java
class Solution {
  public int maxSubArray(int[] nums) {
    int cur = nums[0];
    int ans = nums[0];
    for (int i = 1; i < nums.length; i++) {
      cur = Math.max(nums[i], cur + nums[i]);
      ans = Math.max(ans, cur);
    }
    return ans;
  }
}
```

Explanation:
- `cur` 表示必须以当前位置结尾的最大子数组和。
- 当前数要么接在前面子数组后面，要么自己重新开始。

## 380. Insert Delete GetRandom O(1) (Insert Delete GetRandom O(1))
**Difficulty**: medium | **Key Concept**: design, hashmap, random

**Original Problem**:
Design a set supporting insert, remove, and getRandom in average `O(1)` time.

**Example**:
Input: ["RandomizedSet","insert","remove","insert","getRandom","remove","insert","getRandom"]  
Output: [null,true,false,true,2,true,false,2]

```java
class RandomizedSet {
  private List<Integer> nums = new ArrayList<>();
  private Map<Integer, Integer> idx = new HashMap<>();
  private Random rand = new Random();

  public boolean insert(int val) {
    if (idx.containsKey(val)) return false;
    idx.put(val, nums.size());
    nums.add(val);
    return true;
  }

  public boolean remove(int val) {
    if (!idx.containsKey(val)) return false;
    int i = idx.get(val);
    int last = nums.get(nums.size() - 1);
    nums.set(i, last);
    idx.put(last, i);
    nums.remove(nums.size() - 1);
    idx.remove(val);
    return true;
  }

  public int getRandom() {
    return nums.get(rand.nextInt(nums.size()));
  }
}
```

Explanation:
- 数组支持随机访问，哈希表保存值到数组下标的映射。

## 34. Find First and Last Position of Element in Sorted Array (Find First and Last Position of Element in Sorted Array)
**Difficulty**: medium | **Key Concept**: binary search

**Original Problem**:
Given a sorted array, return the first and last index of `target`, or `[-1,-1]` if absent.  
中文翻译：给定有序数组，返回 `target` 第一次和最后一次出现的位置，不存在则返回 `[-1,-1]`。

**Example**:
Input: nums = [5,7,7,8,8,10], target = 8  
Output: [3,4]

```java
class Solution {
  public int[] searchRange(int[] nums, int target) {
    int left = lowerBound(nums, target);
    int right = upperBound(nums, target) - 1;
    if (left == nums.length || nums[left] != target) return new int[]{-1, -1};
    return new int[]{left, right};
  }

  private int lowerBound(int[] nums, int target) {
    int l = 0;
    int r = nums.length;
    while (l < r) {
      int m = l + (r - l) / 2;
      if (nums[m] < target) l = m + 1;
      else r = m;
    }
    return l;
  }

  private int upperBound(int[] nums, int target) {
    int l = 0;
    int r = nums.length;
    while (l < r) {
      int m = l + (r - l) / 2;
      if (nums[m] <= target) l = m + 1;
      else r = m;
    }
    return l;
  }
}
```

Explanation:
- 第一个位置是 `target` 的 lower bound。
- 最后一个位置是第一个 `> target` 的位置减一。

## 152. Maximum Product Subarray (Maximum Product Subarray)
**Difficulty**: medium | **Key Concept**: dynamic programming, array

**Original Problem**:
Given an integer array, return the largest product of a contiguous subarray.  
中文翻译：给定整数数组，返回连续子数组乘积的最大值。

**Example**:
Input: nums = [2,3,-2,4]  
Output: 6

```java
class Solution {
  public int maxProduct(int[] nums) {
    int max = nums[0];
    int min = nums[0];
    int ans = nums[0];
    for (int i = 1; i < nums.length; i++) {
      int x = nums[i];
      if (x < 0) {
        int t = max;
        max = min;
        min = t;
      }
      max = Math.max(x, max * x);
      min = Math.min(x, min * x);
      ans = Math.max(ans, max);
    }
    return ans;
  }
}
```

Explanation:
- 负数会让最大乘积和最小乘积互换角色。
- 同时维护以当前位置结尾的最大值和最小值。

## 127. Word Ladder (Word Ladder)
**Difficulty**: hard | **Key Concept**: BFS, graph

**Original Problem**:
Transform `beginWord` to `endWord` by changing one letter at a time, where every intermediate word must be in the word list. Return the shortest length.  
中文翻译：每次改变一个字母，把 `beginWord` 转成 `endWord`，中间单词必须在词表中，返回最短转换长度。

**Example**:
Input: beginWord = "hit", endWord = "cog", wordList = ["hot","dot","dog","lot","log","cog"]  
Output: 5

```java
class Solution {
  public int ladderLength(String beginWord, String endWord, List<String> wordList) {
    Set<String> dict = new HashSet<>(wordList);
    if (!dict.contains(endWord)) return 0;
    Queue<String> q = new ArrayDeque<>();
    q.offer(beginWord);
    int steps = 1;
    while (!q.isEmpty()) {
      for (int size = q.size(); size > 0; size--) {
        String cur = q.poll();
        if (cur.equals(endWord)) return steps;
        char[] arr = cur.toCharArray();
        for (int i = 0; i < arr.length; i++) {
          char old = arr[i];
          for (char ch = 'a'; ch <= 'z'; ch++) {
            arr[i] = ch;
            String next = new String(arr);
            if (dict.remove(next)) q.offer(next);
          }
          arr[i] = old;
        }
      }
      steps++;
    }
    return 0;
  }
}
```

Explanation:
- 每个单词看作图节点，相差一个字母的单词之间有边。
- BFS 第一次到达 `endWord` 时就是最短转换长度。

## 20. Valid Parentheses (Valid Parentheses)
**Difficulty**: easy | **Key Concept**: stack, string

**Original Problem**:
Given a string containing brackets, determine whether every opening bracket is closed in the correct order.  
中文翻译：给定只含括号的字符串，判断每个左括号是否按正确顺序闭合。

**Example**:
Input: s = "()[]{}"  
Output: true

```java
class Solution {
  public boolean isValid(String s) {
    Deque<Character> stack = new ArrayDeque<>();
    for (char ch : s.toCharArray()) {
      if (ch == '(') stack.push(')');
      else if (ch == '[') stack.push(']');
      else if (ch == '{') stack.push('}');
      else if (stack.isEmpty() || stack.pop() != ch) return false;
    }
    return stack.isEmpty();
  }
}
```

Explanation:
- 遇到左括号时，把期待的右括号压入栈。
- 遇到右括号时必须匹配栈顶，最后栈也必须为空。

## 443. String Compression (String Compression)
**Difficulty**: medium | **Key Concept**: two pointers, string

**Original Problem**:
Compress consecutive repeated characters in place and return the new length.  
中文翻译：原地压缩连续重复字符，并返回压缩后的新长度。

**Example**:
Input: chars = ["a","a","b","b","c","c","c"]  
Output: 6

```java
class Solution {
  public int compress(char[] chars) {
    int write = 0;
    for (int i = 0; i < chars.length;) {
      char ch = chars[i];
      int j = i;
      while (j < chars.length && chars[j] == ch) j++;
      chars[write++] = ch;
      int count = j - i;
      if (count > 1) {
        for (char d : String.valueOf(count).toCharArray()) chars[write++] = d;
      }
      i = j;
    }
    return write;
  }
}
```

Explanation:
- 双指针找到每段连续相同字符的范围。
- 写指针原地写入字符和出现次数，次数为 1 时不写数字。

## 560. Subarray Sum Equals K (Subarray Sum Equals K)
**Difficulty**: medium | **Key Concept**: prefix sum, hashmap

**Original Problem**:
Given an integer array and `k`, return the number of continuous subarrays whose sum equals `k`.  
中文翻译：给定整数数组和 `k`，返回和等于 `k` 的连续子数组个数。

**Example**:
Input: nums = [1,1,1], k = 2  
Output: 2

```java
class Solution {
  public int subarraySum(int[] nums, int k) {
    Map<Integer, Integer> count = new HashMap<>();
    count.put(0, 1);
    int sum = 0;
    int ans = 0;
    for (int x : nums) {
      sum += x;
      ans += count.getOrDefault(sum - k, 0);
      count.put(sum, count.getOrDefault(sum, 0) + 1);
    }
    return ans;
  }
}
```

Explanation:
- 若当前前缀和为 `sum`，需要之前出现过 `sum - k`。
- 哈希表记录每个前缀和出现次数，可处理负数。

## 142. Linked List Cycle II (Linked List Cycle II)
**Difficulty**: medium | **Key Concept**: linked list, two pointers

**Original Problem**:
Given a linked list, return the node where the cycle begins, or `null` if there is no cycle.  
中文翻译：给定链表，返回环开始的节点；如果没有环，返回 `null`。

**Example**:
Input: head = [3,2,0,-4], pos = 1  
Output: node with value 2

```java
public class Solution {
  public ListNode detectCycle(ListNode head) {
    ListNode slow = head;
    ListNode fast = head;
    while (fast != null && fast.next != null) {
      slow = slow.next;
      fast = fast.next.next;
      if (slow == fast) {
        ListNode p = head;
        while (p != slow) {
          p = p.next;
          slow = slow.next;
        }
        return p;
      }
    }
    return null;
  }
}
```

Explanation:
- 快慢指针相遇说明有环。
- 相遇后一个指针从头出发、一个从相遇点出发，再相遇处就是入环点。

## 480. Sliding Window Median (Sliding Window Median)
**Difficulty**: hard | **Key Concept**: sliding window, heap

**Original Problem**:
Given an array and window size `k`, return the median of every sliding window.  
中文翻译：给定数组和窗口大小 `k`，返回每个滑动窗口的中位数。

**Example**:
Input: nums = [1,3,-1,-3,5,3,6,7], k = 3  
Output: [1.00000,-1.00000,-1.00000,3.00000,5.00000,6.00000]

```java
class Solution {
  private PriorityQueue<Integer> small = new PriorityQueue<>((a, b) -> Integer.compare(b, a));
  private PriorityQueue<Integer> large = new PriorityQueue<>();
  private Map<Integer, Integer> delayed = new HashMap<>();
  private int smallSize = 0;
  private int largeSize = 0;

  public double[] medianSlidingWindow(int[] nums, int k) {
    double[] ans = new double[nums.length - k + 1];
    for (int i = 0; i < nums.length; i++) {
      add(nums[i]);
      if (i >= k) remove(nums[i - k]);
      if (i >= k - 1) ans[i - k + 1] = median(k);
    }
    return ans;
  }

  private void add(int x) {
    if (small.isEmpty() || x <= small.peek()) {
      small.offer(x);
      smallSize++;
    } else {
      large.offer(x);
      largeSize++;
    }
    balance();
  }

  private void remove(int x) {
    delayed.put(x, delayed.getOrDefault(x, 0) + 1);
    if (x <= small.peek()) smallSize--;
    else largeSize--;
    prune(small);
    prune(large);
    balance();
  }

  private double median(int k) {
    return k % 2 == 1 ? small.peek() : ((long) small.peek() + large.peek()) / 2.0;
  }

  private void balance() {
    if (smallSize > largeSize + 1) {
      large.offer(small.poll());
      smallSize--;
      largeSize++;
      prune(small);
    } else if (smallSize < largeSize) {
      small.offer(large.poll());
      largeSize--;
      smallSize++;
      prune(large);
    }
  }

  private void prune(PriorityQueue<Integer> heap) {
    while (!heap.isEmpty() && delayed.getOrDefault(heap.peek(), 0) > 0) {
      int x = heap.poll();
      delayed.put(x, delayed.get(x) - 1);
    }
  }
}
```

Explanation:
- 双堆维护窗口较小一半和较大一半，堆顶即可得到中位数。
- Java 堆不支持任意删除，用延迟删除表在元素到堆顶时清理。

## 5. Longest Palindromic Substring (Longest Palindromic Substring)
**Difficulty**: medium | **Key Concept**: string, two pointers

**Original Problem**:
Given a string, return its longest palindromic substring.  
中文翻译：给定字符串，返回最长回文子串。

**Example**:
Input: s = "babad"  
Output: "bab"

```java
class Solution {
  private int start = 0;
  private int len = 0;

  public String longestPalindrome(String s) {
    for (int i = 0; i < s.length(); i++) {
      expand(s, i, i);
      expand(s, i, i + 1);
    }
    return s.substring(start, start + len);
  }

  private void expand(String s, int l, int r) {
    while (l >= 0 && r < s.length() && s.charAt(l) == s.charAt(r)) {
      l--;
      r++;
    }
    if (r - l - 1 > len) {
      start = l + 1;
      len = r - l - 1;
    }
  }
}
```

Explanation:
- 每个位置都可以作为奇数或偶数长度回文中心。
- 从中心向两边扩展，记录最长合法范围。

## 1207. Unique Number of Occurrences (Unique Number of Occurrences)

```java
class Solution {
  public boolean uniqueOccurrences(int[] arr) {
    Map<Integer, Integer> count = new HashMap<>();
    for (int x : arr) count.put(x, count.getOrDefault(x, 0) + 1);
    Set<Integer> seen = new HashSet<>();
    for (int c : count.values()) {
      if (!seen.add(c)) return false;
    }
    return true;
  }
}
```

Explanation:
- 先用哈希表统计每个数字出现次数。
- 再把次数放入集合，若插入失败说明有重复次数。

## 1071. Greatest Common Divisor of Strings (Greatest Common Divisor of Strings)
**Difficulty**: easy | **Key Concept**: string, math

**Original Problem**:
Return the largest string that can repeatedly concatenate to form both input strings.  
中文翻译：返回能通过重复拼接形成两个输入字符串的最长字符串。

**Example**:
Input: str1 = "ABCABC", str2 = "ABC"  
Output: "ABC"

```java
class Solution {
  public String gcdOfStrings(String str1, String str2) {
    if (!(str1 + str2).equals(str2 + str1)) return "";
    int len = gcd(str1.length(), str2.length());
    return str1.substring(0, len);
  }

  private int gcd(int a, int b) {
    return b == 0 ? a : gcd(b, a % b);
  }
}
```

Explanation:
- 如果两个字符串有共同模式，则拼接顺序 `str1+str2` 和 `str2+str1` 相同。
- 最大模式长度就是两个字符串长度的最大公约数。

## 211. Design Add and Search Words Data Structure (Design Add and Search Words Data Structure)
**Difficulty**: medium | **Key Concept**: trie, DFS

**Original Problem**:
Design a data structure that supports adding words and searching words where `.` can match any letter.  
中文翻译：设计数据结构，支持添加单词，以及带 `.` 通配符的单词搜索。

**Example**:
Input: ["WordDictionary","addWord","addWord","addWord","search","search","search","search"]  
Output: [null,null,null,null,false,true,true,true]

```java
class WordDictionary {
  class Node {
    Node[] next = new Node[26];
    boolean word;
  }

  private Node root = new Node();

  public void addWord(String word) {
    Node cur = root;
    for (char ch : word.toCharArray()) {
      int i = ch - 'a';
      if (cur.next[i] == null) cur.next[i] = new Node();
      cur = cur.next[i];
    }
    cur.word = true;
  }

  public boolean search(String word) {
    return dfs(word, 0, root);
  }

  private boolean dfs(String word, int idx, Node node) {
    if (node == null) return false;
    if (idx == word.length()) return node.word;
    char ch = word.charAt(idx);
    if (ch != '.') return dfs(word, idx + 1, node.next[ch - 'a']);
    for (Node next : node.next) {
      if (dfs(word, idx + 1, next)) return true;
    }
    return false;
  }
}
```

Explanation:
- Trie 适合保存单词前缀结构。
- 搜索遇到普通字符走固定分支，遇到 `.` 就尝试所有子分支。

## 322. Coin Change (Coin Change)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Given coin denominations and an amount, return the fewest coins needed to make the amount, or `-1`.  
中文翻译：给定硬币面额和目标金额，返回凑成该金额所需的最少硬币数，无法凑成则返回 `-1`。

**Example**:
Input: coins = [1,2,5], amount = 11  
Output: 3

```java
class Solution {
  public int coinChange(int[] coins, int amount) {
    int[] dp = new int[amount + 1];
    Arrays.fill(dp, amount + 1);
    dp[0] = 0;
    for (int a = 1; a <= amount; a++) {
      for (int coin : coins) {
        if (a >= coin) dp[a] = Math.min(dp[a], dp[a - coin] + 1);
      }
    }
    return dp[amount] > amount ? -1 : dp[amount];
  }
}
```

Explanation:
- `dp[a]` 表示凑出金额 `a` 的最少硬币数。
- 枚举最后一枚硬币，从 `dp[a - coin] + 1` 转移。

## 403. Frog Jump (Frog Jump)
**Difficulty**: hard | **Key Concept**: dynamic programming, hashmap

**Original Problem**:
A frog crosses stones by jumping `k-1`, `k`, or `k+1` units after a previous jump of `k`. Determine if it can reach the last stone.  
中文翻译：青蛙上一次跳了 `k`，下一次可跳 `k-1`、`k` 或 `k+1`，判断能否到达最后一块石头。

**Example**:
Input: stones = [0,1,3,5,6,8,12,17]  
Output: true

```java
class Solution {
  public boolean canCross(int[] stones) {
    Map<Integer, Set<Integer>> dp = new HashMap<>();
    for (int s : stones) dp.put(s, new HashSet<>());
    dp.get(0).add(0);
    for (int s : stones) {
      for (int k : dp.get(s)) {
        for (int step = k - 1; step <= k + 1; step++) {
          if (step > 0 && dp.containsKey(s + step)) dp.get(s + step).add(step);
        }
      }
    }
    return !dp.get(stones[stones.length - 1]).isEmpty();
  }
}
```

Explanation:
- `dp[stone]` 保存能到达该石头时的所有上一跳长度。
- 从每个状态尝试 `k-1/k/k+1`，能落到石头上就加入状态。

## 1942. The Number of the Smallest Unoccupied Chair (The Number of the Smallest Unoccupied Chair)
**Difficulty**: medium | **Key Concept**: heap, simulation

**Original Problem**:
Friends arrive and leave at given times, always taking the smallest available chair. Return the chair number for the target friend.  
中文翻译：朋友按时间到达和离开，总是坐编号最小的空椅子，返回目标朋友坐的椅子编号。

**Example**:
Input: times = [[1,4],[2,3],[4,6]], targetFriend = 1  
Output: 1

```java
class Solution {
  public int smallestChair(int[][] times, int targetFriend) {
    int n = times.length;
    int[][] arr = new int[n][3];
    for (int i = 0; i < n; i++) arr[i] = new int[]{times[i][0], times[i][1], i};
    Arrays.sort(arr, (a, b) -> a[0] - b[0]);
    PriorityQueue<Integer> free = new PriorityQueue<>();
    PriorityQueue<int[]> busy = new PriorityQueue<>((a, b) -> a[0] - b[0]);
    for (int i = 0; i < n; i++) free.offer(i);
    for (int[] f : arr) {
      while (!busy.isEmpty() && busy.peek()[0] <= f[0]) free.offer(busy.poll()[1]);
      int chair = free.poll();
      if (f[2] == targetFriend) return chair;
      busy.offer(new int[]{f[1], chair});
    }
    return -1;
  }
}
```

Explanation:
- 空椅子用小根堆保证拿到最小编号。
- 忙碌椅子按离开时间排序，到达前先释放已经离开的椅子。

## 33. Search in Rotated Sorted Array (Search in Rotated Sorted Array)
**Difficulty**: medium | **Key Concept**: binary search

**Original Problem**:
Search for `target` in a rotated sorted array with distinct values, returning its index or `-1`.  
中文翻译：在无重复值的旋转有序数组中查找 `target`，返回下标或 `-1`。

**Example**:
Input: nums = [4,5,6,7,0,1,2], target = 0  
Output: 4

```java
class Solution {
  public int search(int[] nums, int target) {
    int l = 0;
    int r = nums.length - 1;
    while (l <= r) {
      int m = l + (r - l) / 2;
      if (nums[m] == target) return m;
      if (nums[l] <= nums[m]) {
        if (nums[l] <= target && target < nums[m]) r = m - 1;
        else l = m + 1;
      } else {
        if (nums[m] < target && target <= nums[r]) l = m + 1;
        else r = m - 1;
      }
    }
    return -1;
  }
}
```

Explanation:
- 旋转数组中，每次二分至少有一半是有序的。
- 判断目标是否落在有序半边，决定保留哪一侧。

## 36. Valid Sudoku (Valid Sudoku)
**Difficulty**: medium | **Key Concept**: matrix, hashset

**Original Problem**:
Determine whether a partially filled 9x9 Sudoku board is valid.  
中文翻译：判断一个部分填充的 `9x9` 数独棋盘当前是否有效。

**Example**:
Input: board = [["5","3",".",".","7",".",".",".","."],["6",".",".","1","9","5",".",".","."],[".","9","8",".",".",".",".","6","."],["8",".",".",".","6",".",".",".","3"],["4",".",".","8",".","3",".",".","1"],["7",".",".",".","2",".",".",".","6"],[".","6",".",".",".",".","2","8","."],[".",".",".","4","1","9",".",".","5"],[".",".",".",".","8",".",".","7","9"]]  
Output: true

```java
class Solution {
  public boolean isValidSudoku(char[][] board) {
    boolean[][] rows = new boolean[9][9];
    boolean[][] cols = new boolean[9][9];
    boolean[][] boxes = new boolean[9][9];
    for (int r = 0; r < 9; r++) {
      for (int c = 0; c < 9; c++) {
        if (board[r][c] == '.') continue;
        int d = board[r][c] - '1';
        int b = r / 3 * 3 + c / 3;
        if (rows[r][d] || cols[c][d] || boxes[b][d]) return false;
        rows[r][d] = true;
        cols[c][d] = true;
        boxes[b][d] = true;
      }
    }
    return true;
  }
}
```

Explanation:
- 每个数字在同一行、同一列、同一个 `3x3` 宫内都不能重复。
- 用三个布尔数组分别记录行、列、宫是否已出现某数字。

## 57. Insert Interval (Insert Interval)
**Difficulty**: medium | **Key Concept**: intervals, array

**Original Problem**:
Given sorted non-overlapping intervals and a new interval, insert it and merge if necessary.  
中文翻译：给定按起点排序且互不重叠的区间，以及一个新区间，插入后合并必要的重叠区间。

**Example**:
Input: intervals = [[1,3],[6,9]], newInterval = [2,5]  
Output: [[1,5],[6,9]]

```java
class Solution {
  public int[][] insert(int[][] intervals, int[] newInterval) {
    List<int[]> ans = new ArrayList<>();
    int i = 0;
    while (i < intervals.length && intervals[i][1] < newInterval[0]) ans.add(intervals[i++]);
    while (i < intervals.length && intervals[i][0] <= newInterval[1]) {
      newInterval[0] = Math.min(newInterval[0], intervals[i][0]);
      newInterval[1] = Math.max(newInterval[1], intervals[i][1]);
      i++;
    }
    ans.add(newInterval);
    while (i < intervals.length) ans.add(intervals[i++]);
    return ans.toArray(new int[ans.size()][]);
  }
}
```

Explanation:
- 先加入所有完全在新区间左侧的区间。
- 中间重叠部分不断扩展新区间，最后加入右侧剩余区间。

## 617. Merge Two Binary Trees (Merge Two Binary Trees)
**Difficulty**: easy | **Key Concept**: tree, DFS

**Original Problem**:
Merge two binary trees by summing overlapping nodes and keeping non-null nodes.  
中文翻译：合并两棵二叉树，重叠节点值相加，非空节点直接保留。

**Example**:
Input: root1 = [1,3,2,5], root2 = [2,1,3,null,4,null,7]  
Output: [3,4,5,5,4,null,7]

```java
class Solution {
  public TreeNode mergeTrees(TreeNode root1, TreeNode root2) {
    if (root1 == null) return root2;
    if (root2 == null) return root1;
    root1.val += root2.val;
    root1.left = mergeTrees(root1.left, root2.left);
    root1.right = mergeTrees(root1.right, root2.right);
    return root1;
  }
}
```

Explanation:
- 递归处理左右子树，遇到空节点直接返回另一棵树节点。
- 原地修改 `root1`，代码更简洁，空间也更省。

## 215. Kth Largest Element in an Array (Kth Largest Element in an Array)
**Difficulty**: medium | **Key Concept**: heap, quickselect

**Original Problem**:
Given an integer array, return the kth largest element, not the kth distinct element.  
中文翻译：给定整数数组，返回第 `k` 大的元素，重复元素按出现次数计算。

**Example**:
Input: nums = [3,2,1,5,6,4], k = 2  
Output: 5

```java
class Solution {
  public int findKthLargest(int[] nums, int k) {
    PriorityQueue<Integer> pq = new PriorityQueue<>();
    for (int x : nums) {
      pq.offer(x);
      if (pq.size() > k) pq.poll();
    }
    return pq.peek();
  }
}
```

Explanation:
- 用大小为 `k` 的小根堆保留当前最大的 `k` 个数。
- 堆顶就是这 `k` 个数里最小的，也就是全局第 `k` 大。

## 680. Valid Palindrome II (Valid Palindrome II)
**Difficulty**: easy | **Key Concept**: two pointers, string

**Original Problem**:
Return whether a string can become a palindrome after deleting at most one character.  
中文翻译：判断字符串最多删除一个字符后，能否变成回文串。

**Example**:
Input: s = "abca"  
Output: true

```java
class Solution {
  public boolean validPalindrome(String s) {
    int l = 0;
    int r = s.length() - 1;
    while (l < r) {
      if (s.charAt(l) != s.charAt(r)) return check(s, l + 1, r) || check(s, l, r - 1);
      l++;
      r--;
    }
    return true;
  }

  private boolean check(String s, int l, int r) {
    while (l < r) {
      if (s.charAt(l++) != s.charAt(r--)) return false;
    }
    return true;
  }
}
```

Explanation:
- 双指针正常比较，第一次不匹配时只能删除左边或右边一个字符。
- 删除后剩余区间必须是普通回文。

## 543. Diameter of Binary Tree (Diameter of Binary Tree)
**Difficulty**: easy | **Key Concept**: tree, DFS

**Original Problem**:
Return the length of the longest path between any two nodes in a binary tree.  
中文翻译：返回二叉树中任意两个节点之间最长路径的边数。

**Example**:
Input: root = [1,2,3,4,5]  
Output: 3

```java
class Solution {
  private int ans = 0;

  public int diameterOfBinaryTree(TreeNode root) {
    depth(root);
    return ans;
  }

  private int depth(TreeNode node) {
    if (node == null) return 0;
    int left = depth(node.left);
    int right = depth(node.right);
    ans = Math.max(ans, left + right);
    return Math.max(left, right) + 1;
  }
}
```

Explanation:
- 每个节点作为路径最高点时，直径候选为左深度加右深度。
- DFS 返回当前节点向下能延伸的最大深度。

## 981. Time Based Key-Value Store (Time Based Key-Value Store)
**Difficulty**: medium | **Key Concept**: hashmap, binary search, design

**Original Problem**:
Design a key-value store that can return the value for a key at the greatest timestamp not exceeding the query timestamp.  
中文翻译：设计按时间存储的键值表，查询时返回不超过指定时间戳的最近值。

**Example**:
Input: ["TimeMap","set","get","get","set","get","get"]  
Output: [null,null,"bar","bar",null,"bar2","bar2"]

```java
class TimeMap {
  class Pair {
    int time;
    String val;

    Pair(int time, String val) {
      this.time = time;
      this.val = val;
    }
  }

  private Map<String, List<Pair>> map = new HashMap<>();

  public void set(String key, String value, int timestamp) {
    map.computeIfAbsent(key, x -> new ArrayList<>()).add(new Pair(timestamp, value));
  }

  public String get(String key, int timestamp) {
    List<Pair> list = map.get(key);
    if (list == null) return "";
    int l = 0;
    int r = list.size() - 1;
    String ans = "";
    while (l <= r) {
      int m = l + (r - l) / 2;
      if (list.get(m).time <= timestamp) {
        ans = list.get(m).val;
        l = m + 1;
      } else {
        r = m - 1;
      }
    }
    return ans;
  }
}
```

Explanation:
- 每个 key 的记录按时间戳递增存入列表。
- 查询时二分找最后一个 `time <= timestamp` 的记录。

## 29. Divide Two Integers (Divide Two Integers)
**Difficulty**: medium | **Key Concept**: math, bit manipulation

**Original Problem**:
Divide two integers without using multiplication, division, or modulo, and clamp overflow to 32-bit signed integer range.  
中文翻译：不使用乘法、除法和取模完成整数除法，溢出时按 32 位有符号整数范围处理。

**Example**:
Input: dividend = 10, divisor = 3  
Output: 3

```java
class Solution {
  public int divide(int dividend, int divisor) {
    if (dividend == Integer.MIN_VALUE && divisor == -1) return Integer.MAX_VALUE;
    long a = Math.abs((long) dividend);
    long b = Math.abs((long) divisor);
    int ans = 0;
    for (int i = 31; i >= 0; i--) {
      if ((a >> i) >= b) {
        ans += 1 << i;
        a -= b << i;
      }
    }
    return (dividend > 0) == (divisor > 0) ? ans : -ans;
  }
}
```

Explanation:
- 用位移寻找每次能减去的最大 `divisor * 2^i`。
- 先用 long 处理绝对值，最后根据符号决定正负。

## 528. Random Pick with Weight (Random Pick with Weight)
**Difficulty**: medium | **Key Concept**: prefix sum, binary search, random

**Original Problem**:
Given positive weights, randomly pick an index with probability proportional to its weight.  
中文翻译：给定正权重数组，按权重比例随机返回一个下标。

**Example**:
Input: ["Solution","pickIndex"] with [[[1,3]],[]]  
Output: [null,1]

```java
class Solution {
  private int[] pre;
  private Random rand = new Random();

  public Solution(int[] w) {
    pre = new int[w.length];
    pre[0] = w[0];
    for (int i = 1; i < w.length; i++) pre[i] = pre[i - 1] + w[i];
  }

  public int pickIndex() {
    int x = rand.nextInt(pre[pre.length - 1]) + 1;
    int l = 0;
    int r = pre.length - 1;
    while (l < r) {
      int m = l + (r - l) / 2;
      if (pre[m] < x) l = m + 1;
      else r = m;
    }
    return l;
  }
}
```

Explanation:
- 前缀和把权重区间映射成连续数字区间。
- 随机一个数字后，二分找到它落在哪个前缀区间。

## 427. Construct Quad Tree (Construct Quad Tree)
**Difficulty**: medium | **Key Concept**: recursion, matrix

**Original Problem**:
Construct a quad tree from an `n x n` binary grid.  
中文翻译：根据 `n x n` 二进制网格构造四叉树。

**Example**:
Input: grid = [[0,1],[1,0]]  
Output: quad tree root

```java
class Solution {
  public Node construct(int[][] grid) {
    return build(grid, 0, 0, grid.length);
  }

  private Node build(int[][] grid, int r, int c, int len) {
    if (same(grid, r, c, len)) return new Node(grid[r][c] == 1, true);
    int h = len / 2;
    Node node = new Node(true, false);
    node.topLeft = build(grid, r, c, h);
    node.topRight = build(grid, r, c + h, h);
    node.bottomLeft = build(grid, r + h, c, h);
    node.bottomRight = build(grid, r + h, c + h, h);
    return node;
  }

  private boolean same(int[][] grid, int r, int c, int len) {
    for (int i = r; i < r + len; i++) {
      for (int j = c; j < c + len; j++) {
        if (grid[i][j] != grid[r][c]) return false;
      }
    }
    return true;
  }
}
```

Explanation:
- 如果当前区域全是同一个值，就构造叶子节点。
- 否则把区域分成四个子方块递归构造。

## 974. Subarray Sums Divisible by K (Subarray Sums Divisible by K)
**Difficulty**: medium | **Key Concept**: prefix sum, hashmap

**Original Problem**:
Given an integer array and `k`, return the number of subarrays whose sum is divisible by `k`.  
中文翻译：给定整数数组和 `k`，返回和能被 `k` 整除的连续子数组个数。

**Example**:
Input: nums = [4,5,0,-2,-3,1], k = 5  
Output: 7

```java
class Solution {
  public int subarraysDivByK(int[] nums, int k) {
    int[] count = new int[k];
    count[0] = 1;
    int sum = 0;
    int ans = 0;
    for (int x : nums) {
      sum = ((sum + x) % k + k) % k;
      ans += count[sum];
      count[sum]++;
    }
    return ans;
  }
}
```

Explanation:
- 两个前缀和模 `k` 相同，它们之间的子数组和就能被 `k` 整除。
- 处理负数时要把模值调整到 `[0, k-1]`。

## 54. Spiral Matrix (Spiral Matrix)
**Difficulty**: medium | **Key Concept**: matrix, simulation

**Original Problem**:
Return all elements of a matrix in spiral order.  
中文翻译：按螺旋顺序返回矩阵中的所有元素。

**Example**:
Input: matrix = [[1,2,3],[4,5,6],[7,8,9]]  
Output: [1,2,3,6,9,8,7,4,5]

```java
class Solution {
  public List<Integer> spiralOrder(int[][] matrix) {
    List<Integer> ans = new ArrayList<>();
    int top = 0;
    int bottom = matrix.length - 1;
    int left = 0;
    int right = matrix[0].length - 1;
    while (top <= bottom && left <= right) {
      for (int c = left; c <= right; c++) ans.add(matrix[top][c]);
      top++;
      for (int r = top; r <= bottom; r++) ans.add(matrix[r][right]);
      right--;
      if (top <= bottom) {
        for (int c = right; c >= left; c--) ans.add(matrix[bottom][c]);
        bottom--;
      }
      if (left <= right) {
        for (int r = bottom; r >= top; r--) ans.add(matrix[r][left]);
        left++;
      }
    }
    return ans;
  }
}
```

Explanation:
- 用四个边界表示当前未遍历矩形。
- 每走完一条边就收缩对应边界，并注意单行或单列情况。

## 1438. Longest Continuous Subarray With Absolute Diff Less Than or Equal to Limit (Longest Continuous Subarray With Absolute Diff Less Than or Equal to Limit)
**Difficulty**: medium | **Key Concept**: sliding window, deque

**Original Problem**:
Return the length of the longest subarray where the absolute difference between any two elements is at most `limit`.  
中文翻译：返回最长连续子数组长度，使其中任意两个元素的绝对差不超过 `limit`。

**Example**:
Input: nums = [8,2,4,7], limit = 4  
Output: 2

```java
class Solution {
  public int longestSubarray(int[] nums, int limit) {
    Deque<Integer> maxQ = new ArrayDeque<>();
    Deque<Integer> minQ = new ArrayDeque<>();
    int left = 0;
    int ans = 0;
    for (int right = 0; right < nums.length; right++) {
      while (!maxQ.isEmpty() && nums[maxQ.peekLast()] < nums[right]) maxQ.pollLast();
      while (!minQ.isEmpty() && nums[minQ.peekLast()] > nums[right]) minQ.pollLast();
      maxQ.offerLast(right);
      minQ.offerLast(right);
      while (nums[maxQ.peekFirst()] - nums[minQ.peekFirst()] > limit) {
        if (maxQ.peekFirst() == left) maxQ.pollFirst();
        if (minQ.peekFirst() == left) minQ.pollFirst();
        left++;
      }
      ans = Math.max(ans, right - left + 1);
    }
    return ans;
  }
}
```

Explanation:
- 单调队列分别维护窗口最大值和最小值下标。
- 当最大最小差超过限制时，移动左边界直到窗口重新合法。

## 230. Kth Smallest Element in a BST (Kth Smallest Element in a BST)
**Difficulty**: medium | **Key Concept**: tree, inorder traversal

**Original Problem**:
Given a BST root and `k`, return the kth smallest value in the tree.  
中文翻译：给定二叉搜索树和 `k`，返回第 `k` 小的节点值。

**Example**:
Input: root = [3,1,4,null,2], k = 1  
Output: 1

```java
class Solution {
  public int kthSmallest(TreeNode root, int k) {
    Deque<TreeNode> stack = new ArrayDeque<>();
    while (root != null || !stack.isEmpty()) {
      while (root != null) {
        stack.push(root);
        root = root.left;
      }
      root = stack.pop();
      if (--k == 0) return root.val;
      root = root.right;
    }
    return -1;
  }
}
```

Explanation:
- BST 的中序遍历结果是升序。
- 迭代中序遍历，第 `k` 个弹出的节点就是答案。

## 977. Squares of a Sorted Array (Squares of a Sorted Array)
**Difficulty**: easy | **Key Concept**: two pointers, array

**Original Problem**:
Given a nondecreasing array, return a nondecreasing array of each number squared.  
中文翻译：给定非递减数组，返回每个数平方后的非递减数组。

**Example**:
Input: nums = [-4,-1,0,3,10]  
Output: [0,1,9,16,100]

```java
class Solution {
  public int[] sortedSquares(int[] nums) {
    int n = nums.length;
    int[] ans = new int[n];
    int l = 0;
    int r = n - 1;
    for (int i = n - 1; i >= 0; i--) {
      if (Math.abs(nums[l]) > Math.abs(nums[r])) ans[i] = nums[l] * nums[l++];
      else ans[i] = nums[r] * nums[r--];
    }
    return ans;
  }
}
```

Explanation:
- 平方最大值一定来自当前两端绝对值较大的数。
- 从答案末尾向前填充，可一次扫描完成排序。

**Difficulty**: medium | **Key Concept**: design, array

**Original Problem**:
Design Tic-Tac-Toe on an `n x n` board and return the winner after each move, or `0`.  
中文翻译：设计 `n x n` 井字棋，每步落子后返回赢家编号，没有赢家返回 `0`。

**Example**:
Input: ["TicTacToe","move","move","move","move","move","move","move"]  
Output: [null,0,0,0,0,0,0,1]

```java
class TicTacToe {
  private int[] rows;
  private int[] cols;
  private int diag = 0;
  private int anti = 0;
  private int n;

  public TicTacToe(int n) {
    this.n = n;
    rows = new int[n];
    cols = new int[n];
  }

  public int move(int row, int col, int player) {
    int add = player == 1 ? 1 : -1;
    rows[row] += add;
    cols[col] += add;
    if (row == col) diag += add;
    if (row + col == n - 1) anti += add;
    if (Math.abs(rows[row]) == n || Math.abs(cols[col]) == n || Math.abs(diag) == n || Math.abs(anti) == n) return player;
    return 0;
  }
}
```

Explanation:
- 玩家 1 记为 `+1`，玩家 2 记为 `-1`。
- 某行、列或对角线绝对值达到 `n`，说明同一玩家占满。

## 1262. Greatest Sum Divisible by Three (Greatest Sum Divisible by Three)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Return the maximum possible sum of some elements that is divisible by three.  
中文翻译：从数组中选一些元素，返回能被 3 整除的最大和。

**Example**:
Input: nums = [3,6,5,1,8]  
Output: 18

```java
class Solution {
  public int maxSumDivThree(int[] nums) {
    int[] dp = {0, Integer.MIN_VALUE / 2, Integer.MIN_VALUE / 2};
    for (int x : nums) {
      int[] ndp = dp.clone();
      for (int r = 0; r < 3; r++) {
        int nr = (r + x) % 3;
        ndp[nr] = Math.max(ndp[nr], dp[r] + x);
      }
      dp = ndp;
    }
    return dp[0];
  }
}
```

Explanation:
- `dp[r]` 表示当前选出的和对 3 取模为 `r` 时的最大和。
- 每个数可以选或不选，选它会把余数转移到 `(r+x)%3`。

## 787. Cheapest Flights Within K Stops (Cheapest Flights Within K Stops)
**Difficulty**: medium | **Key Concept**: graph, dynamic programming

**Original Problem**:
Find the cheapest price from `src` to `dst` with at most `k` stops, or return `-1`.  
中文翻译：在最多经过 `k` 个中转站的限制下，找到从 `src` 到 `dst` 的最低机票价格，不存在则返回 `-1`。

**Example**:
Input: n = 3, flights = [[0,1,100],[1,2,100],[0,2,500]], src = 0, dst = 2, k = 1  
Output: 200

```java
class Solution {
  public int findCheapestPrice(int n, int[][] flights, int src, int dst, int k) {
    int inf = 1_000_000_000;
    int[] dist = new int[n];
    Arrays.fill(dist, inf);
    dist[src] = 0;
    for (int step = 0; step <= k; step++) {
      int[] next = dist.clone();
      for (int[] f : flights) {
        if (dist[f[0]] != inf) next[f[1]] = Math.min(next[f[1]], dist[f[0]] + f[2]);
      }
      dist = next;
    }
    return dist[dst] == inf ? -1 : dist[dst];
  }
}
```

Explanation:
- 最多 `k` 个中转站等价于最多使用 `k+1` 条边。
- 每轮只基于上一轮距离松弛，避免同一轮内超用边数。

## 815. Bus Routes (Bus Routes)
**Difficulty**: hard | **Key Concept**: BFS, graph, hashmap

**Original Problem**:
Given bus routes, return the minimum number of buses needed to travel from `source` to `target`.  
中文翻译：给定公交线路，返回从 `source` 到 `target` 至少需要乘坐多少辆公交车。

**Example**:
Input: routes = [[1,2,7],[3,6,7]], source = 1, target = 6  
Output: 2

```java
class Solution {
  public int numBusesToDestination(int[][] routes, int source, int target) {
    if (source == target) return 0;
    Map<Integer, List<Integer>> stopToBus = new HashMap<>();
    for (int i = 0; i < routes.length; i++) {
      for (int stop : routes[i]) stopToBus.computeIfAbsent(stop, x -> new ArrayList<>()).add(i);
    }
    Queue<Integer> q = new ArrayDeque<>();
    Set<Integer> seenStop = new HashSet<>();
    boolean[] seenBus = new boolean[routes.length];
    q.offer(source);
    seenStop.add(source);
    int buses = 0;
    while (!q.isEmpty()) {
      buses++;
      for (int size = q.size(); size > 0; size--) {
        int stop = q.poll();
        for (int bus : stopToBus.getOrDefault(stop, Collections.emptyList())) {
          if (seenBus[bus]) continue;
          seenBus[bus] = true;
          for (int next : routes[bus]) {
            if (next == target) return buses;
            if (seenStop.add(next)) q.offer(next);
          }
        }
      }
    }
    return -1;
  }
}
```

Explanation:
- BFS 的层数表示已经乘坐的公交车数量。
- 从站点找到可乘线路，再把该线路能到的所有站点加入下一层。

## 2071. Maximum Number of Tasks You Can Assign (Maximum Number of Tasks You Can Assign)
**Difficulty**: hard | **Key Concept**: binary search, greedy, deque

**Original Problem**:
Given tasks, workers, pills, and strength boost, return the maximum number of tasks that can be assigned.  
中文翻译：给定任务难度、工人能力、药丸数量和增强值，返回最多能分配多少个任务。

**Example**:
Input: tasks = [3,2,1], workers = [0,3,3], pills = 1, strength = 1  
Output: 3

```java
class Solution {
  public int maxTaskAssign(int[] tasks, int[] workers, int pills, int strength) {
    Arrays.sort(tasks);
    Arrays.sort(workers);
    int l = 0;
    int r = Math.min(tasks.length, workers.length);
    while (l < r) {
      int m = (l + r + 1) / 2;
      if (can(tasks, workers, pills, strength, m)) l = m;
      else r = m - 1;
    }
    return l;
  }

  private boolean can(int[] tasks, int[] workers, int pills, int strength, int k) {
    Deque<Integer> dq = new ArrayDeque<>();
    int j = 0;
    for (int i = workers.length - k; i < workers.length; i++) {
      while (j < k && tasks[j] <= workers[i] + strength) dq.offerLast(tasks[j++]);
      if (dq.isEmpty()) return false;
      if (dq.peekFirst() <= workers[i]) {
        dq.pollFirst();
      } else {
        if (pills-- == 0) return false;
        dq.pollLast();
      }
    }
    return true;
  }
}
```

Explanation:
- 二分可完成任务数，检查时只看最简单的 `k` 个任务和最强的 `k` 个工人。
- 从较弱的选中工人开始分配，能不用药就接最简单任务；必须用药时接当前可增强完成的最难任务。

## 1044. Longest Duplicate Substring (Longest Duplicate Substring)
**Difficulty**: hard | **Key Concept**: binary search, rolling hash, string

**Original Problem**:
Given a string, return any longest substring that appears at least twice.  
中文翻译：给定字符串，返回任意一个出现至少两次的最长子串。

**Example**:
Input: s = "banana"  
Output: "ana"

```java
class Solution {
  public String longestDupSubstring(String s) {
    int n = s.length();
    int l = 1;
    int r = n - 1;
    String ans = "";
    while (l <= r) {
      int m = l + (r - l) / 2;
      String cur = search(s, m);
      if (cur.length() > 0) {
        ans = cur;
        l = m + 1;
      } else {
        r = m - 1;
      }
    }
    return ans;
  }

  private String search(String s, int len) {
    long mod1 = 1_000_000_007L;
    long mod2 = 1_000_000_009L;
    long base = 911_382_323L;
    long h1 = 0;
    long h2 = 0;
    long p1 = 1;
    long p2 = 1;
    for (int i = 0; i < len; i++) {
      h1 = (h1 * base + s.charAt(i)) % mod1;
      h2 = (h2 * base + s.charAt(i)) % mod2;
      p1 = p1 * base % mod1;
      p2 = p2 * base % mod2;
    }
    Map<Long, List<Integer>> seen = new HashMap<>();
    seen.computeIfAbsent(key(h1, h2), x -> new ArrayList<>()).add(0);
    for (int i = len; i < s.length(); i++) {
      h1 = (h1 * base - s.charAt(i - len) * p1 % mod1 + mod1 + s.charAt(i)) % mod1;
      h2 = (h2 * base - s.charAt(i - len) * p2 % mod2 + mod2 + s.charAt(i)) % mod2;
      long key = key(h1, h2);
      int start = i - len + 1;
      if (seen.containsKey(key)) {
        String cur = s.substring(start, start + len);
        for (int prev : seen.get(key)) {
          if (s.substring(prev, prev + len).equals(cur)) return cur;
        }
      }
      seen.computeIfAbsent(key, x -> new ArrayList<>()).add(start);
    }
    return "";
  }

  private long key(long a, long b) {
    return (a << 32) ^ b;
  }
}
```

Explanation:
- 对答案长度二分，判断是否存在重复子串。
- 滚动哈希快速比较固定长度窗口，哈希相同再用字符串确认避免碰撞。

## 417. Pacific Atlantic Water Flow (Pacific Atlantic Water Flow)
**Difficulty**: medium | **Key Concept**: DFS, graph, matrix

**Original Problem**:
Find cells from which water can flow to both the Pacific and Atlantic oceans.  
中文翻译：找出雨水既能流到太平洋又能流到大西洋的所有格子。

**Example**:
Input: heights = [[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]  
Output: [[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]

```java
class Solution {
  public List<List<Integer>> pacificAtlantic(int[][] heights) {
    int m = heights.length;
    int n = heights[0].length;
    boolean[][] pac = new boolean[m][n];
    boolean[][] atl = new boolean[m][n];
    for (int r = 0; r < m; r++) {
      dfs(heights, r, 0, pac);
      dfs(heights, r, n - 1, atl);
    }
    for (int c = 0; c < n; c++) {
      dfs(heights, 0, c, pac);
      dfs(heights, m - 1, c, atl);
    }
    List<List<Integer>> ans = new ArrayList<>();
    for (int r = 0; r < m; r++) {
      for (int c = 0; c < n; c++) {
        if (pac[r][c] && atl[r][c]) ans.add(Arrays.asList(r, c));
      }
    }
    return ans;
  }

  private void dfs(int[][] h, int r, int c, boolean[][] seen) {
    if (seen[r][c]) return;
    seen[r][c] = true;
    int[][] dirs = {{1,0},{-1,0},{0,1},{0,-1}};
    for (int[] d : dirs) {
      int nr = r + d[0];
      int nc = c + d[1];
      if (nr < 0 || nc < 0 || nr == h.length || nc == h[0].length || h[nr][nc] < h[r][c]) continue;
      dfs(h, nr, nc, seen);
    }
  }
}
```

Explanation:
- 从海洋边界反向 DFS，只能走向更高或等高的格子。
- 分别标记能到太平洋和大西洋的格子，交集就是答案。

## 224. Basic Calculator (Basic Calculator)
**Difficulty**: hard | **Key Concept**: stack, string

**Original Problem**:
Evaluate a string expression containing integers, `+`, `-`, parentheses, and spaces.  
中文翻译：计算包含整数、`+`、`-`、括号和空格的表达式。

**Example**:
Input: s = "(1+(4+5+2)-3)+(6+8)"  
Output: 23

```java
class Solution {
  public int calculate(String s) {
    Deque<Integer> stack = new ArrayDeque<>();
    int ans = 0;
    int num = 0;
    int sign = 1;
    for (int i = 0; i < s.length(); i++) {
      char ch = s.charAt(i);
      if (Character.isDigit(ch)) {
        num = num * 10 + ch - '0';
      } else if (ch == '+') {
        ans += sign * num;
        num = 0;
        sign = 1;
      } else if (ch == '-') {
        ans += sign * num;
        num = 0;
        sign = -1;
      } else if (ch == '(') {
        stack.push(ans);
        stack.push(sign);
        ans = 0;
        sign = 1;
      } else if (ch == ')') {
        ans += sign * num;
        num = 0;
        ans = stack.pop() * ans + stack.pop();
      }
    }
    return ans + sign * num;
  }
}
```

Explanation:
- 当前层维护结果和符号，遇到括号用栈保存外层状态。
- 右括号时先算完当前层，再乘外层符号并加回外层结果。

## 752. Open the Lock (Open the Lock)
**Difficulty**: medium | **Key Concept**: BFS, graph

**Original Problem**:
Starting from `"0000"`, turn one wheel at a time to reach `target` while avoiding deadends. Return minimum moves.  
中文翻译：从 `"0000"` 出发，每次转动一个拨轮，避开死亡状态，返回到达 `target` 的最少步数。

**Example**:
Input: deadends = ["0201","0101","0102","1212","2002"], target = "0202"  
Output: 6

```java
class Solution {
  public int openLock(String[] deadends, String target) {
    Set<String> dead = new HashSet<>(Arrays.asList(deadends));
    if (dead.contains("0000")) return -1;
    Queue<String> q = new ArrayDeque<>();
    Set<String> seen = new HashSet<>();
    q.offer("0000");
    seen.add("0000");
    int steps = 0;
    while (!q.isEmpty()) {
      for (int size = q.size(); size > 0; size--) {
        String cur = q.poll();
        if (cur.equals(target)) return steps;
        for (String next : nexts(cur)) {
          if (!dead.contains(next) && seen.add(next)) q.offer(next);
        }
      }
      steps++;
    }
    return -1;
  }

  private List<String> nexts(String s) {
    List<String> ans = new ArrayList<>();
    char[] arr = s.toCharArray();
    for (int i = 0; i < 4; i++) {
      char old = arr[i];
      arr[i] = old == '9' ? '0' : (char) (old + 1);
      ans.add(new String(arr));
      arr[i] = old == '0' ? '9' : (char) (old - 1);
      ans.add(new String(arr));
      arr[i] = old;
    }
    return ans;
  }
}
```

Explanation:
- 每个锁状态是图节点，一步能转到 8 个相邻状态。
- BFS 按步数扩展，第一次到达目标就是最短路径。

## 227. Basic Calculator II (Basic Calculator II)
**Difficulty**: medium | **Key Concept**: stack, string

**Original Problem**:
Evaluate a string expression containing non-negative integers, `+`, `-`, `*`, `/`, and spaces.  
中文翻译：计算包含非负整数、`+`、`-`、`*`、`/` 和空格的表达式。

**Example**:
Input: s = "3+2*2"  
Output: 7

```java
class Solution {
  public int calculate(String s) {
    Deque<Integer> stack = new ArrayDeque<>();
    int num = 0;
    char op = '+';
    for (int i = 0; i <= s.length(); i++) {
      char ch = i == s.length() ? '+' : s.charAt(i);
      if (i < s.length() && ch == ' ') continue;
      if (i < s.length() && Character.isDigit(ch)) {
        num = num * 10 + ch - '0';
      } else {
        if (op == '+') stack.push(num);
        else if (op == '-') stack.push(-num);
        else if (op == '*') stack.push(stack.pop() * num);
        else stack.push(stack.pop() / num);
        op = ch;
        num = 0;
      }
    }
    int ans = 0;
    while (!stack.isEmpty()) ans += stack.pop();
    return ans;
  }
}
```

Explanation:
- 加减先入栈，乘除立即和栈顶计算，保证优先级正确。
- 最后把栈内所有带符号的项相加。

## 74. Search a 2D Matrix (Search a 2D Matrix)
**Difficulty**: medium | **Key Concept**: binary search, matrix

**Original Problem**:
Search a target in a matrix where each row is sorted and each row's first number is greater than the previous row's last number.  
中文翻译：在特殊有序矩阵中查找目标值，每行递增且下一行首元素大于上一行末元素。

**Example**:
Input: matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 3  
Output: true

```java
class Solution {
  public boolean searchMatrix(int[][] matrix, int target) {
    int m = matrix.length;
    int n = matrix[0].length;
    int l = 0;
    int r = m * n - 1;
    while (l <= r) {
      int mid = l + (r - l) / 2;
      int val = matrix[mid / n][mid % n];
      if (val == target) return true;
      if (val < target) l = mid + 1;
      else r = mid - 1;
    }
    return false;
  }
}
```

Explanation:
- 该矩阵可看成一个长度为 `m*n` 的一维有序数组。
- 二分下标 `mid` 映射到矩阵坐标 `(mid/n, mid%n)`。

## 240. Search a 2D Matrix II (Search a 2D Matrix II)
**Difficulty**: medium | **Key Concept**: matrix, binary search

**Original Problem**:
Search a target in a matrix where rows and columns are both sorted ascending.  
中文翻译：在行和列都升序的矩阵中查找目标值。

**Example**:
Input: matrix = [[1,4,7,11],[2,5,8,12],[3,6,9,16]], target = 5  
Output: true

```java
class Solution {
  public boolean searchMatrix(int[][] matrix, int target) {
    int r = 0;
    int c = matrix[0].length - 1;
    while (r < matrix.length && c >= 0) {
      if (matrix[r][c] == target) return true;
      if (matrix[r][c] > target) c--;
      else r++;
    }
    return false;
  }
}
```

Explanation:
- 从右上角开始，向左会变小，向下会变大。
- 每次比较都能排除一行或一列。

## 334. Increasing Triplet Subsequence (Increasing Triplet Subsequence)
**Difficulty**: medium | **Key Concept**: greedy, array

**Original Problem**:
Return whether there exists an increasing subsequence of length three.  
中文翻译：判断数组中是否存在长度为 3 的严格递增子序列。

**Example**:
Input: nums = [1,2,3,4,5]  
Output: true

```java
class Solution {
  public boolean increasingTriplet(int[] nums) {
    int first = Integer.MAX_VALUE;
    int second = Integer.MAX_VALUE;
    for (int x : nums) {
      if (x <= first) first = x;
      else if (x <= second) second = x;
      else return true;
    }
    return false;
  }
}
```

Explanation:

## 540. Single Element in a Sorted Array (Single Element in a Sorted Array)
**Difficulty**: medium | **Key Concept**: binary search

**Original Problem**:
In a sorted array where every element appears twice except one, return the single element.  
中文翻译：在有序数组中，除一个元素只出现一次外其他都出现两次，返回单独元素。

**Example**:
Input: nums = [1,1,2,3,3,4,4,8,8]  
Output: 2

```java
class Solution {
  public int singleNonDuplicate(int[] nums) {
    int l = 0;
    int r = nums.length - 1;
    while (l < r) {
      int m = l + (r - l) / 2;
      if (m % 2 == 1) m--;
      if (nums[m] == nums[m + 1]) l = m + 2;
      else r = m;
    }
    return nums[l];
  }
}
```

Explanation:
- 单独元素左侧的成对元素从偶数下标开始，右侧规律被打破。
- 二分时把中点调成偶数下标，检查它和后一位是否成对。

## 355. Design Twitter (Design Twitter)
**Difficulty**: medium | **Key Concept**: design, heap, hashmap

**Original Problem**:
Design a mini Twitter supporting posting tweets, following/unfollowing, and retrieving the 10 most recent feed tweets.  
中文翻译：设计迷你 Twitter，支持发推、关注/取关，以及获取最近 10 条动态。

**Example**:
Input: ["Twitter","postTweet","getNewsFeed","follow","postTweet","getNewsFeed","unfollow","getNewsFeed"]  
Output: [null,null,[5],null,null,[6,5],null,[5]]

```java
class Twitter {
  class Tweet {
    int id;
    int time;

    Tweet(int id, int time) {
      this.id = id;
      this.time = time;
    }
  }

  private int time = 0;
  private Map<Integer, Set<Integer>> follow = new HashMap<>();
  private Map<Integer, List<Tweet>> tweets = new HashMap<>();

  public void postTweet(int userId, int tweetId) {
    tweets.computeIfAbsent(userId, x -> new ArrayList<>()).add(new Tweet(tweetId, time++));
  }

  public List<Integer> getNewsFeed(int userId) {
    PriorityQueue<Tweet> pq = new PriorityQueue<>((a, b) -> b.time - a.time);
    Set<Integer> users = new HashSet<>(follow.getOrDefault(userId, Collections.emptySet()));
    users.add(userId);
    for (int u : users) {
      List<Tweet> list = tweets.getOrDefault(u, Collections.emptyList());
      for (int i = Math.max(0, list.size() - 10); i < list.size(); i++) pq.offer(list.get(i));
    }
    List<Integer> ans = new ArrayList<>();
    while (!pq.isEmpty() && ans.size() < 10) ans.add(pq.poll().id);
    return ans;
  }

  public void follow(int followerId, int followeeId) {
    if (followerId != followeeId) follow.computeIfAbsent(followerId, x -> new HashSet<>()).add(followeeId);
  }

  public void unfollow(int followerId, int followeeId) {
    if (follow.containsKey(followerId)) follow.get(followerId).remove(followeeId);
  }
}
```

Explanation:
- 哈希表保存关注关系和每个用户的推文列表。
- Feed 只需要候选用户最近最多 10 条推文，用堆取全局最新 10 条。

## 63. Unique Paths II (Unique Paths II)
**Difficulty**: medium | **Key Concept**: dynamic programming, matrix

**Original Problem**:
Count paths from top-left to bottom-right in a grid with obstacles, moving only right or down.  
中文翻译：在含障碍网格中，只能向右或向下移动，计算从左上到右下的路径数。

**Example**:
Input: obstacleGrid = [[0,0,0],[0,1,0],[0,0,0]]  
Output: 2

```java
class Solution {
  public int uniquePathsWithObstacles(int[][] obstacleGrid) {
    int m = obstacleGrid.length;
    int n = obstacleGrid[0].length;
    int[] dp = new int[n];
    dp[0] = obstacleGrid[0][0] == 1 ? 0 : 1;
    for (int r = 0; r < m; r++) {
      for (int c = 0; c < n; c++) {
        if (obstacleGrid[r][c] == 1) dp[c] = 0;
        else if (c > 0) dp[c] += dp[c - 1];
      }
    }
    return dp[n - 1];
  }
}
```

Explanation:
- `dp[c]` 表示当前行到达第 `c` 列的路径数。
- 遇到障碍置 0，否则来自上方旧值和左方 `dp[c-1]`。

## 62. Unique Paths (Unique Paths)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Count paths from top-left to bottom-right in an `m x n` grid, moving only right or down.  
中文翻译：在 `m x n` 网格中，只能向右或向下移动，计算从左上到右下的路径数。

**Example**:
Input: m = 3, n = 7  
Output: 28

```java
class Solution {
  public int uniquePaths(int m, int n) {
    int[] dp = new int[n];
    Arrays.fill(dp, 1);
    for (int r = 1; r < m; r++) {
      for (int c = 1; c < n; c++) dp[c] += dp[c - 1];
    }
    return dp[n - 1];
  }
}
```

Explanation:
- 每个格子的路径数等于上方加左方。
- 第一行和第一列都只有一种走法，可用一维 DP 滚动更新。

## 10. Regular Expression Matching (Regular Expression Matching)
**Difficulty**: hard | **Key Concept**: dynamic programming, string

**Original Problem**:
Implement regex matching with `.` matching any single character and `*` matching zero or more of the preceding element.  
中文翻译：实现正则匹配，`.` 匹配任意单字符，`*` 匹配前一个元素零次或多次。

**Example**:
Input: s = "aab", p = "c*a*b"  
Output: true

```java
class Solution {
  public boolean isMatch(String s, String p) {
    int m = s.length();
    int n = p.length();
    boolean[][] dp = new boolean[m + 1][n + 1];
    dp[0][0] = true;
    for (int j = 2; j <= n; j++) {
      if (p.charAt(j - 1) == '*') dp[0][j] = dp[0][j - 2];
    }
    for (int i = 1; i <= m; i++) {
      for (int j = 1; j <= n; j++) {
        char pc = p.charAt(j - 1);
        if (pc == '*') {
          dp[i][j] = dp[i][j - 2] || (match(s, p, i, j - 1) && dp[i - 1][j]);
        } else {
          dp[i][j] = match(s, p, i, j) && dp[i - 1][j - 1];
        }
      }
    }
    return dp[m][n];
  }

  private boolean match(String s, String p, int i, int j) {
    return p.charAt(j - 1) == '.' || s.charAt(i - 1) == p.charAt(j - 1);
  }
}
```

Explanation:
- `dp[i][j]` 表示 `s` 前 `i` 个字符和 `p` 前 `j` 个字符是否匹配。
- `*` 可以匹配零次，也可以在前一字符匹配时继续消耗一个字符。

## 622. Design Circular Queue (Design Circular Queue)
**Difficulty**: medium | **Key Concept**: design, queue, array

**Original Problem**:
Design a circular queue with fixed capacity supporting enqueue, dequeue, front, rear, and state checks.  
中文翻译：设计固定容量循环队列，支持入队、出队、取队首队尾以及判空判满。

**Example**:
Input: ["MyCircularQueue","enQueue","enQueue","enQueue","enQueue","Rear","isFull","deQueue","enQueue","Rear"]  
Output: [null,true,true,true,false,3,true,true,true,4]

```java
class MyCircularQueue {
  private int[] data;
  private int head = 0;
  private int count = 0;

  public MyCircularQueue(int k) {
    data = new int[k];
  }

  public boolean enQueue(int value) {
    if (isFull()) return false;
    data[(head + count) % data.length] = value;
    count++;
    return true;
  }

  public boolean deQueue() {
    if (isEmpty()) return false;
    head = (head + 1) % data.length;
    count--;
    return true;
  }

  public int Front() {
    return isEmpty() ? -1 : data[head];
  }

  public int Rear() {
    return isEmpty() ? -1 : data[(head + count - 1) % data.length];
  }

  public boolean isEmpty() {
    return count == 0;
  }

  public boolean isFull() {
    return count == data.length;
  }
}
```

Explanation:
- 用数组、队首下标和元素数量表示循环队列。
- 队尾位置通过 `(head + count) % capacity` 计算。

## 274. H-Index (H-Index)
**Difficulty**: medium | **Key Concept**: sorting, array

**Original Problem**:
Given citation counts, return the researcher's h-index.  
中文翻译：给定论文引用次数数组，返回研究者的 H 指数。

**Example**:
Input: citations = [3,0,6,1,5]  
Output: 3

```java
class Solution {
  public int hIndex(int[] citations) {
    Arrays.sort(citations);
    int n = citations.length;
    for (int i = 0; i < n; i++) {
      int h = n - i;
      if (citations[i] >= h) return h;
    }
    return 0;
  }
}
```

Explanation:
- 排序后，位置 `i` 右侧有 `n-i` 篇论文引用数至少为 `citations[i]`。
- 找到第一个 `citations[i] >= n-i` 的位置即可。

## 121. Best Time to Buy and Sell Stock (Best Time to Buy and Sell Stock)
**Difficulty**: easy | **Key Concept**: array, greedy

**Original Problem**:
Given stock prices, return the maximum profit from one buy and one sell.  
中文翻译：给定股票价格，只能买入一次并卖出一次，返回最大利润。

**Example**:
Input: prices = [7,1,5,3,6,4]  
Output: 5

```java
class Solution {
  public int maxProfit(int[] prices) {
    int min = Integer.MAX_VALUE;
    int ans = 0;
    for (int p : prices) {
      min = Math.min(min, p);
      ans = Math.max(ans, p - min);
    }
    return ans;
  }
}
```

Explanation:
- 扫描时维护当前之前的最低买入价。
- 用当前价格卖出，更新最大利润。

## 437. Path Sum III (Path Sum III)
**Difficulty**: medium | **Key Concept**: tree, prefix sum, hashmap

**Original Problem**:
Count paths in a binary tree whose node values sum to `targetSum`; paths must go downward.  
中文翻译：统计二叉树中节点和等于 `targetSum` 的路径数量，路径必须从上往下。

**Example**:
Input: root = [10,5,-3,3,2,null,11,3,-2,null,1], targetSum = 8  
Output: 3

```java
class Solution {
  public int pathSum(TreeNode root, int targetSum) {
    Map<Long, Integer> count = new HashMap<>();
    count.put(0L, 1);
    return dfs(root, 0, targetSum, count);
  }

  private int dfs(TreeNode node, long sum, int target, Map<Long, Integer> count) {
    if (node == null) return 0;
    sum += node.val;
    int ans = count.getOrDefault(sum - target, 0);
    count.put(sum, count.getOrDefault(sum, 0) + 1);
    ans += dfs(node.left, sum, target, count);
    ans += dfs(node.right, sum, target, count);
    count.put(sum, count.get(sum) - 1);
    return ans;
  }
}
```

Explanation:
- 树上路径和可以用当前前缀和减去祖先前缀和表示。
- DFS 回溯时要撤销当前前缀和，避免影响其他分支。

## 450. Delete Node in a BST (Delete Node in a BST)
**Difficulty**: medium | **Key Concept**: BST, tree

**Original Problem**:
Delete a node with a given key from a BST and return the root.  
中文翻译：从二叉搜索树中删除指定 key 的节点，并返回根节点。

**Example**:
Input: root = [5,3,6,2,4,null,7], key = 3  
Output: [5,4,6,2,null,null,7]

```java
class Solution {
  public TreeNode deleteNode(TreeNode root, int key) {
    if (root == null) return null;
    if (key < root.val) root.left = deleteNode(root.left, key);
    else if (key > root.val) root.right = deleteNode(root.right, key);
    else {
      if (root.left == null) return root.right;
      if (root.right == null) return root.left;
      TreeNode min = root.right;
      while (min.left != null) min = min.left;
      root.val = min.val;
      root.right = deleteNode(root.right, min.val);
    }
    return root;
  }
}
```

Explanation:
- 按 BST 性质递归查找待删除节点。
- 有两个子节点时，用右子树最小节点替换，再删除那个最小节点。

## 399. Evaluate Division (Evaluate Division)
**Difficulty**: medium | **Key Concept**: graph, DFS, hashmap

**Original Problem**:
Given equations like `a / b = value`, answer division queries.  
中文翻译：给定形如 `a / b = value` 的等式，回答若干除法查询。

**Example**:
Input: equations = [["a","b"],["b","c"]], values = [2.0,3.0], queries = [["a","c"],["b","a"],["a","e"]]  
Output: [6.0,0.5,-1.0]

```java
class Solution {
  public double[] calcEquation(List<List<String>> equations, double[] values, List<List<String>> queries) {
    Map<String, Map<String, Double>> graph = new HashMap<>();
    for (int i = 0; i < equations.size(); i++) {
      String a = equations.get(i).get(0);
      String b = equations.get(i).get(1);
      graph.computeIfAbsent(a, x -> new HashMap<>()).put(b, values[i]);
      graph.computeIfAbsent(b, x -> new HashMap<>()).put(a, 1.0 / values[i]);
    }
    double[] ans = new double[queries.size()];
    for (int i = 0; i < queries.size(); i++) {
      ans[i] = dfs(graph, queries.get(i).get(0), queries.get(i).get(1), new HashSet<>());
    }
    return ans;
  }

  private double dfs(Map<String, Map<String, Double>> graph, String cur, String target, Set<String> seen) {
    if (!graph.containsKey(cur)) return -1.0;
    if (cur.equals(target)) return 1.0;
    seen.add(cur);
    for (Map.Entry<String, Double> e : graph.get(cur).entrySet()) {
      if (seen.contains(e.getKey())) continue;
      double next = dfs(graph, e.getKey(), target, seen);
      if (next != -1.0) return e.getValue() * next;
    }
    return -1.0;
  }
}
```

Explanation:
- 把变量看成图节点，除法值看成有向边权。
- 查询就是在图中找路径，路径权重乘积即答案。

## 2542. Maximum Subsequence Score (Maximum Subsequence Score)
**Difficulty**: medium | **Key Concept**: greedy, heap, sorting

**Original Problem**:
Choose `k` indices to maximize `sum(nums1 chosen) * min(nums2 chosen)`.  
中文翻译：选择 `k` 个下标，使选中 `nums1` 之和乘以选中 `nums2` 最小值最大。

**Example**:
Input: nums1 = [1,3,3,2], nums2 = [2,1,3,4], k = 3  
Output: 12

```java
class Solution {
  public long maxScore(int[] nums1, int[] nums2, int k) {
    int n = nums1.length;
    int[][] pairs = new int[n][2];
    for (int i = 0; i < n; i++) pairs[i] = new int[]{nums2[i], nums1[i]};
    Arrays.sort(pairs, (a, b) -> b[0] - a[0]);
    PriorityQueue<Integer> pq = new PriorityQueue<>();
    long sum = 0;
    long ans = 0;
    for (int[] p : pairs) {
      pq.offer(p[1]);
      sum += p[1];
      if (pq.size() > k) sum -= pq.poll();
      if (pq.size() == k) ans = Math.max(ans, sum * p[0]);
    }
    return ans;
  }
}
```

Explanation:
- 按 `nums2` 从大到小排序，当前 `nums2` 就是候选集合最小值。
- 用小根堆保留最大的 `k` 个 `nums1`，最大化当前乘积。

## 790. Domino and Tromino Tiling (Domino and Tromino Tiling)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Count the ways to tile a `2 x n` board using dominoes and trominoes.  
中文翻译：计算用多米诺和 L 形托米诺铺满 `2 x n` 棋盘的方法数。

**Example**:
Input: n = 3  
Output: 5

```java
class Solution {
  public int numTilings(int n) {
    long mod = 1_000_000_007;
    if (n <= 2) return n;
    long a = 1;
    long b = 2;
    long c = 5;
    for (int i = 4; i <= n; i++) {
      long d = (2 * c + a) % mod;
      a = b;
      b = c;
      c = d;
    }
    return (int) c;
  }
}
```

Explanation:
- 经典递推为 `dp[n] = 2*dp[n-1] + dp[n-3]`。
- 只需要保存前三个相关状态，滚动更新即可。

## 236. Lowest Common Ancestor of a Binary Tree (Lowest Common Ancestor of a Binary Tree)
**Difficulty**: medium | **Key Concept**: tree, DFS

**Original Problem**:
Given a binary tree and two nodes, return their lowest common ancestor.  
中文翻译：给定二叉树和两个节点，返回它们的最近公共祖先。

**Example**:
Input: root = [3,5,1,6,2,0,8,null,null,7,4], p = 5, q = 1  
Output: 3

```java
class Solution {
  public TreeNode lowestCommonAncestor(TreeNode root, TreeNode p, TreeNode q) {
    if (root == null || root == p || root == q) return root;
    TreeNode left = lowestCommonAncestor(root.left, p, q);
    TreeNode right = lowestCommonAncestor(root.right, p, q);
    if (left != null && right != null) return root;
    return left != null ? left : right;
  }
}
```

Explanation:
- 如果左右子树分别找到一个目标，当前节点就是最近公共祖先。
- 否则把非空的查找结果向上返回。

## 746. Min Cost Climbing Stairs (Min Cost Climbing Stairs)
**Difficulty**: easy | **Key Concept**: dynamic programming

**Original Problem**:
Given climbing costs, return the minimum cost to reach the top, starting from step 0 or 1.  
中文翻译：给定每级台阶费用，可从第 0 或第 1 级开始，返回到达楼顶的最小费用。

**Example**:
Input: cost = [10,15,20]  
Output: 15

```java
class Solution {
  public int minCostClimbingStairs(int[] cost) {
    int prev2 = 0;
    int prev1 = 0;
    for (int i = 2; i <= cost.length; i++) {
      int cur = Math.min(prev1 + cost[i - 1], prev2 + cost[i - 2]);
      prev2 = prev1;
      prev1 = cur;
    }
    return prev1;
  }
}
```

Explanation:
- 到达第 `i` 级可以从 `i-1` 或 `i-2` 级跳上来。
- 楼顶视作第 `n` 级，不需要支付楼顶费用。

## 435. Non-overlapping Intervals (Non-overlapping Intervals)
**Difficulty**: medium | **Key Concept**: greedy, intervals

**Original Problem**:
Return the minimum number of intervals to remove so the remaining intervals do not overlap.  
中文翻译：返回最少需要删除多少个区间，使剩余区间互不重叠。

**Example**:
Input: intervals = [[1,2],[2,3],[3,4],[1,3]]  
Output: 1

```java
class Solution {
  public int eraseOverlapIntervals(int[][] intervals) {
    Arrays.sort(intervals, (a, b) -> a[1] - b[1]);
    int end = Integer.MIN_VALUE;
    int keep = 0;
    for (int[] in : intervals) {
      if (in[0] >= end) {
        keep++;
        end = in[1];
      }
    }
    return intervals.length - keep;
  }
}
```

Explanation:
- 按结束时间升序，优先保留结束最早的区间。
- 能保留的区间数最大，则删除数最小。

## 452. Minimum Number of Arrows to Burst Balloons (Minimum Number of Arrows to Burst Balloons)
**Difficulty**: medium | **Key Concept**: greedy, intervals

**Original Problem**:
Given balloon intervals, return the minimum arrows needed to burst all balloons.  
中文翻译：给定气球的水平区间，返回射爆所有气球所需的最少箭数。

**Example**:
Input: points = [[10,16],[2,8],[1,6],[7,12]]  
Output: 2

```java
class Solution {
  public int findMinArrowShots(int[][] points) {
    Arrays.sort(points, (a, b) -> Integer.compare(a[1], b[1]));
    int arrows = 0;
    long end = Long.MIN_VALUE;
    for (int[] p : points) {
      if (p[0] > end) {
        arrows++;
        end = p[1];
      }
    }
    return arrows;
  }
}
```

Explanation:
- 按右端点排序，每支箭尽量射在当前最早结束的位置。
- 新气球左端超过当前箭位置时，必须再射一支箭。

## 714. Best Time to Buy and Sell Stock with Transaction Fee (Best Time to Buy and Sell Stock with Transaction Fee)
**Difficulty**: medium | **Key Concept**: dynamic programming, greedy

**Original Problem**:
Maximize stock profit with unlimited transactions and a fee paid for each transaction.  
中文翻译：可无限次交易股票，每笔交易需要支付手续费，返回最大利润。

**Example**:
Input: prices = [1,3,2,8,4,9], fee = 2  
Output: 8

```java
class Solution {
  public int maxProfit(int[] prices, int fee) {
    int hold = -prices[0];
    int cash = 0;
    for (int i = 1; i < prices.length; i++) {
      int prevCash = cash;
      cash = Math.max(cash, hold + prices[i] - fee);
      hold = Math.max(hold, prevCash - prices[i]);
    }
    return cash;
  }
}
```

Explanation:
- `hold` 表示持股后的最大利润，`cash` 表示空仓后的最大利润。
- 卖出时扣手续费，两个状态滚动转移。

## 649. Dota2 Senate (Dota2 Senate)
**Difficulty**: medium | **Key Concept**: queue, greedy

**Original Problem**:
Given a senate string of `R` and `D`, simulate bans and return the winning party.  
中文翻译：给定由 `R` 和 `D` 组成的参议院序列，模拟禁权过程并返回获胜阵营。

**Example**:
Input: senate = "RDD"  
Output: "Dire"

```java
class Solution {
  public String predictPartyVictory(String senate) {
    Queue<Integer> r = new ArrayDeque<>();
    Queue<Integer> d = new ArrayDeque<>();
    int n = senate.length();
    for (int i = 0; i < n; i++) {
      if (senate.charAt(i) == 'R') r.offer(i);
      else d.offer(i);
    }
    while (!r.isEmpty() && !d.isEmpty()) {
      int ri = r.poll();
      int di = d.poll();
      if (ri < di) r.offer(ri + n);
      else d.offer(di + n);
    }
    return r.isEmpty() ? "Dire" : "Radiant";
  }
}
```

Explanation:
- 两个队列保存双方还活着的参议员位置。
- 位置更早的人先行动，禁掉对方，并把自己位置加 `n` 放到下一轮。

## 901. Online Stock Span (Online Stock Span)
**Difficulty**: medium | **Key Concept**: stack, monotonic stack

**Original Problem**:
For each stock price, return the span of consecutive previous days with price less than or equal to today's price.  
中文翻译：对每天股价，返回连续多少天的股价小于等于今天股价。

**Example**:
Input: ["StockSpanner","next","next","next","next","next","next","next"]  
Output: [null,1,1,1,2,1,4,6]

```java
class StockSpanner {
  private Deque<int[]> stack = new ArrayDeque<>();

  public int next(int price) {
    int span = 1;
    while (!stack.isEmpty() && stack.peek()[0] <= price) span += stack.pop()[1];
    stack.push(new int[]{price, span});
    return span;
  }
}
```

Explanation:
- 单调递减栈保存价格和它已经合并出的跨度。
- 当前价格更高时，可以直接吞掉栈顶跨度。

## 72. Edit Distance (Edit Distance)
**Difficulty**: hard | **Key Concept**: dynamic programming, string

**Original Problem**:
Given two words, return the minimum operations to convert one to the other using insert, delete, and replace.  
中文翻译：给定两个单词，允许插入、删除、替换，返回把一个单词转成另一个的最少操作数。

**Example**:
Input: word1 = "horse", word2 = "ros"  
Output: 3

```java
class Solution {
  public int minDistance(String word1, String word2) {
    int m = word1.length();
    int n = word2.length();
    int[][] dp = new int[m + 1][n + 1];
    for (int i = 0; i <= m; i++) dp[i][0] = i;
    for (int j = 0; j <= n; j++) dp[0][j] = j;
    for (int i = 1; i <= m; i++) {
      for (int j = 1; j <= n; j++) {
        if (word1.charAt(i - 1) == word2.charAt(j - 1)) {
          dp[i][j] = dp[i - 1][j - 1];
        } else {
          dp[i][j] = 1 + Math.min(dp[i - 1][j - 1], Math.min(dp[i - 1][j], dp[i][j - 1]));
        }
      }
    }
    return dp[m][n];
  }
}
```

Explanation:
- `dp[i][j]` 表示 `word1` 前 `i` 个字符转成 `word2` 前 `j` 个字符的最少操作。
- 字符相等无需操作，否则从替换、删除、插入三种操作中取最小。

## 1493. Longest Subarray of 1's After Deleting One Element (Longest Subarray of 1's After Deleting One Element)
**Difficulty**: medium | **Key Concept**: sliding window, array

**Original Problem**:
Given a binary array, delete exactly one element and return the longest non-empty subarray containing only `1`s.  
中文翻译：给定二进制数组，必须删除一个元素，返回只包含 `1` 的最长非空子数组长度。

**Example**:
Input: nums = [1,1,0,1]  
Output: 3

```java
class Solution {
  public int longestSubarray(int[] nums) {
    int left = 0;
    int zeros = 0;
    int ans = 0;
    for (int right = 0; right < nums.length; right++) {
      if (nums[right] == 0) zeros++;
      while (zeros > 1) {
        if (nums[left] == 0) zeros--;
        left++;
      }
      ans = Math.max(ans, right - left);
    }
    return ans;
  }
}
```

Explanation:
- 窗口内最多允许一个 0，表示被删除的那个元素。
- 删除一个元素后长度是窗口长度减一，所以用 `right-left` 更新答案。

## 1143. Longest Common Subsequence (Longest Common Subsequence)
**Difficulty**: medium | **Key Concept**: dynamic programming, string

**Original Problem**:
Given two strings, return the length of their longest common subsequence.  
中文翻译：给定两个字符串，返回它们最长公共子序列的长度。

**Example**:
Input: text1 = "abcde", text2 = "ace"  
Output: 3

```java
class Solution {
  public int longestCommonSubsequence(String text1, String text2) {
    int m = text1.length();
    int n = text2.length();
    int[][] dp = new int[m + 1][n + 1];
    for (int i = 1; i <= m; i++) {
      for (int j = 1; j <= n; j++) {
        if (text1.charAt(i - 1) == text2.charAt(j - 1)) dp[i][j] = dp[i - 1][j - 1] + 1;
        else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
      }
    }
    return dp[m][n];
  }
}
```

Explanation:
- `dp[i][j]` 表示两个字符串前缀的最长公共子序列长度。
- 字符相等时接到前一个状态后面，否则跳过其中一个字符。

## 216. Combination Sum III (Combination Sum III)
**Difficulty**: medium | **Key Concept**: backtracking

**Original Problem**:
Find all combinations of `k` numbers from `1` to `9` that sum to `n`, using each number at most once.  
中文翻译：从 `1` 到 `9` 中选 `k` 个不同数字，使它们的和为 `n`，返回所有组合。

**Example**:
Input: k = 3, n = 7  
Output: [[1,2,4]]

```java
class Solution {
  public List<List<Integer>> combinationSum3(int k, int n) {
    List<List<Integer>> ans = new ArrayList<>();
    backtrack(k, n, 1, new ArrayList<>(), ans);
    return ans;
  }

  private void backtrack(int k, int remain, int start, List<Integer> path, List<List<Integer>> ans) {
    if (path.size() == k) {
      if (remain == 0) ans.add(new ArrayList<>(path));
      return;
    }
    for (int x = start; x <= 9 && x <= remain; x++) {
      path.add(x);
      backtrack(k, remain - x, x + 1, path, ans);
      path.remove(path.size() - 1);
    }
  }
}
```

Explanation:
- 回溯按递增顺序选数字，天然避免重复组合。
- 路径长度到 `k` 时，只在剩余和为 0 时加入答案。

## 2300. Successful Pairs of Spells and Potions (Successful Pairs of Spells and Potions)
**Difficulty**: medium | **Key Concept**: binary search, sorting

**Original Problem**:
For each spell, count potions such that `spell * potion >= success`.  
中文翻译：对每个咒语，统计有多少药水能使乘积至少达到 `success`。

**Example**:
Input: spells = [5,1,3], potions = [1,2,3,4,5], success = 7  
Output: [4,0,3]

```java
class Solution {
  public int[] successfulPairs(int[] spells, int[] potions, long success) {
    Arrays.sort(potions);
    int n = potions.length;
    int[] ans = new int[spells.length];
    for (int i = 0; i < spells.length; i++) {
      int l = 0;
      int r = n;
      while (l < r) {
        int m = l + (r - l) / 2;
        if ((long) spells[i] * potions[m] >= success) r = m;
        else l = m + 1;
      }
      ans[i] = n - l;
    }
    return ans;
  }
}
```

Explanation:
- 药水排序后，对每个咒语二分第一个满足乘积条件的位置。
- 从该位置到末尾的药水都能成功配对。

## 547. Number of Provinces (Number of Provinces)
**Difficulty**: medium | **Key Concept**: graph, DFS

**Original Problem**:
Given a city connection matrix, return the number of connected components.  
中文翻译：给定城市连通矩阵，返回连通分量数量，也就是省份数量。

**Example**:
Input: isConnected = [[1,1,0],[1,1,0],[0,0,1]]  
Output: 2

```java
class Solution {
  public int findCircleNum(int[][] isConnected) {
    int n = isConnected.length;
    boolean[] seen = new boolean[n];
    int ans = 0;
    for (int i = 0; i < n; i++) {
      if (!seen[i]) {
        ans++;
        dfs(isConnected, seen, i);
      }
    }
    return ans;
  }

  private void dfs(int[][] graph, boolean[] seen, int city) {
    seen[city] = true;
    for (int next = 0; next < graph.length; next++) {
      if (graph[city][next] == 1 && !seen[next]) dfs(graph, seen, next);
    }
  }
}
```

Explanation:
- 每次从未访问城市开始 DFS，就发现一个新的连通分量。
- DFS 会访问该省份内所有直接或间接连通的城市。

## 162. Find Peak Element (Find Peak Element)
**Difficulty**: medium | **Key Concept**: binary search

**Original Problem**:
Find an index of a peak element, which is greater than its neighbors.

**Example**:
Input: nums = [1,2,3,1]  
Output: 2

```java
class Solution {
  public int findPeakElement(int[] nums) {
    int l = 0;
    int r = nums.length - 1;
    while (l < r) {
      int m = l + (r - l) / 2;
      if (nums[m] < nums[m + 1]) l = m + 1;
      else r = m;
    }
    return l;
  }
}
```

Explanation:
- 如果 `nums[m] < nums[m+1]`，右侧一定存在峰值。
- 否则左侧含 `m` 一定存在峰值，二分收缩即可。

## 1456. Maximum Number of Vowels in a Substring of Given Length (Maximum Number of Vowels in a Substring of Given Length)
**Difficulty**: medium | **Key Concept**: sliding window, string

**Original Problem**:
Return the maximum number of vowels in any substring of length `k`.  
中文翻译：返回任意长度为 `k` 的子串中元音字母数量的最大值。

**Example**:
Input: s = "abciiidef", k = 3  
Output: 3

```java
class Solution {
  public int maxVowels(String s, int k) {
    int count = 0;
    int ans = 0;
    for (int i = 0; i < s.length(); i++) {
      if (isVowel(s.charAt(i))) count++;
      if (i >= k && isVowel(s.charAt(i - k))) count--;
      ans = Math.max(ans, count);
    }
    return ans;
  }

  private boolean isVowel(char c) {
    return c == 'a' || c == 'e' || c == 'i' || c == 'o' || c == 'u';
  }
}
```

Explanation:
- 固定长度窗口维护当前元音数量。
- 加入右端字符，窗口超过 `k` 时移除左端字符。

## 2336. Smallest Number in Infinite Set (Smallest Number in Infinite Set)
**Difficulty**: medium | **Key Concept**: heap, hashset, design

**Original Problem**:
Design an infinite set of positive integers supporting popping the smallest number and adding a number back.  
中文翻译：设计正整数无限集合，支持弹出最小数和把某个数加回集合。

**Example**:
Input: ["SmallestInfiniteSet","popSmallest","addBack","popSmallest","popSmallest"]  
Output: [null,1,null,1,2]

```java
class SmallestInfiniteSet {
  private int next = 1;
  private PriorityQueue<Integer> pq = new PriorityQueue<>();
  private Set<Integer> set = new HashSet<>();

  public int popSmallest() {
    if (!pq.isEmpty()) {
      int x = pq.poll();
      set.remove(x);
      return x;
    }
    return next++;
  }

  public void addBack(int num) {
    if (num < next && set.add(num)) pq.offer(num);
  }
}
```

Explanation:
- `next` 表示从未弹出过的最小正整数。
- 被加回的小数字用小根堆管理，集合防止重复加入。

## 328. Odd Even Linked List (Odd Even Linked List)
**Difficulty**: medium | **Key Concept**: linked list

**Original Problem**:
Group nodes at odd indices followed by nodes at even indices, preserving relative order in each group.  
中文翻译：把奇数位置节点排在偶数位置节点前面，并保持各自原相对顺序。

**Example**:
Input: head = [1,2,3,4,5]  
Output: [1,3,5,2,4]

```java
class Solution {
  public ListNode oddEvenList(ListNode head) {
    if (head == null) return null;
    ListNode odd = head;
    ListNode even = head.next;
    ListNode evenHead = even;
    while (even != null && even.next != null) {
      odd.next = even.next;
      odd = odd.next;
      even.next = odd.next;
      even = even.next;
    }
    odd.next = evenHead;
    return head;
  }
}
```

Explanation:
- 分别维护奇数链和偶数链的尾节点。
- 遍历结束后把偶数链接到奇数链尾部。

## 2352. Equal Row and Column Pairs (Equal Row and Column Pairs)
**Difficulty**: medium | **Key Concept**: hashmap, matrix

**Original Problem**:
Count pairs `(row, column)` where the row values equal the column values.
