## 3306. Count of Substrings Containing Every Vowel and K Consonants II (Count of Substrings Containing Every Vowel and K Consonants II)
**Difficulty**: medium | **Key Concept**: sliding window

**Original Problem**:
Count substrings containing every vowel at least once and exactly `k` consonants.
中文翻译：统计包含所有元音至少一次且恰好有 k 个辅音的子字符串数量。

**Example**:
Input: word = "aeioqq", k = 1
Output: 0

```java
class Solution {
  public long countOfSubstrings(String word, int k) {
    return atLeast(word, k) - atLeast(word, k + 1);
  }

  private long atLeast(String word, int k) {
    int[] cnt = new int[5];
    int left = 0, vowels = 0, cons = 0;
    long ans = 0;
    for (int right = 0; right < word.length(); right++) {
      int id = id(word.charAt(right));
      if (id >= 0) {
        if (cnt[id]++ == 0) vowels++;
      } else {
        cons++;
      }
      while (vowels == 5 && cons >= k) {
        int old = id(word.charAt(left++));
        if (old >= 0) {
          if (--cnt[old] == 0) vowels--;
        } else {
          cons--;
        }
      }
      ans += left;
    }
    return ans;
  }

  private int id(char c) {
    return c == 'a' ? 0 : c == 'e' ? 1 : c == 'i' ? 2 : c == 'o' ? 3 : c == 'u' ? 4 : -1;
  }
}
```

Explanation:
- 恰好 k 个辅音 = 至少 k 个辅音 - 至少 k+1 个辅音。
- 滑窗维护五个元音是否齐全和辅音数量。

## 3307. Find the K-th Character in String Game II (Find the K-th Character in String Game II)
**Difficulty**: hard | **Key Concept**: recursion, bit

**Original Problem**:
Starting with `"a"`, each operation appends either the same string or the next-character string. Return the kth character.
中文翻译：从 `"a"` 开始，每次操作追加相同字符串或下一个字符字符串，返回第 k 个字符。

**Example**:
Input: k = 5, operations = [0,0,0]
Output: "a"

```java
class Solution {
  public char kthCharacter(long k, int[] operations) {
    int shift = 0;
    for (int i = operations.length - 1; i >= 0; i--) {
      long half = 1L << i;
      if (k > half) {
        k -= half;
        shift += operations[i];
      }
    }
    return (char) ('a' + shift % 26);
  }
}
```

Explanation:
- 倒推 k 落在每轮字符串的左半还是右半。
- 若在右半且该操作为 1，字符整体多偏移一次。

## 3310. Remove Methods From Project (Remove Methods From Project)
**Difficulty**: medium | **Key Concept**: graph, BFS

**Original Problem**:
Methods reachable from `k` are suspicious. Remove them only if no non-suspicious method invokes a suspicious one.
中文翻译：从 k 可达的方法可疑；只有没有非可疑方法调用可疑方法时，才能删除它们。

**Example**:
Input: n = 4, k = 1, invocations = [[1,2],[0,1],[3,2]]
Output: [0,1,2,3]

```java
class Solution {
  public List<Integer> remainingMethods(int n, int k, int[][] invocations) {
    List<Integer>[] graph = new ArrayList[n];
    for (int i = 0; i < n; i++) graph[i] = new ArrayList<>();
    for (int[] e : invocations) graph[e[0]].add(e[1]);
    boolean[] bad = new boolean[n];
    Queue<Integer> q = new ArrayDeque<>();
    q.offer(k);
    bad[k] = true;
    while (!q.isEmpty()) {
      int cur = q.poll();
      for (int next : graph[cur]) {
        if (!bad[next]) {
          bad[next] = true;
          q.offer(next);
        }
      }
    }
    for (int[] e : invocations) {
      if (!bad[e[0]] && bad[e[1]]) return all(n);
    }
    List<Integer> ans = new ArrayList<>();
    for (int i = 0; i < n; i++) if (!bad[i]) ans.add(i);
    return ans;
  }

  private List<Integer> all(int n) {
    List<Integer> ans = new ArrayList<>();
    for (int i = 0; i < n; i++) ans.add(i);
    return ans;
  }
}
```

Explanation:
- 从 k 出发 BFS 标记所有可疑方法。
- 若存在外部方法调用可疑方法，则不能删除任何方法；否则返回非可疑方法。

## 3318. Find X-Sum of All K-Long Subarrays I (Find X-Sum of All K-Long Subarrays I)
**Difficulty**: easy | **Key Concept**: hashmap, sorting

**Original Problem**:
For every length-`k` subarray, sum the values of the `x` most frequent numbers, using larger value as tie-breaker.
中文翻译：对每个长度 k 子数组，按频次高和值大选前 x 个数，求它们的 `值*频次` 之和。

**Example**:
Input: nums = [1,1,2,2,3,4,2,3], k = 6, x = 2
Output: [6,10,12]

```java
class Solution {
  public int[] findXSum(int[] nums, int k, int x) {
    int[] ans = new int[nums.length - k + 1];
    for (int i = 0; i + k <= nums.length; i++) {
      Map<Integer, Integer> map = new HashMap<>();
      for (int j = i; j < i + k; j++) map.put(nums[j], map.getOrDefault(nums[j], 0) + 1);
      List<int[]> list = new ArrayList<>();
      for (Map.Entry<Integer, Integer> e : map.entrySet()) list.add(new int[] {e.getKey(), e.getValue()});
      list.sort((a, b) -> a[1] == b[1] ? b[0] - a[0] : b[1] - a[1]);
      int sum = 0;
      for (int j = 0; j < Math.min(x, list.size()); j++) sum += list.get(j)[0] * list.get(j)[1];
      ans[i] = sum;
    }
    return ans;
  }
}
```

Explanation:
- I 版本数据范围小，直接对每个窗口计数并排序即可。
- 排序规则是频次降序，频次相同时值降序。

## 3321. Find X-Sum of All K-Long Subarrays II (Find X-Sum of All K-Long Subarrays II)
**Difficulty**: hard | **Key Concept**: sliding window, TreeSet

**Original Problem**:
For each length-`k` subarray, sum `value * frequency` for the `x` most frequent values, breaking ties by larger value.
中文翻译：对每个长度 k 子数组，按频次高和值大选前 x 个数，求 `值*频次` 之和。

**Example**:
Input: nums = [1,1,2,2,3,4,2,3], k = 6, x = 2
Output: [6,10,12]

```java
class Solution {
  TreeSet<int[]> top;
  TreeSet<int[]> rest;
  Map<Integer, Integer> cnt;
  long sum;
  int x;

  public long[] findXSum(int[] nums, int k, int x) {
    this.x = x;
    cnt = new HashMap<>();
    top = new TreeSet<>((a, b) -> a[1] == b[1] ? a[0] - b[0] : a[1] - b[1]);
    rest = new TreeSet<>((a, b) -> a[1] == b[1] ? a[0] - b[0] : a[1] - b[1]);
    long[] ans = new long[nums.length - k + 1];
    for (int i = 0; i < nums.length; i++) {
      add(nums[i], 1);
      if (i >= k) add(nums[i - k], -1);
      if (i >= k - 1) ans[i - k + 1] = sum;
    }
    return ans;
  }

  private void add(int v, int delta) {
    int old = cnt.getOrDefault(v, 0);
    if (old > 0) removePair(new int[] {v, old});
    int now = old + delta;
    if (now == 0) cnt.remove(v);
    else {
      cnt.put(v, now);
      rest.add(new int[] {v, now});
    }
    balance();
  }

  private void removePair(int[] p) {
    if (top.remove(p)) sum -= (long) p[0] * p[1];
    else rest.remove(p);
  }

  private boolean better(int[] a, int[] b) {
    return a[1] != b[1] ? a[1] > b[1] : a[0] > b[0];
  }

  private void moveToTop(int[] p) {
    rest.remove(p);
    top.add(p);
    sum += (long) p[0] * p[1];
  }

  private void moveToRest(int[] p) {
    top.remove(p);
    sum -= (long) p[0] * p[1];
    rest.add(p);
  }

  private void balance() {
    while (top.size() < x && !rest.isEmpty()) moveToTop(rest.pollLast());
    while (top.size() > x) moveToRest(top.first());
    while (!top.isEmpty() && !rest.isEmpty() && better(rest.last(), top.first())) {
      int[] a = rest.pollLast(), b = top.pollFirst();
      sum -= (long) b[0] * b[1];
      rest.add(b);
      top.add(a);
      sum += (long) a[0] * a[1];
    }
  }
}
```

Explanation:
- 两个 TreeSet 分别维护入选前 x 的元素和剩余元素，排序按频次和值。
- 每次窗口增删后重新平衡，并维护 top 集合的贡献和。

## 3330. Find the Original Typed String I (Find the Original Typed String I)
**Difficulty**: easy | **Key Concept**: string, counting

**Original Problem**:
Alice may have long-pressed one key once. Count possible original strings.
中文翻译：Alice 可能有一次长按导致某个字符重复，统计可能的原始字符串数量。

**Example**:
Input: word = "abbcccc"
Output: 5

```java
class Solution {
  public int possibleStringCount(String word) {
    int ans = 1;
    for (int i = 1; i < word.length(); i++) {
      if (word.charAt(i) == word.charAt(i - 1)) ans++;
    }

  }

```

Explanation:
- 不发生长按本身是一种可能。

## 3333. Find the Original Typed String II (Find the Original Typed String II)
**Difficulty**: hard | **Key Concept**: dynamic programming, prefix sum

**Original Problem**:
Given the typed word and minimum length `k`, count possible original strings of length at least `k`.
中文翻译：给定输入后的字符串和最小长度 k，统计长度至少为 k 的可能原始字符串数量。

**Example**:
Input: word = "aabbccdd", k = 7
Output: 5

```java
class Solution {
  public int possibleStringCount(String word, int k) {
    long mod = 1000000007L, total = 1;
    List<Integer> groups = new ArrayList<>();
    for (int i = 0; i < word.length(); ) {
      int j = i;
      while (j < word.length() && word.charAt(j) == word.charAt(i)) j++;
      groups.add(j - i);
      total = total * (j - i) % mod;
      i = j;
    }
    if (groups.size() >= k) return (int) total;
    long[] dp = new long[k];
    dp[0] = 1;
    for (int g : groups) {
      long[] next = new long[k], pre = new long[k + 1];
      for (int i = 0; i < k; i++) pre[i + 1] = (pre[i] + dp[i]) % mod;
      for (int len = 1; len < k; len++) {
        int l = Math.max(0, len - g);
        next[len] = (pre[len] - pre[l] + mod) % mod;
      }
      dp = next;
    }
    long bad = 0;
    for (long v : dp) bad = (bad + v) % mod;
    return (int) ((total - bad + mod) % mod);
  }
}
```

Explanation:
- 每个连续段原本可选择保留 1 到段长个字符，总方案为各段长度乘积。
- 用 DP 统计总长度小于 k 的坏方案，再从总方案中减去。

## 3349. Adjacent Increasing Subarrays Detection I (Adjacent Increasing Subarrays Detection I)
**Difficulty**: easy | **Key Concept**: array, greedy

**Original Problem**:
Return whether there exist two adjacent strictly increasing subarrays of length `k`.
中文翻译：判断是否存在两个相邻且长度均为 k 的严格递增子数组。

**Example**:
Input: nums = [2,5,7,8,9,2,3,4,3,1], k = 3
Output: true

```java
class Solution {
  public boolean hasIncreasingSubarrays(List<Integer> nums, int k) {
    int n = nums.size();
    for (int i = 0; i + 2 * k <= n; i++) {
      if (inc(nums, i, k) && inc(nums, i + k, k)) return true;
    }
    return false;
  }

  private boolean inc(List<Integer> nums, int start, int k) {
    for (int i = start + 1; i < start + k; i++) {
      if (nums.get(i) <= nums.get(i - 1)) return false;
    }
    return true;
  }
}
```

Explanation:
- I 版本可直接枚举两个相邻窗口的起点。
- 分别检查两个长度 k 子数组是否严格递增。

## 3354. Make Array Elements Equal to Zero (Make Array Elements Equal to Zero)
**Difficulty**: easy | **Key Concept**: simulation

**Original Problem**:
Count valid starting positions and directions from zeros such that the process makes all elements zero.
中文翻译：从值为 0 的位置和某个方向开始模拟，统计能使所有元素归零的方案数。

**Example**:
Input: nums = [1,0,2,0,3]
Output: 2

```java
class Solution {
  public int countValidSelections(int[] nums) {
    int ans = 0;
    for (int i = 0; i < nums.length; i++) {
      if (nums[i] == 0) {
        if (valid(nums, i, -1)) ans++;
        if (valid(nums, i, 1)) ans++;
      }
    }
    return ans;
  }

  private boolean valid(int[] nums, int start, int dir) {
    int[] arr = nums.clone();
    int i = start;
    while (i >= 0 && i < arr.length) {
      if (arr[i] == 0) {
        i += dir;
      } else {
        arr[i]--;
        dir = -dir;
        i += dir;
      }
    }
    for (int x : arr) if (x != 0) return false;
    return true;
  }
}
```

Explanation:
- 只可能从初始为 0 的位置出发，方向有左右两种。
- 按题意模拟，离开数组后检查所有元素是否为 0。

## 3355. Zero Array Transformation I (Zero Array Transformation I)
**Difficulty**: medium | **Key Concept**: difference array

**Original Problem**:
Each query can decrement every element in a range by at most 1. Return whether all nums can become zero.
中文翻译：每个查询可让区间内每个元素最多减 1，判断能否把 nums 全变成 0。

**Example**:
Input: nums = [1,0,1], queries = [[0,2]]
Output: true

```java
class Solution {
  public boolean isZeroArray(int[] nums, int[][] queries) {
    int[] diff = new int[nums.length + 1];
    for (int[] q : queries) {
      diff[q[0]]++;
      diff[q[1] + 1]--;
    }
    int cover = 0;
    for (int i = 0; i < nums.length; i++) {
      cover += diff[i];
      if (cover < nums[i]) return false;
    }
    return true;
  }
}
```

Explanation:
- 每个下标最多可被覆盖次数减掉。
- 差分统计每个位置有多少查询覆盖，覆盖次数至少为 nums[i] 即可。

## 3356. Zero Array Transformation II (Zero Array Transformation II)
**Difficulty**: medium | **Key Concept**: binary search, difference array

**Original Problem**:
Each query decrements a range by at most `val`. Return the minimum prefix length of queries needed to make nums zero.
中文翻译：每个查询可使区间内元素最多减 val，返回使 nums 全为 0 的最短查询前缀长度。

**Example**:
Input: nums = [2,0,2], queries = [[0,2,1],[0,2,1],[1,1,3]]
Output: 2

```java
class Solution {
  public int minZeroArray(int[] nums, int[][] queries) {
    int left = 0, right = queries.length + 1;
    while (left < right) {
      int mid = (left + right) / 2;
      if (can(nums, queries, mid)) right = mid;
      else left = mid + 1;
    }
    return left == queries.length + 1 ? -1 : left;
  }

  private boolean can(int[] nums, int[][] queries, int take) {
    long[] diff = new long[nums.length + 1];
    for (int i = 0; i < take; i++) {
      diff[queries[i][0]] += queries[i][2];
      diff[queries[i][1] + 1] -= queries[i][2];
    }
    long cover = 0;
    for (int i = 0; i < nums.length; i++) {
      cover += diff[i];
      if (cover < nums[i]) return false;
    }
    return true;
  }
}
```

Explanation:
- 前缀查询越长，可减少能力越强，满足单调性。
- 二分前缀长度，用差分判断每个位置可减少量是否足够。

## 3362. Zero Array Transformation III (Zero Array Transformation III)
**Difficulty**: medium | **Key Concept**: greedy, priority queue

**Original Problem**:
Remove as many queries as possible while still being able to make nums zero, or return `-1`.
中文翻译：在仍能把 nums 变成零数组的前提下，最多移除多少查询；不可行返回 `-1`。

**Example**:
Input: nums = [2,0,2], queries = [[0,2],[0,2],[1,1]]
Output: 1

```java
class Solution {
  public int maxRemoval(int[] nums, int[][] queries) {
    Arrays.sort(queries, (a, b) -> a[0] - b[0]);
    PriorityQueue<Integer> pq = new PriorityQueue<>(Collections.reverseOrder());
    int[] diff = new int[nums.length + 1];
    int qi = 0, used = 0, active = 0;
    for (int i = 0; i < nums.length; i++) {
      active += diff[i];
      while (qi < queries.length && queries[qi][0] <= i) pq.offer(queries[qi++][1]);
      while (active < nums[i]) {
        while (!pq.isEmpty() && pq.peek() < i) pq.poll();
        if (pq.isEmpty()) return -1;
        int r = pq.poll();
        used++;
        active++;
        diff[r + 1]--;
      }
    }
    return queries.length - used;
  }
}
```

Explanation:
- 扫描下标，需要更多覆盖时，贪心选择右端最远的可用查询。
- 使用的查询最少，则移除的查询最多。

## 3363. Find the Maximum Number of Fruits Collected (Find the Maximum Number of Fruits Collected)
**Difficulty**: hard | **Key Concept**: dynamic programming, grid

**Original Problem**:
Three children collect fruits in an `n x n` grid with movement rules. Return the maximum fruits collected.
中文翻译：三个孩子按规则在 `n x n` 网格中移动采水果，返回最大采集数量。

**Example**:
Input: fruits = [[1,2,3,4],[5,6,8,7],[9,10,11,12],[13,14,15,16]]
Output: 100

```java
class Solution {
  public int maxCollectedFruits(int[][] fruits) {
    int n = fruits.length, ans = 0;
    for (int i = 0; i < n; i++) ans += fruits[i][i];
    ans += collect(fruits, true);
    ans += collect(fruits, false);
    return ans;
  }

  private int collect(int[][] a, boolean upper) {
    int n = a.length, neg = -1000000000;
    int[][] dp = new int[n][n];
    for (int[] row : dp) Arrays.fill(row, neg);
    dp[0][n - 1] = upper ? a[0][n - 1] : a[n - 1][0];
    for (int step = 1; step < n - 1; step++) {
      int[][] ndp = new int[n][n];
      for (int[] row : ndp) Arrays.fill(row, neg);
      for (int r = 0; r < n; r++) {
        for (int c = 0; c < n; c++) {
          if (dp[r][c] == neg) continue;
          for (int d = -1; d <= 1; d++) {
            int nr = r + 1, nc = c + d;
            if (!upper) {
              nr = r + d;
              nc = c + 1;
            }
            if (nr < 0 || nr >= n || nc < 0 || nc >= n || nr >= nc && upper || nr <= nc && !upper) continue;
            ndp[nr][nc] = Math.max(ndp[nr][nc], dp[r][c] + (upper ? a[nr][nc] : a[nc][nr]));
          }
        }
      }
      dp = ndp;
    }
    int best = 0;
    for (int[] row : dp) for (int v : row) best = Math.max(best, v);
    return best;
  }
}
```

Explanation:
- 主对角线由第一个孩子固定收集。
- 另外两个孩子在对角线上方/下方对称 DP，避免重复采对角线。

## 3375. Minimum Operations to Make Array Values Equal to K (Minimum Operations to Make Array Values Equal to K)
**Difficulty**: easy | **Key Concept**: hashset

**Original Problem**:
Return the minimum operations to make every value equal to `k`, or `-1` if impossible.
中文翻译：返回把所有元素变成 k 的最少操作次数；若不可能返回 `-1`。

**Example**:
Input: nums = [5,2,5,4,5], k = 2
Output: 2

```java
class Solution {
  public int minOperations(int[] nums, int k) {
    Set<Integer> set = new HashSet<>();
    for (int x : nums) {
      if (x < k) return -1;
      if (x > k) set.add(x);
    }
    return set.size();
  }
}
```

Explanation:
- 小于 k 的值无法通过操作变成 k。
- 每种大于 k 的不同值需要一次操作降到下一个层级。

## 3381. Maximum Subarray Sum With Length Divisible by K (Maximum Subarray Sum With Length Divisible by K)
**Difficulty**: medium | **Key Concept**: prefix sum

**Original Problem**:
Return the maximum subarray sum whose length is divisible by `k`.
中文翻译：返回长度能被 k 整除的子数组最大和。

**Example**:
Input: nums = [1,2], k = 1
Output: 3

```java
class Solution {
  public long maxSubarraySum(int[] nums, int k) {
    long[] min = new long[k];
    Arrays.fill(min, Long.MAX_VALUE / 4);
    min[0] = 0;
    long prefix = 0, ans = Long.MIN_VALUE;
    for (int i = 0; i < nums.length; i++) {
      prefix += nums[i];
      int r = (i + 1) % k;
      ans = Math.max(ans, prefix - min[r]);
      min[r] = Math.min(min[r], prefix);
    }
    return ans;
  }
}
```

Explanation:
- 子数组长度可被 k 整除，等价于两个前缀下标模 k 相同。
- 对每种模值维护最小前缀和，最大化当前前缀减它。

## 3388. Count Beautiful Splits in an Array (Count Beautiful Splits in an Array)
**Difficulty**: medium | **Key Concept**: dynamic programming, array

**Original Problem**:
Count splits into three non-empty parts where the first part is a prefix of the second, or the second is a prefix of the third.
中文翻译：统计把数组分成三个非空部分，且第一段是第二段前缀或第二段是第三段前缀的方案数。

**Example**:
Input: nums = [1,1,2,1]
Output: 2

```java
class Solution {
  public int beautifulSplits(int[] nums) {
    int n = nums.length, ans = 0;
    int[][] lcp = new int[n + 1][n + 1];
    for (int i = n - 1; i >= 0; i--) {
      for (int j = n - 1; j > i; j--) {
        if (nums[i] == nums[j]) lcp[i][j] = lcp[i + 1][j + 1] + 1;
      }
    }
    for (int i = 1; i < n - 1; i++) {
      for (int j = i + 1; j < n; j++) {
        if (i <= j - i && lcp[0][i] >= i || j - i <= n - j && lcp[i][j] >= j - i) ans++;
      }
    }
    return ans;
  }
}
```

Explanation:
- 预处理任意两个位置开始的最长公共前缀长度。
- 枚举两个切点，用 LCP 判断前缀关系是否成立。

## 3394. Check if Grid can be Cut into Sections (Check if Grid can be Cut into Sections)
**Difficulty**: medium | **Key Concept**: intervals, sorting

**Original Problem**:
Given non-overlapping rectangles, determine if two horizontal or vertical cuts can divide them into three non-empty sections.
中文翻译：给定不重叠矩形，判断是否能用两条水平或垂直切线分成三个非空区域。

**Example**:
Input: n = 5, rectangles = [[1,0,5,2],[0,2,2,4],[3,2,5,3],[0,4,4,5]]
Output: true

```java
class Solution {
  public boolean checkValidCuts(int n, int[][] rectangles) {
    return count(rectangles, 0) >= 3 || count(rectangles, 1) >= 3;
  }

  private int count(int[][] rects, int axis) {
    int[][] seg = new int[rects.length][2];
    for (int i = 0; i < rects.length; i++) {
      seg[i][0] = rects[i][axis];
      seg[i][1] = rects[i][axis + 2];
    }
    Arrays.sort(seg, (a, b) -> a[0] - b[0]);
    int groups = 0, end = -1;
    for (int[] s : seg) {
      if (s[0] >= end) {
        groups++;
        end = s[1];
      } else {
        end = Math.max(end, s[1]);
      }
    }
    return groups;
  }
}
```

Explanation:
- 横切看 y 区间，竖切看 x 区间。
- 若某个方向的投影能分成至少 3 个互不重叠区间组，则可切两刀。

## 3396. Minimum Number of Operations to Make Elements in Array Distinct (Minimum Number of Operations to Make Elements in Array Distinct)
**Difficulty**: easy | **Key Concept**: hashset

**Original Problem**:
In one operation, remove the first three elements. Return minimum operations to make remaining elements distinct.
中文翻译：每次删除数组前 3 个元素，返回使剩余元素互不相同的最少操作次数。

**Example**:
Input: nums = [1,2,3,4,2,3,3,5,7]
Output: 2

```java
class Solution {
  public int minimumOperations(int[] nums) {
    Set<Integer> seen = new HashSet<>();
    for (int i = nums.length - 1; i >= 0; i--) {
      if (!seen.add(nums[i])) return i / 3 + 1;
    }
    return 0;
  }
}
```

Explanation:
- 从右往左找到第一个重复位置，说明必须删除到它之前。
- 每次删 3 个，操作数为 `i/3+1`。

## 3397. Maximum Number of Distinct Elements After Operations (Maximum Number of Distinct Elements After Operations)
**Difficulty**: medium | **Key Concept**: sorting, greedy

**Original Problem**:
Each number may be changed by at most `k`. Maximize the number of distinct elements.
中文翻译：每个数最多可改变 k，求最终不同元素数量最大值。

**Example**:
Input: nums = [1,2,2,3,3,4], k = 2
Output: 6

```java
class Solution {
  public int maxDistinctElements(int[] nums, int k) {
    Arrays.sort(nums);
    int last = Integer.MIN_VALUE / 2, ans = 0;
    for (int x : nums) {
      int v = Math.max(last + 1, x - k);
      if (v <= x + k) {
        ans++;
        last = v;
      }
    }
    return ans;
  }
}
```

Explanation:
- 排序后，每个数尽量放到可行区间 `[x-k,x+k]` 中最小且大于 last 的位置。
- 贪心保留后续空间，能放则增加一个不同值。

## 3403. Find the Lexicographically Largest String From the Box I (Find the Lexicographically Largest String From the Box I)
**Difficulty**: medium | **Key Concept**: string, greedy

**Original Problem**:
Split `word` among `numFriends` non-empty strings. Return the lexicographically largest possible string one friend can get.
中文翻译：把 word 分给 numFriends 个非空字符串，返回某个朋友可能得到的字典序最大字符串。

**Example**:
Input: word = "dbca", numFriends = 2
Output: "dbc"

```java
class Solution {
  public String answerString(String word, int numFriends) {
    if (numFriends == 1) return word;
    int maxLen = word.length() - numFriends + 1;
    String ans = "";
    for (int i = 0; i < word.length(); i++) {
      String cur = word.substring(i, Math.min(word.length(), i + maxLen));
      if (cur.compareTo(ans) > 0) ans = cur;
    }
    return ans;
  }
}
```

Explanation:
- 某个朋友拿到的子串长度最多为 `n-numFriends+1`。
- 枚举所有起点，取该最大长度限制下字典序最大的子串。

## 3404. Count Special Subsequences (Count Special Subsequences)
**Difficulty**: medium | **Key Concept**: hashmap, math

**Original Problem**:
Count quadruples `(p,q,r,s)` with gaps and `nums[p] * nums[r] == nums[q] * nums[s]`.
中文翻译：统计满足间隔条件且 `nums[p]*nums[r] == nums[q]*nums[s]` 的四元组数量。

**Example**:
Input: nums = [1,2,3,4,3,6,1]
Output: 1

```java
class Solution {
  public long numberOfSubsequences(int[] nums) {
    int n = nums.length;
    Map<String, Integer> map = new HashMap<>();
    long ans = 0;
    for (int r = 4; r < n - 2; r++) {
      int q = r - 2;
      for (int p = 0; p < q - 1; p++) add(map, nums[p], nums[q]);
      for (int s = r + 2; s < n; s++) ans += map.getOrDefault(key(nums[s], nums[r]), 0);
    }
    return ans;
  }

  private void add(Map<String, Integer> map, int a, int b) {
    String key = key(a, b);
    map.put(key, map.getOrDefault(key, 0) + 1);
  }

  private String key(int a, int b) {
    int g = gcd(a, b);
    return a / g + "#" + b / g;
  }

  private int gcd(int a, int b) {
    while (b != 0) {
      int t = a % b;
      a = b;
      b = t;
    }
    return a;
  }
}
```

Explanation:
- 等式可转为比例 `nums[p]/nums[q] == nums[s]/nums[r]`。
- 枚举 r，维护左侧合法 `(p,q)` 比例次数，查询右侧 `(s,r)`。

## 3405. Count the Number of Arrays with K Matching Adjacent Elements (Count the Number of Arrays with K Matching Adjacent Elements)
**Difficulty**: hard | **Key Concept**: combinatorics

**Original Problem**:
Count arrays of length `n` with values in `[1,m]` and exactly `k` adjacent equal pairs.
中文翻译：统计长度 n、元素范围 `[1,m]` 且恰好有 k 对相邻相等的数组数量。

**Example**:
Input: n = 3, m = 2, k = 1
Output: 4

```java
class Solution {
  public int countGoodArrays(int n, int m, int k) {
    long mod = 1000000007L;
    long ans = m * comb(n - 1, k, mod) % mod * pow(m - 1, n - 1 - k, mod) % mod;
    return (int) ans;
  }

  private long comb(int n, int r, long mod) {
    if (r < 0 || r > n) return 0;
    long a = 1, b = 1;
    for (int i = 1; i <= r; i++) {
      a = a * (n - r + i) % mod;
      b = b * i % mod;
    }
    return a * pow(b, mod - 2, mod) % mod;
  }

  private long pow(long a, long e, long mod) {
    long res = 1;
    while (e > 0) {
      if ((e & 1) == 1) res = res * a % mod;
      a = a * a % mod;
      e >>= 1;
    }
    return res;
  }
}
```

Explanation:
- 先选第一个数有 m 种，再从 n-1 个相邻位置中选 k 个相等位置。
- 其余位置必须变化，每次有 `m-1` 种选择。

## 3408. Design Task Manager (Design Task Manager)
**Difficulty**: medium | **Key Concept**: design, priority queue

**Original Problem**:
Design a task manager supporting add, edit, remove, and executing the highest-priority task.
中文翻译：设计任务管理器，支持新增、修改、删除任务，以及执行优先级最高的任务。

**Example**:
Input: ["TaskManager","add","edit","execTop"]
Output: [null,null,null,3]

```java
class TaskManager {
  Map<Integer, int[]> map = new HashMap<>();
  PriorityQueue<int[]> pq = new PriorityQueue<>((a, b) -> a[1] == b[1] ? b[0] - a[0] : b[1] - a[1]);

  public TaskManager(List<List<Integer>> tasks) {
    for (List<Integer> t : tasks) add(t.get(0), t.get(1), t.get(2));
  }

  public void add(int userId, int taskId, int priority) {
    map.put(taskId, new int[] {userId, priority});
    pq.offer(new int[] {taskId, priority});
  }

  public void edit(int taskId, int newPriority) {
    int userId = map.get(taskId)[0];
    map.put(taskId, new int[] {userId, newPriority});
    pq.offer(new int[] {taskId, newPriority});
  }

  public void rmv(int taskId) {
    map.remove(taskId);
  }

  public int execTop() {
    while (!pq.isEmpty()) {
      int[] cur = pq.poll();
      int[] info = map.get(cur[0]);
      if (info != null && info[1] == cur[1]) {
        map.remove(cur[0]);
        return info[0];
      }
    }
    return -1;
  }
}
```

Explanation:
- 哈希表保存 taskId 的当前用户和优先级。
- 堆中允许旧记录懒删除，执行时弹到当前有效的最高优先级任务。

## 3418. Maximum Amount of Money Robot Can Earn (Maximum Amount of Money Robot Can Earn)
**Difficulty**: medium | **Key Concept**: dynamic programming, grid

**Original Problem**:
A robot moves right or down through a grid and may neutralize at most two negative cells. Return maximum money.
中文翻译：机器人只能向右或向下走，最多可抵消两个负数格，返回最大收益。

**Example**:
Input: coins = [[0,1,-1],[1,-2,3],[2,-3,4]]
Output: 8

```java
class Solution {
  public int maximumAmount(int[][] coins) {
    int m = coins.length, n = coins[0].length, neg = -1000000000;
    int[][][] dp = new int[m][n][3];
    for (int[][] mat : dp) for (int[] row : mat) Arrays.fill(row, neg);
    dp[0][0][0] = coins[0][0];
    if (coins[0][0] < 0) dp[0][0][1] = 0;
    for (int r = 0; r < m; r++) {
      for (int c = 0; c < n; c++) {
        for (int used = 0; used <= 2; used++) {
          if (dp[r][c][used] == neg) continue;
          relax(coins, dp, r + 1, c, used, dp[r][c][used]);
          relax(coins, dp, r, c + 1, used, dp[r][c][used]);
        }
      }
    }
    return Math.max(dp[m - 1][n - 1][0], Math.max(dp[m - 1][n - 1][1], dp[m - 1][n - 1][2]));
  }

  private void relax(int[][] coins, int[][][] dp, int r, int c, int used, int val) {
    if (r == coins.length || c == coins[0].length) return;
    dp[r][c][used] = Math.max(dp[r][c][used], val + coins[r][c]);
    if (coins[r][c] < 0 && used < 2) dp[r][c][used + 1] = Math.max(dp[r][c][used + 1], val);
  }
}
```

Explanation:
- `dp[r][c][used]` 表示到达格子并已抵消 used 次的最大收益。
- 进入负数格时，可以选择承受损失或消耗一次抵消机会。

## 3423. Maximum Difference Between Adjacent Elements in a Circular Array (Maximum Difference Between Adjacent Elements in a Circular Array)
**Difficulty**: easy | **Key Concept**: array, circular array

**Original Problem**:
Return the maximum absolute difference between adjacent elements in a circular array.
中文翻译：返回环形数组中任意相邻元素绝对差的最大值。

**Example**:
Input: nums = [1,2,4]
Output: 3

```java
class Solution {
  public int maxAdjacentDistance(int[] nums) {
    int ans = 0, n = nums.length;
    for (int i = 0; i < n; i++) ans = Math.max(ans, Math.abs(nums[i] - nums[(i + 1) % n]));
    return ans;
  }
}
```

Explanation:
- 环形相邻只需把最后一个和第一个也检查一次。
- 取所有相邻绝对差的最大值。

## 3428. Maximum and Minimum Sums of at Most Size K Subsequences (Maximum and Minimum Sums of at Most Size K Subsequences)
**Difficulty**: medium | **Key Concept**: combinatorics, sorting

**Original Problem**:
Return the sum of maximum and minimum values over all subsequences with size at most `k`.
中文翻译：返回所有长度不超过 k 的子序列中，最大值与最小值之和的总和。

**Example**:
Input: nums = [1,2,3], k = 2
Output: 24

```java
class Solution {
  public int minMaxSums(int[] nums, int k) {
    long mod = 1000000007L;
    Arrays.sort(nums);
    int n = nums.length;
    long[][] c = new long[n + 1][k];
    for (int i = 0; i <= n; i++) {
      c[i][0] = 1;
      for (int j = 1; j < k && j <= i; j++) c[i][j] = (c[i - 1][j - 1] + c[i - 1][j]) % mod;
    }
    long[] ways = new long[n + 1];
    for (int i = 0; i <= n; i++) {
      for (int j = 0; j < k && j <= i; j++) ways[i] = (ways[i] + c[i][j]) % mod;
    }
    long ans = 0;
    for (int i = 0; i < n; i++) {
      ans = (ans + nums[i] * (ways[i] + ways[n - 1 - i])) % mod;
    }
    return (int) ans;
  }
}
```

Explanation:
- 排序后，nums[i] 作为最大值时可从左侧选最多 k-1 个数；作为最小值同理看右侧。
- 预处理组合数前缀方案，累加每个元素的最大/最小贡献。

## 3429. Paint House IV (Paint House IV)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Paint houses with 3 colors so adjacent houses and symmetric houses have different colors, minimizing total cost.
中文翻译：用 3 种颜色粉刷房子，要求相邻和对称房子颜色不同，求最小总成本。

**Example**:
Input: n = 4, cost = [[3,5,7],[6,2,9],[4,8,1],[7,3,5]]
Output: 9

```java
class Solution {
  public long minCost(int n, int[][] cost) {
    long inf = Long.MAX_VALUE / 4;
    long[][] dp = new long[3][3];
    for (long[] row : dp) Arrays.fill(row, inf);
    for (int a = 0; a < 3; a++) {
      for (int b = 0; b < 3; b++) {
        if (a != b) dp[a][b] = cost[0][a] + cost[n - 1][b];
      }
    }
    for (int i = 1; i < n / 2; i++) {
      long[][] ndp = new long[3][3];
      for (long[] row : ndp) Arrays.fill(row, inf);
      for (int pa = 0; pa < 3; pa++) {
        for (int pb = 0; pb < 3; pb++) {
          for (int a = 0; a < 3; a++) {
            for (int b = 0; b < 3; b++) {
              if (a != b && a != pa && b != pb) ndp[a][b] = Math.min(ndp[a][b], dp[pa][pb] + cost[i][a] + cost[n - 1 - i][b]);
            }
          }
        }
      }
      dp = ndp;
    }
    long ans = inf;
    for (long[] row : dp) for (long v : row) ans = Math.min(ans, v);
    return ans;
  }
}
```

Explanation:
- 每次同时处理一对对称房子，状态记录上一对左右颜色。
- 新颜色需左右不同，也不能和各自相邻的上一层颜色相同。

## 3433. Count Mentions Per User (Count Mentions Per User)
**Difficulty**: medium | **Key Concept**: simulation, sorting

**Original Problem**:
Given message and offline events, count how many times each user is mentioned.
中文翻译：给定消息和离线事件，统计每个用户被提及的次数。

**Example**:
Input: numberOfUsers = 2, events = [["MESSAGE","10","id1"],["OFFLINE","11","0"],["MESSAGE","71","HERE"]]
Output: [1,2]

```java
class Solution {
  public int[] countMentions(int numberOfUsers, List<List<String>> events) {
    events.sort((a, b) -> {
      int ta = Integer.parseInt(a.get(1)), tb = Integer.parseInt(b.get(1));
      if (ta != tb) return ta - tb;
      if (a.get(0).equals(b.get(0))) return 0;
      return a.get(0).equals("OFFLINE") ? -1 : 1;
    });
    int[] ans = new int[numberOfUsers], onlineAt = new int[numberOfUsers];
    for (List<String> e : events) {
      int time = Integer.parseInt(e.get(1));
      if (e.get(0).equals("OFFLINE")) {
        onlineAt[Integer.parseInt(e.get(2))] = time + 60;
      } else if (e.get(2).equals("ALL")) {
        for (int i = 0; i < numberOfUsers; i++) ans[i]++;
      } else if (e.get(2).equals("HERE")) {
        for (int i = 0; i < numberOfUsers; i++) if (onlineAt[i] <= time) ans[i]++;
      } else {
        for (String part : e.get(2).split(" ")) ans[Integer.parseInt(part.substring(2))]++;
      }
    }
    return ans;
  }
}
```

Explanation:
- 按时间排序，同一时间先处理离线事件。
- `ALL` 提及所有人，`HERE` 只提及当前在线用户，显式 id 不受在线状态影响。

## 3434. Maximum Frequency After Subarray Operation (Maximum Frequency After Subarray Operation)
**Difficulty**: medium | **Key Concept**: Kadane, greedy

**Original Problem**:
Choose one subarray and add one integer to all its elements. Maximize the frequency of `k`.
中文翻译：选择一个子数组并整体加同一个整数，最大化数组中 k 的出现次数。

**Example**:
Input: nums = [1,2,3,4,5,6], k = 1
Output: 2

```java
class Solution {
  public int maxFrequency(int[] nums, int k) {
    int base = 0, best = 0;
    for (int x : nums) if (x == k) base++;
    for (int v = 1; v <= 50; v++) {
      if (v == k) continue;
      int cur = 0;
      for (int x : nums) {
        if (x == v) cur++;
        else if (x == k) cur--;
        if (cur < 0) cur = 0;
        best = Math.max(best, cur);
      }
    }
    return base + best;
  }
}
```

Explanation:
- 把某个值 v 通过一次操作变成 k，子数组内 v 是收益，原本的 k 是损失。
- 对每个 v 做最大子数组和，叠加原本 k 的数量。

## 3439. Reschedule Meetings for Maximum Free Time I (Reschedule Meetings for Maximum Free Time I)
**Difficulty**: medium | **Key Concept**: sliding window

**Original Problem**:
Reschedule at most `k` meetings while preserving order and duration to maximize one continuous free time interval.
中文翻译：最多重排 k 个会议，保持顺序和时长，最大化一段连续空闲时间。

**Example**:
Input: eventTime = 5, k = 1, startTime = [1,3], endTime = [2,5]
Output: 2

```java
class Solution {
  public int maxFreeTime(int eventTime, int k, int[] startTime, int[] endTime) {
    int n = startTime.length;
    int[] gap = new int[n + 1];
    gap[0] = startTime[0];
    for (int i = 1; i < n; i++) gap[i] = startTime[i] - endTime[i - 1];
    gap[n] = eventTime - endTime[n - 1];
    int sum = 0, ans = 0;
    for (int i = 0; i < gap.length; i++) {
      sum += gap[i];
      if (i > k) sum -= gap[i - k - 1];
      ans = Math.max(ans, sum);
    }
    return ans;
  }
}
```

Explanation:
- 移动 k 个连续会议，可以合并它们周围的 k+1 个空隙。
- 对 gap 数组求长度 k+1 的最大滑动窗口和。

## 3440. Reschedule Meetings for Maximum Free Time II (Reschedule Meetings for Maximum Free Time II)
**Difficulty**: medium | **Key Concept**: prefix max, greedy

**Original Problem**:
Move at most one meeting to another free slot while preserving duration, maximizing continuous free time.
中文翻译：最多把一个会议移动到其他空位，保持时长，最大化连续空闲时间。

**Example**:
Input: eventTime = 5, startTime = [1,3], endTime = [2,5]
Output: 2

```java
class Solution {
  public int maxFreeTime(int eventTime, int[] startTime, int[] endTime) {
    int n = startTime.length;
    int[] gap = new int[n + 1], pre = new int[n + 1], suf = new int[n + 1];
    gap[0] = startTime[0];
    for (int i = 1; i < n; i++) gap[i] = startTime[i] - endTime[i - 1];
    gap[n] = eventTime - endTime[n - 1];
    pre[0] = gap[0];
    for (int i = 1; i <= n; i++) pre[i] = Math.max(pre[i - 1], gap[i]);
    suf[n] = gap[n];
    for (int i = n - 1; i >= 0; i--) suf[i] = Math.max(suf[i + 1], gap[i]);
    int ans = 0;
    for (int i = 0; i < n; i++) {
      int dur = endTime[i] - startTime[i];
      int merged = gap[i] + gap[i + 1];
      int other = Math.max(i >= 1 ? pre[i - 1] : 0, i + 2 <= n ? suf[i + 2] : 0);
      ans = Math.max(ans, merged + (other >= dur ? dur : 0));
    }
    return ans;
  }
}
```

Explanation:
- 移走第 i 个会议会合并它左右两个空隙。
- 若其他位置能容纳该会议，还能把原会议时长也变成空闲时间。

## 3443. Maximum Manhattan Distance After K Changes (Maximum Manhattan Distance After K Changes)
**Difficulty**: medium | **Key Concept**: greedy, prefix

**Original Problem**:
Given a movement string and at most `k` direction changes, return the maximum Manhattan distance from origin at any time.
中文翻译：给定移动字符串，最多改 k 个方向，返回任意时刻离原点的最大曼哈顿距离。

**Example**:
Input: s = "NWSE", k = 1
Output: 3

```java
class Solution {
  public int maxDistance(String s, int k) {
    int ans = 0, n = 0, so = 0, e = 0, w = 0, len = 0;
    for (char ch : s.toCharArray()) {
      len++;
      if (ch == 'N') n++;
      else if (ch == 'S') so++;
      else if (ch == 'E') e++;
      else w++;
      ans = Math.max(ans, best(len, n, e, k));
      ans = Math.max(ans, best(len, n, w, k));
      ans = Math.max(ans, best(len, so, e, k));
      ans = Math.max(ans, best(len, so, w, k));
    }
    return ans;
  }

  private int best(int len, int a, int b, int k) {
    int good = a + b;
    int bad = len - good;
    return good - bad + 2 * Math.min(k, bad);
  }
}
```

Explanation:
- 枚举希望远离原点的四个方向组合，如 NE、NW。
- 当前前缀中不属于目标方向的移动是坏步，最多改 k 个，每个让距离增加 2。

## 3445. Maximum Difference Between Even and Odd Frequency II (Maximum Difference Between Even and Odd Frequency II)
**Difficulty**: hard | **Key Concept**: prefix sum, parity

**Original Problem**:
Find the maximum `freq[a] - freq[b]` over substrings of length at least `k`, where `freq[a]` is odd and `freq[b]` is even and positive.
中文翻译：在长度至少 k 的子串中，找 `freq[a]-freq[b]` 最大值，其中 a 频次为奇数，b 频次为正偶数。

**Example**:
Input: s = "12233", k = 4
Output: -1

```java
class Solution {
  public int maxDifference(String s, int k) {
    int n = s.length(), ans = Integer.MIN_VALUE;
    for (int a = 0; a < 5; a++) {
      for (int b = 0; b < 5; b++) {
        if (a == b) continue;
        int[] pa = new int[n + 1], pb = new int[n + 1];
        for (int i = 0; i < n; i++) {
          pa[i + 1] = pa[i] + (s.charAt(i) - '0' == a ? 1 : 0);
          pb[i + 1] = pb[i] + (s.charAt(i) - '0' == b ? 1 : 0);
        }
        int[][] best = {{1000000, 1000000}, {1000000, 1000000}};
        int left = 0;
        for (int r = 0; r <= n; r++) {
          while (r - left >= k && pb[left] <= pb[r] - 2) {
            int x = pa[left] & 1, y = pb[left] & 1;
            best[x][y] = Math.min(best[x][y], pa[left] - pb[left]);
            left++;
          }
          int needA = 1 - (pa[r] & 1), needB = pb[r] & 1;
          ans = Math.max(ans, pa[r] - pb[r] - best[needA][needB]);
        }
      }
    }
    return ans;
  }
}
```

Explanation:
- 枚举数字 a、b，用前缀频次差表示子串贡献。
- 按前缀奇偶状态维护最小 `pa-pb`，并保证长度与 b 的正偶数条件。

## 3453. Separate Squares I (Separate Squares I)
**Difficulty**: medium | **Key Concept**: binary search, geometry

**Original Problem**:
Given axis-aligned squares, find the horizontal line such that total square area above and below are equal.
中文翻译：给定若干正方形，求一条水平线，使线上下方覆盖的正方形面积总和相等。

**Example**:
Input: squares = [[0,0,1],[2,2,1]]
Output: 1.00000

```java
class Solution {
  public double separateSquares(int[][] squares) {
    double low = 0, high = 0, total = 0;
    for (int[] s : squares) {
      high = Math.max(high, s[1] + s[2]);
      total += (double) s[2] * s[2];
    }
    for (int t = 0; t < 80; t++) {
      double mid = (low + high) / 2, below = 0;
      for (int[] s : squares) {
        double h = Math.min(Math.max(mid - s[1], 0), s[2]);
        below += h * s[2];
      }
      if (below * 2 >= total) high = mid;
      else low = mid;
    }
    return high;
  }
}
```

Explanation:
- 水平线越高，下方面积越大，满足单调性。
- 二分高度，计算每个正方形在线下的部分面积。

## 3478. Choose K Elements With Maximum Sum (Choose K Elements With Maximum Sum)
**Difficulty**: medium | **Key Concept**: sorting, heap

**Original Problem**:
For each index, choose up to `k` values from `nums2[j]` where `nums1[j] < nums1[i]`, maximizing the sum.
中文翻译：对每个下标，从所有 `nums1[j] < nums1[i]` 的位置选最多 k 个 nums2 值，求最大和。

**Example**:
Input: nums1 = [4,2,1,5,3], nums2 = [10,20,30,40,50], k = 2
Output: [80,30,0,80,50]

```java
class Solution {
  public long[] findMaxSum(int[] nums1, int[] nums2, int k) {
    int n = nums1.length;
    int[][] arr = new int[n][3];
    for (int i = 0; i < n; i++) arr[i] = new int[] {nums1[i], nums2[i], i};
    Arrays.sort(arr, (a, b) -> a[0] - b[0]);
    long[] ans = new long[n];
    PriorityQueue<Integer> pq = new PriorityQueue<>();
    long sum = 0;
    for (int i = 0, j = 0; i < n; i++) {
      while (j < n && arr[j][0] < arr[i][0]) {
        pq.offer(arr[j][1]);
        sum += arr[j][1];
        if (pq.size() > k) sum -= pq.poll();
        j++;
      }
      ans[arr[i][2]] = sum;
    }
    return ans;
  }
}
```

Explanation:
- 按 nums1 排序，扫描时堆里维护严格小于当前 nums1 的候选 nums2。
- 小根堆只保留最大的 k 个值，并维护它们的和。

## 3479. Fruits Into Baskets III (Fruits Into Baskets III)
**Difficulty**: medium | **Key Concept**: segment tree, greedy

**Original Problem**:
Place each fruit into the leftmost unused basket with capacity at least that fruit, and return unplaced count.
中文翻译：每个水果放入最左侧且容量足够的未用篮子，返回无法放入的水果数量。

**Example**:
Input: fruits = [4,2,5], baskets = [3,5,4]
Output: 1

```java
class Solution {
  int[] tree;
  int n;

  public int numOfUnplacedFruits(int[] fruits, int[] baskets) {
    n = baskets.length;
    tree = new int[4 * n];
    build(baskets, 1, 0, n - 1);
    int ans = 0;
    for (int f : fruits) {
      int idx = find(1, 0, n - 1, f);
      if (idx == -1) ans++;
      else update(1, 0, n - 1, idx, 0);
    }
    return ans;
  }

  private void build(int[] a, int node, int l, int r) {
    if (l == r) {
      tree[node] = a[l];
      return;
    }
    int m = (l + r) / 2;
    build(a, node * 2, l, m);
    build(a, node * 2 + 1, m + 1, r);
    tree[node] = Math.max(tree[node * 2], tree[node * 2 + 1]);
  }

  private int find(int node, int l, int r, int need) {
    if (tree[node] < need) return -1;
    if (l == r) return l;
    int m = (l + r) / 2;
    int left = find(node * 2, l, m, need);
    return left != -1 ? left : find(node * 2 + 1, m + 1, r, need);
  }

  private void update(int node, int l, int r, int idx, int val) {
    if (l == r) {
      tree[node] = val;
      return;
    }
    int m = (l + r) / 2;
    if (idx <= m) update(node * 2, l, m, idx, val);
    else update(node * 2 + 1, m + 1, r, idx, val);
    tree[node] = Math.max(tree[node * 2], tree[node * 2 + 1]);
  }
}
```

Explanation:
- 线段树维护每段篮子的最大容量。
- 对每个水果在线段树中找最左可用篮子，使用后把该位置容量置 0。

## 3480. Maximize Subarrays After Removing One Conflicting Pair (Maximize Subarrays After Removing One Conflicting Pair)
**Difficulty**: hard | **Key Concept**: greedy, contribution

**Original Problem**:
Given conflicting pairs, remove exactly one pair to maximize the number of subarrays containing no conflicting pair.
中文翻译：给定冲突数对，删除一个冲突对后，最大化不包含任何冲突对的子数组数量。

**Example**:
Input: n = 4, conflictingPairs = [[2,3],[1,4]]
Output: 9

```java
class Solution {
  public long maxSubarrays(int n, int[][] conflictingPairs) {
    List<Integer>[] byRight = new ArrayList[n + 1];
    for (int i = 0; i <= n; i++) byRight[i] = new ArrayList<>();
    for (int[] p : conflictingPairs) {
      int a = Math.min(p[0], p[1]), b = Math.max(p[0], p[1]);
      byRight[b].add(a);
    }
    long total = 0;
    long[] gain = new long[n + 1];
    int first = 0, second = 0;
    for (int r = 1; r <= n; r++) {
      for (int l : byRight[r]) {
        if (l > first) {
          second = first;
          first = l;
        } else if (l > second) {
          second = l;
        }
      }
      total += r - first;
      gain[first] += first - second;
    }
    long best = 0;
    for (long g : gain) best = Math.max(best, g);
    return total + best;
  }
}
```

Explanation:
- 对每个右端点，最大冲突左端 first 决定合法起点下界。
- 删除造成 first 的某个冲突时，可恢复到 second，累加这部分增益。

## 3487. Maximum Unique Subarray Sum After Deletion (Maximum Unique Subarray Sum After Deletion)
**Difficulty**: easy | **Key Concept**: hashset, greedy

**Original Problem**:
Delete any elements, then choose a non-empty subarray with unique elements. Return the maximum sum.
中文翻译：可删除任意元素，再选择一个非空且元素互不相同的子数组，返回最大和。

**Example**:
Input: nums = [1,2,3,4,5]
Output: 15

```java
class Solution {
  public int maxSum(int[] nums) {
    Set<Integer> set = new HashSet<>();
    int sum = 0, max = Integer.MIN_VALUE;
    for (int x : nums) {
      max = Math.max(max, x);
      if (x > 0 && set.add(x)) sum += x;
    }
    return sum > 0 ? sum : max;
  }
}
```

Explanation:
- 删除后可把所有不同正数拼成最佳子数组。
- 若没有正数，只能保留最大的单个数。

## 3494. Find the Minimum Amount of Time to Brew Potions (Find the Minimum Amount of Time to Brew Potions)
**Difficulty**: medium | **Key Concept**: scheduling, greedy

**Original Problem**:
Wizards brew potions in order; wizard `i` spends `skill[i] * mana[j]` time on potion `j`. Return minimum finish time.
中文翻译：巫师按顺序酿药，第 i 个巫师处理第 j 瓶药耗时 `skill[i]*mana[j]`，返回最早完成时间。

**Example**:
Input: skill = [1,5,2,4], mana = [5,1,4,2]
Output: 110

```java
class Solution {
  public long minTime(int[] skill, int[] mana) {
    int n = skill.length;
    long[] end = new long[n];
    for (int m : mana) {
      long start = 0, prefix = 0;
      for (int i = 0; i < n; i++) {
        start = Math.max(start, end[i] - prefix);
        prefix += (long) skill[i] * m;
      }
      prefix = 0;
      for (int i = 0; i < n; i++) {
        prefix += (long) skill[i] * m;
        end[i] = start + prefix;
      }
    }
    return end[n - 1];
  }
}
```

Explanation:
- 对每瓶药求最早开始时间，保证它经过每个巫师时都不和上一瓶冲突。
- 确定开始时间后，按前缀耗时更新每个巫师的完成时间。

## 3495. Minimum Operations to Make Array Elements Zero (Minimum Operations to Make Array Elements Zero)
**Difficulty**: hard | **Key Concept**: math, digit length

**Original Problem**:
For each query range, numbers repeatedly become `floor(x / 4)`. One operation can process two numbers. Return total minimum operations.
中文翻译：每个查询区间内的数需反复变为 `floor(x/4)` 到 0，一次操作可处理两个数，返回总最少操作数。

**Example**:
Input: queries = [[1,2],[2,4]]
Output: 3

```java
class Solution {
  public long minOperations(int[][] queries) {
    long ans = 0;
    for (int[] q : queries) {
      long steps = count(q[1]) - count(q[0] - 1);
      ans += (steps + 1) / 2;
    }
    return ans;
  }

  private long count(long n) {
    long ans = 0, start = 1;
    for (int step = 1; start <= n; step++, start *= 4) {
      long end = Math.min(n, start * 4 - 1);
      ans += (end - start + 1) * step;
    }
    return ans;
  }
}
```

Explanation:
- 数字 x 变为 0 所需次数等于它在 4 进制下的位数。
- 区间总次数除以每次可处理两个数，向上取整。

## 3507. Minimum Pair Removal to Sort Array I (Minimum Pair Removal to Sort Array I)
**Difficulty**: easy | **Key Concept**: simulation

**Original Problem**:
Repeatedly replace the adjacent pair with the smallest sum by their sum until the array is non-decreasing. Return operations.
中文翻译：反复把和最小的相邻对替换为它们的和，直到数组非递减，返回操作次数。

**Example**:
Input: nums = [5,2,3,1]
Output: 2

```java
class Solution {
  public int minimumPairRemoval(int[] nums) {
    List<Long> list = new ArrayList<>();
    for (int x : nums) list.add((long) x);
    int ans = 0;
    while (!sorted(list)) {
      int idx = 0;
      long best = Long.MAX_VALUE;
      for (int i = 0; i + 1 < list.size(); i++) {
        long sum = list.get(i) + list.get(i + 1);
        if (sum < best) {
          best = sum;
          idx = i;
        }
      }
      list.set(idx, best);
      list.remove(idx + 1);
      ans++;
    }
    return ans;
  }

  private boolean sorted(List<Long> list) {
    for (int i = 1; i < list.size(); i++) if (list.get(i) < list.get(i - 1)) return false;
    return true;
  }
}
```

Explanation:
- I 版本可直接按题意模拟。
- 每轮找最小相邻和并替换，直到检查为非递减。

## 3516. Find Closest Person (Find Closest Person)

Two people at `x` and `y` move toward `z`. Return who reaches first, or `0` if tied.

class Solution {

## 3542. Minimum Operations to Convert All Elements to Zero (Minimum Operations to Convert All Elements to Zero)
**Difficulty**: medium | **Key Concept**: monotonic stack

**Original Problem**:
Use operations on subarrays to turn all elements into zero. Return the minimum number of operations.
中文翻译：通过对子数组执行操作把所有元素变成 0，返回最少操作次数。

**Example**:
Input: nums = [3,1,2,1]
Output: 3

```java
class Solution {
  public int minOperations(int[] nums) {
    Deque<Integer> st = new ArrayDeque<>();
    int ans = 0;
    for (int x : nums) {
      while (!st.isEmpty() && st.peek() > x) st.pop();
      if (x > 0 && (st.isEmpty() || st.peek() < x)) {
        st.push(x);
        ans++;
      }
    }
    return ans;
  }
}
```

Explanation:
- 单调栈记录当前还没被更小值截断的正数层级。
- 出现新的正层级需要一次操作，遇到更小值则弹出被截断层级。

## 3547. Maximum Sum of Edge Values in a Graph (Maximum Sum of Edge Values in a Graph)
**Difficulty**: hard | **Key Concept**: graph, greedy

**Original Problem**:
Assign unique values `1..n` to nodes of a connected graph with degree at most 2 to maximize sum of edge products.
中文翻译：给度数最多为 2 的连通图节点分配 `1..n` 的唯一值，使所有边两端乘积和最大。

**Example**:
Input: n = 4, edges = [[0,1],[1,2],[2,3]]
Output: 23

```java
class Solution {
  public long maxScore(int n, int[][] edges) {
    boolean cycle = edges.length == n;
    Deque<Long> window = new ArrayDeque<>();
    window.offerLast((long) n);
    window.offerLast((long) n);
    long ans = 0;
    for (int v = n - 1; v >= 1; v--) {
      long cur = window.pollFirst();
      ans += cur * v;
      window.offerLast((long) v);
    }
    return cycle ? ans + window.peekFirst() * window.peekLast() : ans;
  }
}
```

Explanation:
- 连通且每点度数最多 2，因此图只可能是链或环。
- 最优排列可用最高值向两侧交替扩展；环额外加首尾边贡献。

## 3557. Find Maximum Number of Non Intersecting Substrings (Find Maximum Number of Non Intersecting Substrings)
**Difficulty**: medium | **Key Concept**: greedy, string

**Original Problem**:
Return the maximum number of non-overlapping substrings of length at least 4 that start and end with the same letter.
中文翻译：返回最多能选多少个不重叠子串，要求长度至少 4 且首尾字符相同。

**Example**:
Input: word = "abcdeafdef"
Output: 2

```java
class Solution {
  public int maxSubstrings(String word) {
    int[] first = new int[26];
    Arrays.fill(first, -1);
    int ans = 0;
    for (int i = 0; i < word.length(); i++) {
      int c = word.charAt(i) - 'a';
      if (first[c] == -1) first[c] = i;
      if (i - first[c] + 1 >= 4) {
        ans++;
        Arrays.fill(first, -1);
      }
    }
    return ans;
  }
}
```

Explanation:
- 为了最大数量，遇到最早能结束的合法子串就贪心选择。
- 选中后清空当前记录，保证后续子串不重叠。

## 3568. Minimum Moves to Clean the Classroom (Minimum Moves to Clean the Classroom)
**Difficulty**: medium | **Key Concept**: BFS, bitmask

**Original Problem**:
Move in a classroom grid with limited energy, collect all litter, recharge on reset cells, and return minimum moves.
中文翻译：在教室网格中移动，能量有限，要收集所有垃圾，可在充能格重置能量，返回最少步数。

**Example**:
Input: classroom = ["S.", "XL"], energy = 2
Output: 2

```java
class Solution {
  public int minMoves(String[] classroom, int energy) {
    int m = classroom.length, n = classroom[0].length(), sr = 0, sc = 0, id = 0;
    int[][] lid = new int[m][n];
    for (int[] row : lid) Arrays.fill(row, -1);
    for (int r = 0; r < m; r++) {
      for (int c = 0; c < n; c++) {
        char ch = classroom[r].charAt(c);
        if (ch == 'S') {
          sr = r;
          sc = c;
        } else if (ch == 'L') {
          lid[r][c] = id++;
        }
      }
    }
    int full = (1 << id) - 1;
    if (full == 0) return 0;
    boolean[][][][] seen = new boolean[m][n][1 << id][energy + 1];
    Queue<int[]> q = new ArrayDeque<>();
    q.offer(new int[] {sr, sc, 0, energy, 0});
    seen[sr][sc][0][energy] = true;
    int[][] dirs = {{1, 0}, {-1, 0}, {0, 1}, {0, -1}};
    while (!q.isEmpty()) {
      int[] cur = q.poll();
      for (int[] d : dirs) {
        int r = cur[0] + d[0], c = cur[1] + d[1], e = cur[3] - 1;
        if (r < 0 || r == m || c < 0 || c == n || classroom[r].charAt(c) == 'X' || e < 0) continue;
        int mask = cur[2];
        if (lid[r][c] >= 0) mask |= 1 << lid[r][c];
        if (mask == full) return cur[4] + 1;
        if (classroom[r].charAt(c) == 'R') e = energy;
        if (!seen[r][c][mask][e]) {
          seen[r][c][mask][e] = true;
          q.offer(new int[] {r, c, mask, e, cur[4] + 1});
        }
      }
    }
    return -1;
  }
}
```

Explanation:
- 状态包含位置、已收集垃圾 mask、剩余能量。
- BFS 保证第一次收集完所有垃圾时步数最少，遇到 R 重置能量。

## 3582. Generate Tag for Video Caption (Generate Tag for Video Caption)
**Difficulty**: easy | **Key Concept**: string

**Original Problem**:
Generate a hashtag from a caption using camelCase and limit it to 100 characters.
中文翻译：根据视频标题生成 hashtag，使用小驼峰格式并限制最多 100 个字符。

**Example**:
Input: caption = "Leetcode daily streak achieved"
Output: "#leetcodeDailyStreakAchieved"

```java
class Solution {
  public String generateTag(String caption) {
    StringBuilder sb = new StringBuilder("#");
    String[] words = caption.trim().toLowerCase().split("\\s+");
    for (int i = 0; i < words.length; i++) {
      if (words[i].isEmpty()) continue;
      for (int j = 0; j < words[i].length(); j++) {
        char ch = words[i].charAt(j);
        if (i > 0 && j == 0) ch = Character.toUpperCase(ch);

      }
    }
    return sb.toString();
  }
}
```

Explanation:
- 先转小写并按空格分词，首词小写，后续词首字母大写。
- 构造时控制总长度不超过 100。

## 3583. Count Special Triplets (Count Special Triplets)
**Difficulty**: medium | **Key Concept**: hashmap, counting

**Original Problem**:
Count triplets `(i,j,k)` where `i < j < k` and `nums[i] == nums[j] * 2` and `nums[k] == nums[j] * 2`.
中文翻译：统计三元组 `(i,j,k)`，满足 `i<j<k` 且两侧元素都等于中间元素的两倍。

**Example**:
Input: nums = [6,3,6]
Output: 1

```java
class Solution {
  public int specialTriplets(int[] nums) {
    long mod = 1000000007L, ans = 0;
    Map<Integer, Long> left = new HashMap<>(), right = new HashMap<>();
    for (int x : nums) right.put(x, right.getOrDefault(x, 0L) + 1);
    for (int x : nums) {
      right.put(x, right.get(x) - 1);
      ans = (ans + left.getOrDefault(x * 2, 0L) * right.getOrDefault(x * 2, 0L)) % mod;
      left.put(x, left.getOrDefault(x, 0L) + 1);
    }
    return (int) ans;
  }
}
```

Explanation:
- 枚举中间元素 j，左侧和右侧都需要值 `2*nums[j]`。
- 哈希表分别维护已扫过和未扫过的频次。

## 3609. Minimum Moves to Reach Target in Grid (Minimum Moves to Reach Target in Grid)
**Difficulty**: hard | **Key Concept**: math, reverse simulation

**Original Problem**:
From `(x,y)`, move to `(x+max(x,y),y)` or `(x,y+max(x,y))`. Return minimum moves from start to target.
中文翻译：从 `(x,y)` 可把较大值加到任一坐标上，求从起点到目标的最少步数。

**Example**:
Input: sx = 1, sy = 2, tx = 5, ty = 4
Output: 2

```java
class Solution {
  public int minMoves(int sx, int sy, int tx, int ty) {
    int ans = 0;
    while (tx >= sx && ty >= sy) {
      if (tx == sx && ty == sy) return ans;
      if (tx == ty) {
        if (sx == 0 && sy == ty || sy == 0 && sx == tx) return ans + 1;
        return -1;
      }
      if (tx > ty) {
        if (tx >= 2L * ty) {
          if (tx % 2 == 1) return -1;
          tx /= 2;
        } else {
          tx -= ty;
        }
      } else {
        if (ty >= 2L * tx) {
          if (ty % 2 == 1) return -1;
          ty /= 2;
        } else {
          ty -= tx;
        }
      }
      ans++;
    }
    return -1;
  }
}
```

Explanation:
- 从目标反推更简单：较大坐标要么由翻倍而来，要么减去较小坐标。
- 每次按可逆规则缩小目标，直到到达起点或越界。

## 3703. Remove K-Balanced Substrings (Remove K-Balanced Substrings)
**Difficulty**: medium | **Key Concept**: stack, string

**Original Problem**:
Repeatedly remove all non-overlapping substrings equal to `k` `'('` followed by `k` `')'`.
中文翻译：反复删除所有不重叠的 k 个左括号后接 k 个右括号的子串，返回最终字符串。

**Example**:
Input: s = "(())", k = 1
Output: ""

```java
class Solution {
  public String removeSubstring(String s, int k) {
    List<int[]> st = new ArrayList<>();
    for (char ch : s.toCharArray()) {
      if (!st.isEmpty() && st.get(st.size() - 1)[0] == ch) st.get(st.size() - 1)[1]++;
      else st.add(new int[] {ch, 1});
      int m = st.size();
      if (ch == ')' && m >= 2 && st.get(m - 1)[1] == k && st.get(m - 2)[0] == '(' && st.get(m - 2)[1] >= k) {
        st.remove(m - 1);
        st.get(m - 2)[1] -= k;
        if (st.get(m - 2)[1] == 0) st.remove(m - 2);
      }
    }
    StringBuilder sb = new StringBuilder();
    for (int[] p : st) for (int i = 0; i < p[1]; i++) sb.append((char) p[0]);
    return sb.toString();
  }
}
```

Explanation:
- 用栈保存当前字符串的连续字符段。
- 当栈顶是 k 个 `)` 且前一段至少有 k 个 `(` 时，立即消去一段 k-balanced 子串。

## 3713. Longest Balanced Substring I (Longest Balanced Substring I)
**Difficulty**: medium | **Key Concept**: enumeration, counting

**Original Problem**:
A substring is balanced if all distinct characters in it appear the same number of times. Return the longest length.
中文翻译：若子串中所有出现过的字符频次都相同，则为平衡子串，返回最长长度。

**Example**:
Input: s = "abbac"
Output: 4

```java
class Solution {
  public int longestBalanced(String s) {
    int n = s.length(), ans = 0;
    for (int i = 0; i < n; i++) {
      int[] cnt = new int[26];
      for (int j = i; j < n; j++) {
        cnt[s.charAt(j) - 'a']++;
        if (balanced(cnt)) ans = Math.max(ans, j - i + 1);
      }
    }
    return ans;
  }

  private boolean balanced(int[] cnt) {
    int need = 0;
    for (int c : cnt) {
      if (c == 0) continue;
      if (need == 0) need = c;
      else if (c != need) return false;
    }
    return true;
  }
}
```

Explanation:
- I 版本长度较小，可枚举所有子串并维护字符频次。
- 检查所有非零频次是否相同，更新最长长度。
</script>
  <script>
    marked.setOptions({
      gfm: true,
      breaks: false
    });

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function slugify(str) {
      return String(str)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '');
    }

    const CATEGORY_KEYWORDS = {
      'Dynamic Programming': [
        ['dynamic programming', 6], ['dp', 5], ['memo', 5], ['memoization', 5], ['stock', 4],
        ['knapsack', 4], ['subsequence', 4], ['partition', 4], ['coin change', 4]
      ],
      'Backtracking & Trie': [
        ['backtracking', 6], ['trie', 6], ['permut', 5], ['combinat', 5], ['word search', 5], ['n-queen', 5]
      ],
      'Graph & BFS': [
        ['graph', 6], ['bfs', 5], ['dijkstra', 5], ['topological', 5], ['euler', 5],
        ['shortest path', 5], ['union find', 4], ['connected', 4], ['infected', 4], ['islands', 4]
      ],
      'DFS & Tree': [
        ['tree', 6], ['binary tree', 6], ['dfs', 5], ['traversal', 4], ['inorder', 4],
        ['postorder', 4], ['preorder', 4], ['lca', 4], ['path sum', 4]
      ],
      'String & Simulation': [
        ['string', 6], ['simulation', 5], ['palindrome', 5], ['parentheses', 4],
        ['regex', 4], ['zigzag', 4], ['decode', 4], ['anagram', 4], ['roman', 4], ['count and say', 4]
      ],
      'Array & Two Pointers': [
        ['array', 5], ['sliding window', 6], ['two pointers', 6], ['prefix sum', 5],
        ['subarray', 4], ['deque', 3], ['monotonic', 3], ['product of array', 4], ['trapping rain water', 4]
      ],
      'Design & Data Structures': [
        ['design', 6], ['linked list', 5], ['queue', 4], ['stack', 4], ['cache', 4],
        ['random', 3], ['lfu', 4], ['lru', 4], ['median', 4], ['word dictionary', 4]
      ],
      'Sorting & Greedy': [
        ['sort', 5], ['interval', 5], ['greedy', 5], ['priority queue', 5], ['merge interval', 5],
        ['min heap', 4], ['max heap', 4], ['meeting rooms', 4], ['events', 4]
      ],
      'HashMap & Set': [
        ['hashmap', 6], ['hash set', 6], ['frequency', 5], ['occurrences', 5], ['counter', 4],
        ['majority', 4], ['group anagrams', 4], ['top k frequent', 4]
      ],
      'Binary Search & Math': [
        ['binary search', 6], ['math', 4], ['mod', 3], ['sqrt', 4], ['gcd', 4], ['prime', 4], ['number theory', 4], ['pow', 3], ['log', 3]
      ]
    };

    function classifySection(text, currentCounts, totalSections) {
      const s = text.toLowerCase();
      const scored = Object.entries(CATEGORY_KEYWORDS).map(([name, rules]) => {
        const score = rules.reduce((sum, [word, weight]) => sum + (s.includes(word) ? weight : 0), 0);
        return { name, score };
      }).filter(item => item.score > 0);

      if (!scored.length) return 'Binary Search & Math';

      const targetCount = Math.max(1, Math.floor((totalSections || 1) / 10));
      const best = scored
        .sort((a, b) => {
          const countA = currentCounts.get(a.name) || 0;
          const countB = currentCounts.get(b.name) || 0;
          const balanceA = (targetCount - countA) * 12 + a.score;
          const balanceB = (targetCount - countB) * 12 + b.score;
          return balanceB - balanceA;
        })[0];

      return best.name;
    }

    const text = document.getElementById('notes-data').textContent;

    try {
        const lines = text.split('\n');
        const sections = [];
        let current = [];
        lines.forEach((line) => {
          if (/^##\s+\d+\./.test(line)) {
            if (current.length) sections.push(current);
            current = [line];
          } else if (current.length) {
            current.push(line);
          }
        });
        if (current.length) sections.push(current);

        let total = 0;
        let easy = 0, medium = 0, hard = 0;

        sections.forEach(section => {
          total += 1;
          const body = section.join('\n');
          const d = body.match(/\*\*Difficulty\*\*:\s*(easy|medium|hard)/i);
          if (d) {
            const lvl = d[1].toLowerCase();
            if (lvl === 'easy') easy += 1;
            if (lvl === 'medium') medium += 1;
            if (lvl === 'hard') hard += 1;
          }
        });

        document.getElementById('count-total').textContent = total;
        document.getElementById('count-levels').textContent = `${easy} / ${medium} / ${hard}`;

        const toc = document.getElementById('toc');
        const content = document.getElementById('content');
        let activeCategory = null;
        let activePage = 1;
        const renderCache = new Map();
        const groups = new Map();
        const categoryCounts = new Map(Object.keys(CATEGORY_KEYWORDS).map((name) => [name, 0]));
        const pageSize = 40;

        sections.forEach((section) => {
          const raw = section.join('\n');
          const title = section[0].replace(/^##\s+/, '').trim();
          const category = classifySection(raw, categoryCounts, sections.length);
          categoryCounts.set(category, (categoryCounts.get(category) || 0) + 1);
          if (!groups.has(category)) groups.set(category, []);
          groups.get(category).push({ title, section });
        });

        const sortedCategories = [...groups.entries()].sort((a, b) => b[1].length - a[1].length);
        activeCategory = sortedCategories[0]?.[0] || null;

        function buildCategoryPage(name, items) {
          const intro = name === 'Dynamic Programming' ? 'State transitions, recurrence, and optimization patterns.' :
            name === 'Graph & BFS' ? 'Shortest paths, connectivity, and traversal-heavy problems.' :
            name === 'DFS & Tree' ? 'Recursive exploration and tree-based reasoning.' :
            name === 'String & Simulation' ? 'Manipulation, parsing, and pattern-based solutions.' :
            name === 'Array & Two Pointers' ? 'Window scans, arrays, and in-place operations.' :
            name === 'Design & Data Structures' ? 'Custom structures, caches, and queues.' :
            name === 'Sorting & Greedy' ? 'Ordering, interval logic, and priority choices.' :
            name === 'HashMap & Set' ? 'Frequency counting and membership-based tricks.' :
            'Search, math, and number-theory style problems.';

          const cards = items.map(({ title, section }) => {
            const body = section.slice(1).join('\n');
            const cached = renderCache.get(body);
            const rendered = cached || marked.parse(body);
            if (!cached) {
              renderCache.set(body, rendered);
              if (renderCache.size > 75) {
                renderCache.delete(renderCache.keys().next().value);
              }
            }
            return `<article class="article-card" id="${slugify(title)}"><h2>${escapeHtml(title)}</h2>${rendered}</article>`;
          }).join('');

          return `<h2>${escapeHtml(name)}</h2><p>${escapeHtml(intro)}</p>${cards}`;
        }

        function render() {
          if (!activeCategory || !groups.has(activeCategory)) {
            activeCategory = sortedCategories[0]?.[0] || null;
          }

          if (!sortedCategories.length) {
            content.innerHTML = '<article class="article-card"><h2>No matches</h2><p>No questions available for this view.</p></article>';
            return;
          }

          const items = groups.get(activeCategory) || sortedCategories[0][1];
          const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
          if (activePage > totalPages) activePage = totalPages;
          const start = (activePage - 1) * pageSize;
          const pageItems = items.slice(start, start + pageSize);
          const pageLabel = totalPages > 1 ? ` · Page ${activePage}/${totalPages}` : '';
          const pager = `<nav class="pager" aria-label="Question pages">
            <button type="button" data-page="${activePage - 1}" title="Previous page" ${activePage === 1 ? 'disabled' : ''}>‹</button>
            <span>Page ${activePage} of ${totalPages}</span>
            <button type="button" data-page="${activePage + 1}" title="Next page" ${activePage === totalPages ? 'disabled' : ''}>›</button>
          </nav>`;
          const pageHtml = `<section class="category-page" id="${slugify(activeCategory)}-page-${activePage}"><h2>${escapeHtml(activeCategory)}${escapeHtml(pageLabel)}</h2><p>Showing ${pageItems.length} questions on this page.</p>${pager}${buildCategoryPage(activeCategory, pageItems)}${pager}</section>`;

          requestAnimationFrame(() => {
            content.innerHTML = pageHtml;
            if (window.hljs) {
              requestAnimationFrame(() => {
                content.querySelectorAll('pre code').forEach((block) => {
                  window.hljs.highlightElement(block);
                });
              });
            }
          });

          toc.innerHTML = sortedCategories.map(([name, cats]) => {
            const catPages = Math.max(1, Math.ceil(cats.length / pageSize));
            const pages = Array.from({ length: catPages }, (_, i) => `
              <a class="page-link ${name === activeCategory && i + 1 === activePage ? 'is-active' : ''}" href="#${slugify(name)}-page-${i + 1}" data-category="${escapeHtml(name)}" data-page="${i + 1}">Page ${i + 1}</a>
            `).join('');
            return `<details class="category-group" ${name === activeCategory ? 'open' : ''}>
              <summary class="nav-link ${name === activeCategory ? 'is-active' : ''}" data-category="${escapeHtml(name)}">${escapeHtml(name)} <span class="nav-badge">${cats.length}</span></summary>
              ${pages}
            </details>`;
          }).join('');

        }

        toc.addEventListener('click', (event) => {
          const link = event.target.closest('a[data-category]');
          if (!link) return;
          event.preventDefault();
          activeCategory = link.dataset.category;
          activePage = Number(link.dataset.page) || 1;
          render();
          requestAnimationFrame(() => content.scrollIntoView({ block: 'start' }));
        });

        content.addEventListener('click', (event) => {
          const button = event.target.closest('button[data-page]');
          if (!button || button.disabled) return;
          activePage = Number(button.dataset.page);
          render();
          requestAnimationFrame(() => content.scrollIntoView({ block: 'start' }));
        });

        render();
    } catch (err) {
      document.getElementById('content').innerHTML = `<article class="article-card"><h2>Unable to render markdown</h2><p>${escapeHtml(err.message)}</p></article>`;
    }
  </script>
</body>
</html>
