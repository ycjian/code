## 1669. Merge In Between Linked Lists (Merge In Between Linked Lists)
**Difficulty**: medium | **Key Concept**: linked list

**Original Problem**:
Remove nodes from index a to b in list1 and insert list2 in their place.  
中文翻译：删除 list1 中下标 a 到 b 的节点，并在该位置接入 list2。

**Example**:
Input: list1 = [0,1,2,3,4,5], a = 3, b = 4, list2 = [1000000,1000001,1000002]  
Output: [0,1,2,1000000,1000001,1000002,5]

```java
class Solution {
  public ListNode mergeInBetween(ListNode list1, int a, int b, ListNode list2) {
    ListNode before = list1;
    for (int i = 0; i < a - 1; i++) {
      before = before.next;
    }
    ListNode after = before;
    for (int i = 0; i < b - a + 2; i++) {
      after = after.next;
    }
    before.next = list2;
    while (list2.next != null) {
      list2 = list2.next;
    }
    list2.next = after;
    return list1;
  }
}
```

Explanation:
- 找到待删除区间前一个节点 `before` 和后一个节点 `after`。
- 将 `before.next` 指向 list2，再把 list2 尾部接到 `after`。

## 1671. Minimum Number of Removals to Make Mountain Array (Minimum Number of Removals to Make Mountain Array)
**Difficulty**: hard | **Key Concept**: dynamic programming, LIS

**Original Problem**:
Remove the minimum elements so the array becomes a mountain array.  
中文翻译：删除最少元素，使数组变成山形数组。

**Example**:
Input: nums = [2,1,1,5,6,2,3,1]  
Output: 3

```java
class Solution {
  public int minimumMountainRemovals(int[] nums) {
    int n = nums.length;
    int[] left = lis(nums);
    int[] rev = new int[n];
    for (int i = 0; i < n; i++) {
      rev[i] = nums[n - 1 - i];
    }
    int[] tmp = lis(rev);
    int[] right = new int[n];
    for (int i = 0; i < n; i++) {
      right[i] = tmp[n - 1 - i];
    }
    int keep = 0;
    for (int i = 1; i < n - 1; i++) {
      if (left[i] > 1 && right[i] > 1) {
        keep = Math.max(keep, left[i] + right[i] - 1);
      }
    }
    return n - keep;
  }

  private int[] lis(int[] nums) {
    int[] tail = new int[nums.length];
    int[] len = new int[nums.length];
    int size = 0;
    for (int i = 0; i < nums.length; i++) {
      int l = 0;
      int r = size;
      while (l < r) {
        int m = l + (r - l) / 2;
        if (tail[m] < nums[i]) {
          l = m + 1;
        } else {
          r = m;
        }
      }
      tail[l] = nums[i];
      if (l == size) {
        size++;
      }
      len[i] = l + 1;
    }
    return len;
  }
}
```

Explanation:
- 每个峰值需要左侧严格递增长度和右侧严格递减长度都大于 1。
- 用 LIS 分别求每个位置向左、向右可保留的最长长度。

## 1695. Maximum Erasure Value (Maximum Erasure Value)
**Difficulty**: medium | **Key Concept**: sliding window, hashmap

**Original Problem**:
Find the maximum sum of a subarray with all unique elements.  
中文翻译：找出所有元素互不相同的子数组的最大和。

**Example**:
Input: nums = [4,2,4,5,6]  
Output: 17

```java
import java.util.HashSet;
import java.util.Set;

class Solution {
  public int maximumUniqueSubarray(int[] nums) {
    Set<Integer> seen = new HashSet<>();
    int left = 0;
    int sum = 0;
    int ans = 0;
    for (int right = 0; right < nums.length; right++) {
      while (seen.contains(nums[right])) {
        seen.remove(nums[left]);
        sum -= nums[left++];
      }
      seen.add(nums[right]);
      sum += nums[right];
      ans = Math.max(ans, sum);
    }
    return ans;
  }
}
```

Explanation:
- 滑动窗口保持元素唯一。
- 遇到重复值时移动左边界直到重复消失，并维护窗口和。

## 1698. Number of Distinct Substrings in a String (Number of Distinct Substrings in a String)
**Difficulty**: medium | **Key Concept**: trie, string

**Original Problem**:
Return the number of distinct non-empty substrings of a string.  
中文翻译：返回字符串中不同非空子串的数量。

**Example**:
Input: s = "aabbaba"  
Output: 21

```java
class Solution {
  public int countDistinct(String s) {
    Node root = new Node();
    int ans = 0;
    for (int i = 0; i < s.length(); i++) {
      Node cur = root;
      for (int j = i; j < s.length(); j++) {
        int c = s.charAt(j) - 'a';
        if (cur.next[c] == null) {
          cur.next[c] = new Node();
          ans++;
        }
        cur = cur.next[c];
      }
    }
    return ans;
  }

  private static class Node {
    Node[] next = new Node[26];
  }
}
```

Explanation:
- 把每个后缀插入 Trie。
- 每创建一个新节点，就代表发现一个新的不同子串。

## 1717. Maximum Score From Removing Substrings (Maximum Score From Removing Substrings)
**Difficulty**: medium | **Key Concept**: greedy, stack

**Original Problem**:
Remove substrings "ab" for x points and "ba" for y points to maximize total score.  
中文翻译：删除 `"ab"` 得 x 分、删除 `"ba"` 得 y 分，求最大总分。

**Example**:
Input: s = "cdbcbbaaabab", x = 4, y = 5  
Output: 19

```java
class Solution {
  public int maximumGain(String s, int x, int y) {
    if (x < y) {
      return score(s, "ba", y) + score(rest, "ab", x);
    }
    return score(s, "ab", x) + score(rest, "ba", y);
  }

  private String rest;

  private int score(String s, String p, int val) {
    StringBuilder stack = new StringBuilder();
    int ans = 0;
    for (char ch : s.toCharArray()) {
      int n = stack.length();
      if (n > 0 && stack.charAt(n - 1) == p.charAt(0) && ch == p.charAt(1)) {
        stack.deleteCharAt(n - 1);
        ans += val;
      } else {
        stack.append(ch);
      }
    }
    rest = stack.toString();
    return ans;
  }
}
```

Explanation:
- 先删除得分更高的模式，局部贪心最优。
- 用栈线性删除一个模式，再对剩余字符串删除另一个模式。

## 1726. Tuple with Same Product (Tuple with Same Product)
**Difficulty**: medium | **Key Concept**: hashmap, counting

**Original Problem**:
Count tuples `(a,b,c,d)` where `a*b = c*d` using distinct elements from nums.  
中文翻译：统计满足 `a*b = c*d` 且元素互不相同的四元组数量。

**Example**:
Input: nums = [2,3,4,6]  
Output: 8

```java
import java.util.HashMap;
import java.util.Map;

class Solution {
  public int tupleSameProduct(int[] nums) {
    Map<Integer, Integer> count = new HashMap<>();
    int ans = 0;
    for (int i = 0; i < nums.length; i++) {
      for (int j = i + 1; j < nums.length; j++) {
        int p = nums[i] * nums[j];
        ans += count.getOrDefault(p, 0) * 8;
        count.put(p, count.getOrDefault(p, 0) + 1);
      }
    }
    return ans;
  }
}
```

Explanation:
- 每个乘积相同的旧数对可与当前数对组成 8 个有序四元组。
- 扫描所有数对并统计乘积出现次数。

## 1730. Shortest Path to Get Food (Shortest Path to Get Food)
**Difficulty**: medium | **Key Concept**: BFS, grid

**Original Problem**:
Find the shortest path from your start position to any food cell in a grid.  
中文翻译：在网格中从起点到任意食物格，求最短路径长度。

**Example**:
Input: grid with `*` start, `#` food, `X` obstacles  
Output: shortest distance

```java
import java.util.ArrayDeque;
import java.util.Queue;

class Solution {
  public int getFood(char[][] grid) {
    int m = grid.length;
    int n = grid[0].length;
    Queue<int[]> q = new ArrayDeque<>();
    for (int r = 0; r < m; r++) {
      for (int c = 0; c < n; c++) {
        if (grid[r][c] == '*') {
          q.offer(new int[] {r, c});
          grid[r][c] = 'X';
        }
      }
    }
    int steps = 0;
    int[] dirs = {1, 0, -1, 0, 1};
    while (!q.isEmpty()) {
      for (int size = q.size(); size > 0; size--) {
        int[] cur = q.poll();
        if (grid[cur[0]][cur[1]] == '#') {
          return steps;
        }
        for (int d = 0; d < 4; d++) {
          int r = cur[0] + dirs[d];
          int c = cur[1] + dirs[d + 1];
          if (r >= 0 && r < m && c >= 0 && c < n && grid[r][c] != 'X') {
            q.offer(new int[] {r, c});
            if (grid[r][c] != '#') {
              grid[r][c] = 'X';
            }
          }
        }
      }
      steps++;
    }
    return -1;
  }
}
```

Explanation:
- BFS 从起点按层扩展，第一次遇到食物就是最短距离。
- 访问过的空地标记为障碍，避免重复入队。

## 1733. Minimum Number of People to Teach (Minimum Number of People to Teach)
**Difficulty**: medium | **Key Concept**: hashmap, greedy

**Original Problem**:
Teach one language to the minimum number of users so every friendship pair can communicate.  
中文翻译：选择一种语言教给最少用户，使每对朋友都能交流。

**Example**:
Input: n = 2, languages = [[1],[2],[1,2]], friendships = [[1,2],[1,3],[2,3]]  
Output: 1

```java
import java.util.HashSet;
import java.util.Set;

class Solution {
  public int minimumTeachings(int n, int[][] languages, int[][] friendships) {
    Set<Integer> need = new HashSet<>();
    for (int[] f : friendships) {
      if (!canTalk(languages[f[0] - 1], languages[f[1] - 1])) {
        need.add(f[0] - 1);
        need.add(f[1] - 1);
      }
    }
    int ans = languages.length;
    for (int lang = 1; lang <= n; lang++) {
      int teach = 0;
      for (int user : need) {
        boolean know = false;
        for (int l : languages[user]) {
          if (l == lang) {
            know = true;
          }
        }
        if (!know) {
          teach++;
        }
      }
      ans = Math.min(ans, teach);
    }
    return ans;
  }

  private boolean canTalk(int[] a, int[] b) {
    for (int x : a) {
      for (int y : b) {
        if (x == y) {
          return true;
        }
      }
    }
    return false;
  }
}
```

Explanation:
- 只有无法交流的朋友对中的用户需要考虑教学。
- 枚举要教的语言，统计这些用户中还不会该语言的人数，取最小。

## 1749. Maximum Absolute Sum of Any Subarray (Maximum Absolute Sum of Any Subarray)
**Difficulty**: medium | **Key Concept**: prefix sum, Kadane

**Original Problem**:
Return the maximum absolute sum of any subarray.  
中文翻译：返回任意子数组和的最大绝对值。

**Example**:
Input: nums = [1,-3,2,3,-4]  
Output: 5

```java
class Solution {
  public int maxAbsoluteSum(int[] nums) {
    int prefix = 0;
    int min = 0;
    int max = 0;
    int ans = 0;
    for (int x : nums) {
      prefix += x;
      ans = Math.max(ans, Math.max(Math.abs(prefix - min), Math.abs(prefix - max)));
      min = Math.min(min, prefix);
      max = Math.max(max, prefix);
    }
    return ans;
  }
}
```

Explanation:
- 子数组和等于两个前缀和之差。
- 最大绝对值来自当前前缀与历史最小或最大前缀的差。

## 1751. Maximum Number of Events That Can Be Attended II (Maximum Number of Events That Can Be Attended II)
**Difficulty**: hard | **Key Concept**: dynamic programming, binary search

**Original Problem**:
Attend at most k non-overlapping events to maximize total value.  
中文翻译：最多参加 k 个互不重叠的事件，最大化总价值。

**Example**:
Input: events = [[1,2,4],[3,4,3],[2,3,1]], k = 2  
Output: 7

```java
import java.util.Arrays;

class Solution {
  public int maxValue(int[][] events, int k) {
    Arrays.sort(events, (a, b) -> a[0] - b[0]);
    int n = events.length;
    int[] starts = new int[n];
    for (int i = 0; i < n; i++) {
      starts[i] = events[i][0];
    }
    int[][] dp = new int[n + 1][k + 1];
    for (int i = n - 1; i >= 0; i--) {
      int next = upper(starts, events[i][1]);
      for (int c = 1; c <= k; c++) {
        dp[i][c] = Math.max(dp[i + 1][c], events[i][2] + dp[next][c - 1]);
      }
    }
    return dp[0][k];
  }

  private int upper(int[] a, int x) {
    int l = 0;
    int r = a.length;
    while (l < r) {
      int m = l + (r - l) / 2;
      if (a[m] <= x) {
        l = m + 1;
      } else {
        r = m;
      }
    }
    return l;
  }
}
```

Explanation:
- 按开始时间排序，参加当前事件后用二分找到下一个不冲突事件。
- `dp[i][c]` 表示从 i 开始最多参加 c 个事件的最大价值。

## 1760. Minimum Limit of Balls in a Bag (Minimum Limit of Balls in a Bag)
**Difficulty**: medium | **Key Concept**: binary search

**Original Problem**:
Split bags at most maxOperations times to minimize the maximum balls in any bag.  
中文翻译：最多拆分 maxOperations 次，最小化任意袋中的最大球数。

**Example**:
Input: nums = [9], maxOperations = 2  
Output: 3

```java
class Solution {
  public int minimumSize(int[] nums, int maxOperations) {
    int l = 1;
    int r = 0;
    for (int x : nums) {
      r = Math.max(r, x);
    }
    while (l < r) {
      int m = l + (r - l) / 2;
      long ops = 0;
      for (int x : nums) {
        ops += (x - 1) / m;
      }
      if (ops <= maxOperations) {
        r = m;
      } else {
        l = m + 1;
      }
    }
    return l;
  }
}
```

Explanation:
- 最大袋容量越大，需要操作次数越少，满足二分单调性。
- 把 x 拆到每袋不超过 m，需要 `(x-1)/m` 次操作。

## 1769. Minimum Number of Operations to Move All Balls to Each Box (Minimum Number of Operations to Move All Balls to Each Box)
**Difficulty**: medium | **Key Concept**: prefix sum

**Original Problem**:
For each box, return the operations needed to move all balls to that box.  
中文翻译：对每个盒子，返回把所有球移动到该盒子所需操作数。

**Example**:
Input: boxes = "110"  
Output: [1,1,3]

```java
class Solution {
  public int[] minOperations(String boxes) {
    int n = boxes.length();
    int[] ans = new int[n];
    int balls = 0;
    int ops = 0;
    for (int i = 0; i < n; i++) {
      ans[i] += ops;
      balls += boxes.charAt(i) - '0';
      ops += balls;
    }
    balls = 0;
    ops = 0;
    for (int i = n - 1; i >= 0; i--) {
      ans[i] += ops;
      balls += boxes.charAt(i) - '0';
      ops += balls;
    }
    return ans;
  }
}
```

Explanation:
- 从左到右累计左侧球移动到当前位置的代价。
- 再从右到左累计右侧球的代价，两部分相加。

## 1778. Shortest Path in a Hidden Grid (Shortest Path in a Hidden Grid)
**Difficulty**: hard | **Key Concept**: DFS, BFS, API

**Original Problem**:
Explore a hidden grid using `GridMaster`, then return the shortest path from start to target.  
中文翻译：使用 `GridMaster` 探索隐藏网格，并返回从起点到目标的最短路径。

**Example**:
Input: hidden grid through API  
Output: shortest distance

```java
import java.util.ArrayDeque;
import java.util.HashSet;
import java.util.Queue;
import java.util.Set;

class Solution {
  private int[][] dirs = {{-1, 0}, {0, 1}, {1, 0}, {0, -1}};
  private char[] move = {'U', 'R', 'D', 'L'};
  private char[] back = {'D', 'L', 'U', 'R'};
  private Set<String> open = new HashSet<>();
  private String target = null;

  public int findShortestPath(GridMaster master) {
    dfs(master, 0, 0);
    if (target == null) {
      return -1;
    }
    Queue<int[]> q = new ArrayDeque<>();
    Set<String> seen = new HashSet<>();
    q.offer(new int[] {0, 0});
    seen.add("0#0");
    int steps = 0;
    while (!q.isEmpty()) {
      for (int size = q.size(); size > 0; size--) {
        int[] cur = q.poll();
        if ((cur[0] + "#" + cur[1]).equals(target)) {
          return steps;
        }
        for (int[] d : dirs) {
          int r = cur[0] + d[0];
          int c = cur[1] + d[1];
          String key = r + "#" + c;
          if (open.contains(key) && seen.add(key)) {
            q.offer(new int[] {r, c});
          }
        }
      }
      steps++;
    }
    return -1;
  }

  private void dfs(GridMaster master, int r, int c) {
    String key = r + "#" + c;
    open.add(key);
    if (master.isTarget()) {
      target = key;
    }
    for (int i = 0; i < 4; i++) {
      int nr = r + dirs[i][0];
      int nc = c + dirs[i][1];
      String next = nr + "#" + nc;
      if (!open.contains(next) && master.canMove(move[i])) {
        master.move(move[i]);
        dfs(master, nr, nc);
        master.move(back[i]);
      }
    }
  }
}
```

Explanation:
- 先用 DFS 通过 API 探索所有可达格子，并回溯回原位置。
- 再在已知可达格图上 BFS，得到起点到目标的最短距离。

## 1780. Check if Number is a Sum of Powers of Three (Check if Number is a Sum of Powers of Three)
**Difficulty**: medium | **Key Concept**: math

**Original Problem**:
Determine whether n can be represented as a sum of distinct powers of three.  
中文翻译：判断 n 能否表示为若干个不同 3 的幂之和。

**Example**:
Input: n = 12  
Output: true

```java
class Solution {
  public boolean checkPowersOfThree(int n) {
    while (n > 0) {
      if (n % 3 == 2) {
        return false;
      }
      n /= 3;
    }
    return true;
  }
}
```

Explanation:
- 不同 3 的幂之和对应三进制每一位只能是 0 或 1。
- 若三进制中出现 2，则无法用不重复的 3 的幂表示。

## 1781. Sum of Beauty of All Substrings (Sum of Beauty of All Substrings)
**Difficulty**: medium | **Key Concept**: string, counting

**Original Problem**:
The beauty of a substring is max frequency minus min positive frequency. Return the sum of beauty of all substrings.  
中文翻译：子串美丽值为最高频次减最低正频次，返回所有子串美丽值之和。

**Example**:
Input: s = "aabcb"  
Output: 5

```java
class Solution {
  public int beautySum(String s) {
    int ans = 0;
    for (int i = 0; i < s.length(); i++) {
      int[] count = new int[26];
      for (int j = i; j < s.length(); j++) {
        count[s.charAt(j) - 'a']++;
        int max = 0;
        int min = Integer.MAX_VALUE;
        for (int c : count) {
          if (c > 0) {
            max = Math.max(max, c);
            min = Math.min(min, c);
          }
        }
        ans += max - min;
      }
    }
    return ans;
  }
}
```

Explanation:
- 枚举每个子串起点，并逐步扩展终点维护字符频次。
- 每个子串扫描 26 个字母求最高和最低正频次。

## 1792. Maximum Average Pass Ratio (Maximum Average Pass Ratio)
**Difficulty**: medium | **Key Concept**: heap, greedy

**Original Problem**:
Assign extra students to classes to maximize the average pass ratio.  
中文翻译：分配额外学生到班级，使平均通过率最大。

**Example**:
Input: classes = [[1,2],[3,5],[2,2]], extraStudents = 2  
Output: 0.78333

```java
import java.util.PriorityQueue;

class Solution {
  public double maxAverageRatio(int[][] classes, int extraStudents) {
    PriorityQueue<int[]> pq = new PriorityQueue<>((a, b) -> Double.compare(gain(b), gain(a)));
    for (int[] c : classes) {
      pq.offer(c);
    }
    while (extraStudents-- > 0) {
      int[] c = pq.poll();
      c[0]++;
      c[1]++;
      pq.offer(c);
    }
    double ans = 0;
    for (int[] c : pq) {
      ans += (double) c[0] / c[1];
    }
    return ans / classes.length;
  }

  private double gain(int[] c) {
    return (double) (c[0] + 1) / (c[1] + 1) - (double) c[0] / c[1];
  }
}
```

Explanation:
- 每个额外学生应分配给当前通过率增益最大的班级。
- 大顶堆按加入一个学生后的增益排序。

## 1813. Sentence Similarity III (Sentence Similarity III)
**Difficulty**: medium | **Key Concept**: two pointers, string

**Original Problem**:
Determine whether two sentences can become equal by inserting a sentence into one of them.  
中文翻译：判断两个句子能否通过向其中一个插入一段句子变得相同。

**Example**:
Input: sentence1 = "My name is Haley", sentence2 = "My Haley"  
Output: true

```java
class Solution {
  public boolean areSentencesSimilar(String sentence1, String sentence2) {
    String[] a = sentence1.split(" ");
    String[] b = sentence2.split(" ");
    if (a.length < b.length) {
      return areSentencesSimilar(sentence2, sentence1);
    }
    int l = 0;
    while (l < b.length && a[l].equals(b[l])) {
      l++;
    }
    int r = 0;
    while (r < b.length - l && a[a.length - 1 - r].equals(b[b.length - 1 - r])) {
      r++;
    }
    return l + r >= b.length;
  }
}
```

Explanation:
- 较短句子必须能分成与长句子的相同前缀和相同后缀。
- 中间缺失部分可视为插入的一段句子。

## 1820. Maximum Number of Accepted Invitations (Maximum Number of Accepted Invitations)
**Difficulty**: medium | **Key Concept**: bipartite matching, DFS

**Original Problem**:
Return the maximum number of invitations that can be accepted between boys and girls based on a compatibility grid.  
中文翻译：根据男女兼容矩阵，返回最多能接受的邀请数量。

**Example**:
Input: grid = [[1,1,1],[1,0,1],[0,0,1]]  
Output: 3

```java
class Solution {
  public int maximumInvitations(int[][] grid) {
    int m = grid.length;
    int n = grid[0].length;
    int[] match = new int[n];
    java.util.Arrays.fill(match, -1);
    int ans = 0;
    for (int boy = 0; boy < m; boy++) {
      if (dfs(grid, boy, new boolean[n], match)) {
        ans++;
      }
    }
    return ans;
  }

  private boolean dfs(int[][] grid, int boy, boolean[] seen, int[] match) {
    for (int girl = 0; girl < grid[0].length; girl++) {
      if (grid[boy][girl] == 1 && !seen[girl]) {
        seen[girl] = true;
        if (match[girl] == -1 || dfs(grid, match[girl], seen, match)) {
          match[girl] = boy;
          return true;
        }
      }
    }
    return false;
  }
}
```

Explanation:
- 这是二分图最大匹配问题。
- 对每个男孩尝试找可匹配女孩，若女孩已匹配则递归尝试重新分配。

## 1829. Maximum XOR for Each Query (Maximum XOR for Each Query)
**Difficulty**: medium | **Key Concept**: bit manipulation, prefix XOR

**Original Problem**:
For each query, remove the last number and choose k to maximize XOR with remaining prefix XOR under `2^maximumBit`.  
中文翻译：每次查询移除最后一个数，选择 k 使其与剩余前缀异或最大，且 k 小于 `2^maximumBit`。

**Example**:
Input: nums = [0,1,1,3], maximumBit = 2  
Output: [0,3,2,3]

```java
class Solution {
  public int[] getMaximumXor(int[] nums, int maximumBit) {
    int xor = 0;
    for (int x : nums) {
      xor ^= x;
    }
    int mask = (1 << maximumBit) - 1;
    int[] ans = new int[nums.length];
    for (int i = 0; i < nums.length; i++) {
      ans[i] = mask ^ xor;
      xor ^= nums[nums.length - 1 - i];
    }
    return ans;
  }
}
```

Explanation:
- 要最大化 `xor ^ k`，k 应取 xor 在 maximumBit 位内的按位取反。
- 每次查询后从当前总异或中移除末尾元素。

## 1838. Frequency of the Most Frequent Element (Frequency of the Most Frequent Element)
**Difficulty**: medium | **Key Concept**: sliding window, sorting

**Original Problem**:
Return the maximum possible frequency of an element after at most k increments.  
中文翻译：最多执行 k 次加一操作后，返回某个元素能达到的最大频率。

**Example**:
Input: nums = [1,2,4], k = 5  
Output: 3

```java
import java.util.Arrays;

class Solution {
  public int maxFrequency(int[] nums, int k) {
    Arrays.sort(nums);
    long sum = 0;
    int left = 0;
    int ans = 0;
    for (int right = 0; right < nums.length; right++) {
      sum += nums[right];
      while ((long) nums[right] * (right - left + 1) - sum > k) {
        sum -= nums[left++];
      }
      ans = Math.max(ans, right - left + 1);
    }
    return ans;
  }
}
```

Explanation:
- 排序后，把窗口内所有数提升到右端最大值最划算。
- 若所需操作数超过 k，就移动左边界缩小窗口。

## 1851. Minimum Interval to Include Each Query (Minimum Interval to Include Each Query)
**Difficulty**: hard | **Key Concept**: heap, sorting

**Original Problem**:
For each query, return the size of the smallest interval containing it, or -1 if none exists.  
中文翻译：对每个查询，返回包含它的最小区间长度；不存在则返回 -1。

**Example**:
Input: intervals = [[1,4],[2,4],[3,6],[4,4]], queries = [2,3,4,5]  
Output: [3,3,1,4]

```java
import java.util.Arrays;
import java.util.PriorityQueue;

class Solution {
  public int[] minInterval(int[][] intervals, int[] queries) {
    Arrays.sort(intervals, (a, b) -> a[0] - b[0]);
    int n = queries.length;
    int[][] qs = new int[n][2];
    for (int i = 0; i < n; i++) {
      qs[i] = new int[] {queries[i], i};
    }
    Arrays.sort(qs, (a, b) -> a[0] - b[0]);
    int[] ans = new int[n];
    Arrays.fill(ans, -1);
    PriorityQueue<int[]> pq = new PriorityQueue<>((a, b) -> a[0] - b[0]);
    int i = 0;
    for (int[] q : qs) {
      while (i < intervals.length && intervals[i][0] <= q[0]) {
        pq.offer(new int[] {intervals[i][1] - intervals[i][0] + 1, intervals[i][1]});
        i++;
      }
      while (!pq.isEmpty() && pq.peek()[1] < q[0]) {
        pq.poll();
      }
      if (!pq.isEmpty()) {
        ans[q[1]] = pq.peek()[0];
      }
    }
    return ans;
  }
}
```

Explanation:
- 按查询值从小到大处理，把起点不超过查询的区间加入堆。
- 堆按区间长度排序，并弹出终点已经小于查询的区间。

## 1854. Maximum Population Year (Maximum Population Year)
**Difficulty**: easy | **Key Concept**: difference array

**Original Problem**:
Given birth and death years, return the earliest year with maximum living population.  
中文翻译：给定出生和死亡年份，返回人口最多的最早年份。

**Example**:
Input: logs = [[1993,1999],[2000,2010]]  
Output: 1993

```java
class Solution {
  public int maximumPopulation(int[][] logs) {
    int[] diff = new int[101];
    for (int[] log : logs) {
      diff[log[0] - 1950]++;
      diff[log[1] - 1950]--;
    }
    int pop = 0;
    int best = 0;
    int year = 1950;
    for (int i = 0; i < diff.length; i++) {
      pop += diff[i];
      if (pop > best) {
        best = pop;
        year = 1950 + i;
      }
    }
    return year;
  }
}
```

Explanation:
- 死亡年份不计入存活，所以在 death 处做减一。
- 扫描差分前缀和，第一次达到最大人口时记录年份。

## 1894. Find the Student that Will Replace the Chalk (Find the Student that Will Replace the Chalk)
**Difficulty**: medium | **Key Concept**: prefix sum, binary search

**Original Problem**:
Students use chalk cyclically. Return the index of the student who needs to replace the chalk.  
中文翻译：学生循环消耗粉笔，返回需要更换粉笔的学生下标。

**Example**:
Input: chalk = [5,1,5], k = 22  
Output: 0

```java
class Solution {
  public int chalkReplacer(int[] chalk, int k) {
    long sum = 0;
    for (int c : chalk) {
      sum += c;
    }
    k %= sum;
    for (int i = 0; i < chalk.length; i++) {
      if (k < chalk[i]) {
        return i;
      }
      k -= chalk[i];
    }
    return 0;
  }
}
```

Explanation:
- 先用总消耗对 k 取模，去掉完整轮次。
- 再按顺序扣减，首次粉笔不足的学生就是答案。

## 1900. The Earliest and Latest Rounds Where Players Compete (The Earliest and Latest Rounds Where Players Compete)
**Difficulty**: hard | **Key Concept**: dynamic programming, recursion

**Original Problem**:
In a knockout tournament, return the earliest and latest rounds where two given players can meet.  
中文翻译：在淘汰赛中，返回两个指定选手最早和最晚可能相遇的轮次。

**Example**:
Input: n = 11, firstPlayer = 2, secondPlayer = 4  
Output: [3,4]

```java
class Solution {
  private int[][][][] memo = new int[30][30][30][2];

  public int[] earliestAndLatest(int n, int firstPlayer, int secondPlayer) {
    return dfs(n, firstPlayer, secondPlayer);
  }

  private int[] dfs(int n, int a, int b) {
    if (a + b == n + 1) {
      return new int[] {1, 1};
    }
    if (a > b) {
      return dfs(n, b, a);
    }
    if (memo[n][a][b][0] != 0) {
      return new int[] {memo[n][a][b][0], memo[n][a][b][1]};
    }
    int earliest = 30;
    int latest = 0;
    int half = (n + 1) / 2;
    for (int i = 1; i <= half; i++) {
      for (int j = i + 1; j <= half; j++) {
        if (valid(n, a, b, i, j)) {
          int[] next = dfs(half, i, j);
          earliest = Math.min(earliest, next[0] + 1);
          latest = Math.max(latest, next[1] + 1);
        }
      }
    }
    memo[n][a][b][0] = earliest;
    memo[n][a][b][1] = latest;
    return new int[] {earliest, latest};
  }

  private boolean valid(int n, int a, int b, int na, int nb) {
    int leftA = Math.min(a, n + 1 - a);
    int leftB = Math.min(b, n + 1 - b);
    return na <= leftA && leftA <= nb && na <= leftB && leftB <= nb;
  }
}
```

Explanation:
- 若两个选手本轮相对，则本轮相遇。
- 递归枚举下一轮中两位选手可能的新位置，并记忆化最早/最晚轮次。

## 1901. Find a Peak Element II (Find a Peak Element II)
**Difficulty**: medium | **Key Concept**: binary search, matrix

**Original Problem**:
Find a peak element in a 2D grid where a peak is greater than its four neighbors.  
中文翻译：在二维网格中找一个严格大于四邻居的峰值元素。

**Example**:
Input: mat = [[1,4],[3,2]]  
Output: [0,1]

```java
class Solution {
  public int[] findPeakGrid(int[][] mat) {
    int top = 0;
    int bottom = mat.length - 1;
    while (top <= bottom) {
      int r = top + (bottom - top) / 2;
      int c = maxCol(mat[r]);
      int up = r > 0 ? mat[r - 1][c] : -1;
      int down = r + 1 < mat.length ? mat[r + 1][c] : -1;
      if (mat[r][c] > up && mat[r][c] > down) {
        return new int[] {r, c};
      }
      if (down > mat[r][c]) {
        top = r + 1;
      } else {
        bottom = r - 1;
      }
    }
    return new int[0];
  }

  private int maxCol(int[] row) {
    int idx = 0;
    for (int i = 1; i < row.length; i++) {
      if (row[i] > row[idx]) {
        idx = i;
      }
    }
    return idx;
  }
}
```

Explanation:
- 对行做二分，每次取中间行的最大列。
- 若上下邻居更大，就往更大方向继续搜索；否则当前即为峰值。

## 1910. Remove All Occurrences of a Substring (Remove All Occurrences of a Substring)
**Difficulty**: medium | **Key Concept**: string, stack

**Original Problem**:
Repeatedly remove the leftmost occurrence of `part` from `s`.  
中文翻译：反复从 s 中删除最左侧出现的 `part`。

**Example**:
Input: s = "daabcbaabcbc", part = "abc"  
Output: "dab"

```java
class Solution {
  public String removeOccurrences(String s, String part) {
    StringBuilder sb = new StringBuilder();
    int m = part.length();
    for (char ch : s.toCharArray()) {
      sb.append(ch);
      if (sb.length() >= m && sb.substring(sb.length() - m).equals(part)) {
        sb.delete(sb.length() - m, sb.length());
      }
    }
    return sb.toString();
  }
}
```

Explanation:
- 用 `StringBuilder` 模拟栈式构造结果。
- 每加入一个字符后，只需检查末尾是否形成 `part`。

## 1911. Maximum Alternating Subsequence Sum (Maximum Alternating Subsequence Sum)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Return the maximum alternating sum of any subsequence.  
中文翻译：返回任意子序列的最大交替和。

**Example**:
Input: nums = [4,2,5,3]  
Output: 7

```java
class Solution {
  public long maxAlternatingSum(int[] nums) {
    long even = 0;
    long odd = 0;
    for (int x : nums) {
      long ne = Math.max(even, odd + x);
      long no = Math.max(odd, even - x);
      even = ne;
      odd = no;
    }
    return even;
  }
}
```

Explanation:
- `even` 表示当前选择数量为奇数时的最大值，下一项应加；`odd` 表示下一项应减。
- 对每个数选择跳过或加入，并滚动更新状态。

## 1922. Count Good Numbers (Count Good Numbers)
**Difficulty**: medium | **Key Concept**: math, fast power

**Original Problem**:
Count digit strings of length n where even positions are even digits and odd positions are prime digits.  
中文翻译：统计长度为 n 的数字串数量，偶数下标为偶数数字，奇数下标为质数数字。

**Example**:
Input: n = 1  
Output: 5

```java
class Solution {
  public int countGoodNumbers(long n) {
    long mod = 1_000_000_007;
    long even = (n + 1) / 2;
    long odd = n / 2;
    return (int) (pow(5, even, mod) * pow(4, odd, mod) % mod);
  }

  private long pow(long a, long b, long mod) {
    long ans = 1;
    while (b > 0) {
      if ((b & 1) == 1) {
        ans = ans * a % mod;
      }
      a = a * a % mod;
      b >>= 1;
    }
    return ans;
  }
}
```

Explanation:
- 偶数下标有 5 种选择，奇数下标有 4 种质数选择。
- n 很大，用快速幂计算乘积并取模。

## 1930. Unique Length-3 Palindromic Subsequences (Unique Length-3 Palindromic Subsequences)
**Difficulty**: medium | **Key Concept**: string, set

**Original Problem**:
Return the number of unique palindromic subsequences of length 3.  
中文翻译：返回长度为 3 的不同回文子序列数量。

**Example**:
Input: s = "aabca"  
Output: 3

```java
import java.util.HashSet;
import java.util.Set;

class Solution {
  public int countPalindromicSubsequence(String s) {
    int ans = 0;
    for (char ch = 'a'; ch <= 'z'; ch++) {
      int l = s.indexOf(ch);
      int r = s.lastIndexOf(ch);
      if (l >= 0 && l < r) {
        Set<Character> mid = new HashSet<>();
        for (int i = l + 1; i < r; i++) {
          mid.add(s.charAt(i));
        }
        ans += mid.size();
      }
    }
    return ans;
  }
}
```

Explanation:
- 长度 3 回文由相同首尾字符和中间字符决定。
- 对每个首尾字符，取它首次和末次出现之间的不同中间字符数。

## 1937. Maximum Number of Points with Cost (Maximum Number of Points with Cost)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Pick one cell from each row to maximize total points minus column movement cost.  
中文翻译：每行选一个格子，最大化总分减去列移动代价。

**Example**:
Input: points = [[1,2,3],[1,5,1],[3,1,1]]  
Output: 9

```java
class Solution {
  public long maxPoints(int[][] points) {
    int m = points.length;
    int n = points[0].length;
    long[] dp = new long[n];
    for (int c = 0; c < n; c++) {
      dp[c] = points[0][c];
    }
    for (int r = 1; r < m; r++) {
      long[] next = new long[n];
      long best = Long.MIN_VALUE;
      for (int c = 0; c < n; c++) {
        best = Math.max(best, dp[c] + c);
        next[c] = best + points[r][c] - c;
      }
      best = Long.MIN_VALUE;
      for (int c = n - 1; c >= 0; c--) {
        best = Math.max(best, dp[c] - c);
        next[c] = Math.max(next[c], best + points[r][c] + c);
      }
      dp = next;
    }
    long ans = 0;
    for (long v : dp) {
      ans = Math.max(ans, v);
    }
    return ans;
  }
}
```

Explanation:
- 从上一行列 p 转到当前列 c，代价为 `|p-c|`。
- 左右两次扫描分别维护 `dp[p]+p` 和 `dp[p]-p` 的最大值。

## 1948. Delete Duplicate Folders in System (Delete Duplicate Folders in System)
**Difficulty**: hard | **Key Concept**: trie, hashmap

**Original Problem**:
Delete folders whose subfolder structures are identical, and return remaining paths.  
中文翻译：删除子文件夹结构完全相同的文件夹，并返回剩余路径。

**Example**:
Input: paths = [["a"],["c"],["d"],["a","b"],["c","b"],["d","a"]]  
Output: remaining paths

```java
import java.util.ArrayList;
import java.util.HashMap;
import java.util.List;
import java.util.Map;
import java.util.TreeMap;

class Solution {
  private Map<String, Integer> count = new HashMap<>();

  public List<List<String>> deleteDuplicateFolder(List<List<String>> paths) {
    Node root = new Node();
    for (List<String> path : paths) {
      Node cur = root;
      for (String name : path) {
        cur = cur.children.computeIfAbsent(name, k -> new Node());
      }
    }
    serial(root);
    List<List<String>> ans = new ArrayList<>();
    collect(root, new ArrayList<>(), ans);
    return ans;
  }

  private String serial(Node node) {
    if (node.children.isEmpty()) {
      return "";
    }
    StringBuilder sb = new StringBuilder();
    for (String name : node.children.keySet()) {
      sb.append(name).append('(').append(serial(node.children.get(name))).append(')');
    }
    node.sig = sb.toString();
    count.put(node.sig, count.getOrDefault(node.sig, 0) + 1);
    return node.sig;
  }

  private void collect(Node node, List<String> path, List<List<String>> ans) {
    for (String name : node.children.keySet()) {
      Node child = node.children.get(name);
      if (!child.sig.isEmpty() && count.get(child.sig) > 1) {
        continue;
      }
      path.add(name);
      ans.add(new ArrayList<>(path));
      collect(child, path, ans);
      path.remove(path.size() - 1);
    }
  }

  private static class Node {
    TreeMap<String, Node> children = new TreeMap<>();
    String sig = "";
  }
}
```

Explanation:
- 把路径建成 Trie，对每个文件夹序列化其子树结构。
- 子树签名出现超过一次的文件夹删除，DFS 收集未删除路径。

## 1976. Number of Ways to Arrive at Destination (Number of Ways to Arrive at Destination)
**Difficulty**: medium | **Key Concept**: graph, Dijkstra

**Original Problem**:
Return the number of shortest paths from node 0 to node n - 1.  
中文翻译：返回从节点 0 到节点 n-1 的最短路径数量。

**Example**:
Input: n = 7, roads = [[0,6,7],[0,1,2],[1,2,3],[1,3,3],[6,3,3],[3,5,1],[6,5,1],[2,5,1],[0,4,5],[4,6,2]]  
Output: 4

```java
import java.util.ArrayList;
import java.util.Arrays;
import java.util.List;
import java.util.PriorityQueue;

class Solution {
  public int countPaths(int n, int[][] roads) {
    int mod = 1_000_000_007;
    List<int[]>[] graph = new ArrayList[n];
    for (int i = 0; i < n; i++) {
      graph[i] = new ArrayList<>();
    }
    for (int[] r : roads) {
      graph[r[0]].add(new int[] {r[1], r[2]});
      graph[r[1]].add(new int[] {r[0], r[2]});
    }
    long[] dist = new long[n];
    int[] ways = new int[n];
    Arrays.fill(dist, Long.MAX_VALUE / 2);
    dist[0] = 0;
    ways[0] = 1;
    PriorityQueue<long[]> pq = new PriorityQueue<>((a, b) -> Long.compare(a[1], b[1]));
    pq.offer(new long[] {0, 0});
    while (!pq.isEmpty()) {
      long[] cur = pq.poll();
      int u = (int) cur[0];
      if (cur[1] > dist[u]) {
        continue;
      }
      for (int[] e : graph[u]) {
        int v = e[0];
        long nd = dist[u] + e[1];
        if (nd < dist[v]) {
          dist[v] = nd;
          ways[v] = ways[u];
          pq.offer(new long[] {v, nd});
        } else if (nd == dist[v]) {
          ways[v] = (ways[v] + ways[u]) % mod;
        }
      }
    }
    return ways[n - 1];
  }
}
```

Explanation:
- Dijkstra 求最短路，同时维护到每个点的最短路径条数。
- 找到更短距离时覆盖条数；找到相同距离时累加条数。

## 2007. Find Original Array From Doubled Array (Find Original Array From Doubled Array)
**Difficulty**: medium | **Key Concept**: hashmap, sorting

**Original Problem**:
Given an array formed by appending each original element and its double, recover the original array.  
中文翻译：给定由原数组每个元素及其两倍组成的数组，恢复原数组。

**Example**:
Input: changed = [1,3,4,2,6,8]  
Output: [1,3,4]

```java
import java.util.Arrays;
import java.util.HashMap;
import java.util.Map;

class Solution {
  public int[] findOriginalArray(int[] changed) {
    if (changed.length % 2 == 1) {
      return new int[0];
    }
    Arrays.sort(changed);
    Map<Integer, Integer> count = new HashMap<>();
    for (int x : changed) {
      count.put(x, count.getOrDefault(x, 0) + 1);
    }
    int[] ans = new int[changed.length / 2];
    int idx = 0;
    for (int x : changed) {
      if (count.get(x) == 0) {
        continue;
      }
      if (count.getOrDefault(2 * x, 0) == 0) {
        return new int[0];
      }
      ans[idx++] = x;
      count.put(x, count.get(x) - 1);
      count.put(2 * x, count.get(2 * x) - 1);
    }
    return ans;
  }
}
```

Explanation:
- 排序后从小到大为每个原数匹配它的两倍。
- 若某个数没有可用两倍数，则无法恢复。

## 2009. Minimum Number of Operations to Make Array Continuous (Minimum Number of Operations to Make Array Continuous)
**Difficulty**: hard | **Key Concept**: sliding window, sorting

**Original Problem**:
Return the minimum replacements needed to make an array contain n unique consecutive values.  
中文翻译：返回最少替换次数，使数组包含 n 个互不相同的连续值。

**Example**:
Input: nums = [4,2,5,3]  
Output: 0

```java
import java.util.Arrays;

class Solution {
  public int minOperations(int[] nums) {
    int n = nums.length;
    Arrays.sort(nums);
    int m = 0;
    for (int x : nums) {
      if (m == 0 || nums[m - 1] != x) {
        nums[m++] = x;
      }
    }
    int keep = 0;
    int r = 0;
    for (int l = 0; l < m; l++) {
      while (r < m && nums[r] < nums[l] + n) {
        r++;
      }
      keep = Math.max(keep, r - l);
    }
    return n - keep;
  }
}
```

Explanation:
- 排序去重后，找长度为 n 的数值窗口中最多能保留多少原有数字。
- 其余位置都需要替换，答案为 `n - keep`。

## 2017. Grid Game (Grid Game)
**Difficulty**: medium | **Key Concept**: prefix sum, greedy

**Original Problem**:
Two robots move through a 2-row grid. Return the minimum possible score of the second robot after the first chooses optimally.  
中文翻译：两个机器人经过 2 行网格，第一机器人最优选择路径后，返回第二机器人能得到的最小可能分数。

**Example**:
Input: grid = [[2,5,4],[1,5,1]]  
Output: 4

```java
class Solution {
  public long gridGame(int[][] grid) {
    long top = 0;
    for (int x : grid[0]) {
      top += x;
    }
    long bottom = 0;
    long ans = Long.MAX_VALUE;
    for (int c = 0; c < grid[0].length; c++) {
      top -= grid[0][c];
      ans = Math.min(ans, Math.max(top, bottom));
      bottom += grid[1][c];
    }
    return ans;
  }
}
```

Explanation:
- 第一机器人在某列向下转弯后，第二机器人只能选择右上剩余或左下剩余较大者。
- 枚举转弯列，最小化第二机器人可拿到的最大剩余分数。

## 2028. Find Missing Observations (Find Missing Observations)
**Difficulty**: medium | **Key Concept**: math

**Original Problem**:
Given observed dice rolls, mean, and missing count n, return any possible missing rolls.  
中文翻译：给定已知骰子点数、平均值和缺失次数 n，返回任意可行缺失点数。

**Example**:
Input: rolls = [3,2,4,3], mean = 4, n = 2  
Output: [6,6]

```java
class Solution {
  public int[] missingRolls(int[] rolls, int mean, int n) {
    int total = mean * (rolls.length + n);
    for (int x : rolls) {
      total -= x;
    }
    if (total < n || total > 6 * n) {
      return new int[0];
    }
    int[] ans = new int[n];
    for (int i = 0; i < n; i++) {
      ans[i] = total / n;
      if (i < total % n) {
        ans[i]++;
      }
    }
    return ans;
  }
}
```

Explanation:
- 先计算缺失 n 次的总点数，必须落在 `[n, 6n]`。
- 把总点数尽量平均分配到 n 个位置即可。

## 2040. Kth Smallest Product of Two Sorted Arrays (Kth Smallest Product of Two Sorted Arrays)
**Difficulty**: hard | **Key Concept**: binary search

**Original Problem**:
Given two sorted arrays, return the kth smallest product `nums1[i] * nums2[j]`.  
中文翻译：给定两个升序数组，返回所有乘积中的第 k 小值。

**Example**:
Input: nums1 = [2,5], nums2 = [3,4], k = 2  
Output: 8

```java
class Solution {
  public long kthSmallestProduct(int[] nums1, int[] nums2, long k) {
    long l = -10_000_000_000L;
    long r = 10_000_000_000L;
    while (l < r) {
      long m = l + (r - l) / 2;
      if (count(nums1, nums2, m) >= k) {
        r = m;
      } else {
        l = m + 1;
      }
    }
    return l;
  }

  private long count(int[] a, int[] b, long limit) {
    long ans = 0;
    for (int x : a) {
      int l = 0;
      int r = b.length;
      while (l < r) {
        int m = l + (r - l) / 2;
        long prod = (long) x * b[m];
        if ((x >= 0 && prod <= limit) || (x < 0 && prod > limit)) {
          l = m + 1;
        } else {
          r = m;
        }
      }
      ans += x >= 0 ? l : b.length - l;
    }
    return ans;
  }
}
```

Explanation:
- 对乘积值二分，统计小于等于 mid 的乘积数量。
- 对 nums1 中每个数，在 nums2 中二分可配数量，注意负数时方向相反。

## 2044. Count Number of Maximum Bitwise-OR Subsets (Count Number of Maximum Bitwise-OR Subsets)
**Difficulty**: medium | **Key Concept**: backtracking, bit manipulation

**Original Problem**:
Count subsets whose bitwise OR equals the maximum possible OR of all numbers.  
中文翻译：统计按位或等于所有数字最大可能或值的子集数量。

**Example**:
Input: nums = [3,1]  
Output: 2

```java
class Solution {
  public int countMaxOrSubsets(int[] nums) {
    int target = 0;
    for (int x : nums) {
      target |= x;
    }
    return dfs(nums, 0, 0, target);
  }

  private int dfs(int[] nums, int i, int or, int target) {
    if (i == nums.length) {
      return or == target ? 1 : 0;
    }
    return dfs(nums, i + 1, or, target) + dfs(nums, i + 1, or | nums[i], target);
  }
}
```

Explanation:
- 最大可能 OR 就是所有数字按位或。
- 回溯枚举每个数字选或不选，结束时判断当前 OR 是否等于目标。

## 2048. Next Greater Numerically Balanced Number (Next Greater Numerically Balanced Number)
**Difficulty**: medium | **Key Concept**: brute force, counting

**Original Problem**:
Return the smallest numerically balanced number strictly greater than n, where each digit appears exactly its digit value times.  
中文翻译：返回严格大于 n 的最小数值平衡数，要求每个出现的数字次数等于该数字本身。

**Example**:
Input: n = 1  
Output: 22

```java
class Solution {
  public int nextBeautifulNumber(int n) {
    while (true) {
      n++;
      if (beautiful(n)) {
        return n;
      }
    }
  }

  private boolean beautiful(int x) {
    int[] count = new int[10];
    while (x > 0) {
      count[x % 10]++;
      x /= 10;
    }
    for (int d = 0; d < 10; d++) {
      if (count[d] != 0 && count[d] != d) {
        return false;
      }
    }
    return true;
  }
}
```

Explanation:
- 按顺序枚举大于 n 的整数并检查，题目范围内可接受。
- 检查时每个出现过的数字 d 必须出现恰好 d 次。

## 2058. Find the Minimum and Maximum Number of Nodes Between Critical Points (Find the Minimum and Maximum Number of Nodes Between Critical Points)
**Difficulty**: medium | **Key Concept**: linked list, one pass

**Original Problem**:
Given the head of a linked list, return the minimum and maximum distance between any two critical points, or `[-1, -1]` if fewer than two exist.
中文翻译：给定链表头，找任意两个临界点之间的最小和最大距离；若少于两个临界点，返回 `[-1, -1]`。

**Example**:
Input: head = [3,1]
Output: [-1,-1]

```java
class Solution {
  public int[] nodesBetweenCriticalPoints(ListNode head) {
    int first = -1, prev = -1, min = Integer.MAX_VALUE, idx = 1;
    ListNode a = head, b = head.next;
    while (b != null && b.next != null) {
      if ((b.val > a.val && b.val > b.next.val) || (b.val < a.val && b.val < b.next.val)) {
        if (first == -1) first = idx;
        if (prev != -1) min = Math.min(min, idx - prev);
        prev = idx;
      }
      a = b;
      b = b.next;
      idx++;
    }
    if (min == Integer.MAX_VALUE) return new int[] {-1, -1};
    return new int[] {min, prev - first};
  }
}
```

Explanation:
- 一次遍历检查当前节点是否比左右都大或都小。
- 记录第一个、上一个临界点位置，即可更新最小和最大距离。

## 2064. Minimized Maximum of Products Distributed to Any Store (Minimized Maximum of Products Distributed to Any Store)
**Difficulty**: medium | **Key Concept**: binary search

**Original Problem**:
Given `n` stores and quantities of product types, minimize the maximum number of products assigned to any store.
中文翻译：给定商店数和每类商品数量，最小化任一商店分到的最大商品数。

**Example**:
Input: n = 6, quantities = [11,6]
Output: 3

```java
class Solution {
  public int minimizedMaximum(int n, int[] quantities) {
    int left = 1, right = 0;
    for (int q : quantities) right = Math.max(right, q);
    while (left < right) {
      int mid = left + (right - left) / 2;
      long need = 0;
      for (int q : quantities) need += (q + mid - 1) / mid;
      if (need <= n) right = mid;
      else left = mid + 1;
    }
    return left;
  }
}
```

Explanation:
- 二分每家店最多能放多少件商品。
- 对每类商品计算需要多少家店，若总数不超过 n，则该上限可行。

## 2074. Reverse Nodes in Even Length Groups (Reverse Nodes in Even Length Groups)
**Difficulty**: medium | **Key Concept**: linked list

**Original Problem**:
The linked list is split into groups of increasing length `1,2,3,...`; reverse every group with even actual length.
中文翻译：按长度 `1,2,3,...` 分组链表，实际长度为偶数的组需要反转。

**Example**:
Input: head = [5,2,6,3,9,1,7,3,8,4]
Output: [5,6,2,3,9,1,4,8,3,7]

```java
class Solution {
  public ListNode reverseEvenLengthGroups(ListNode head) {
    ListNode dummy = new ListNode(0, head), prev = dummy;
    int size = 1;
    while (prev.next != null) {
      ListNode node = prev.next;
      int count = 0;
      while (count < size && node != null) {
        node = node.next;
        count++;
      }
      if (count % 2 == 0) {
        ListNode cur = prev.next, next = cur.next;
        for (int i = 1; i < count; i++) {
          cur.next = next.next;
          next.next = prev.next;
          prev.next = next;
          next = cur.next;
        }
        prev = cur;
      } else {
        for (int i = 0; i < count; i++) prev = prev.next;
      }
      size++;
    }
    return dummy.next;
  }
}
```

Explanation:
- 每组先数出实际长度，再决定是否原地反转。
- 偶数组用头插法反转，奇数组只移动 `prev`。

## 2081. Sum of k-Mirror Numbers (Sum of k-Mirror Numbers)
**Difficulty**: hard | **Key Concept**: palindrome, enumeration

**Original Problem**:
A k-mirror number is positive and palindromic in both base 10 and base k. Return the sum of the smallest `n` k-mirror numbers.
中文翻译：k 镜像数在十进制和 k 进制下都是回文，返回最小的 n 个 k 镜像数之和。

**Example**:
Input: k = 2, n = 5
Output: 25

```java
class Solution {
  public long kMirror(int k, int n) {
    long ans = 0;
    for (int len = 1; n > 0; len++) {
      int half = (len + 1) / 2;
      long start = len == 1 ? 1 : pow10(half - 1);
      long end = pow10(half);
      for (long x = start; x < end && n > 0; x++) {
        long v = build(x, len % 2 == 1);
        if (isBasePalindrome(v, k)) {
          ans += v;
          n--;
        }
      }
    }
    return ans;
  }

  private long build(long x, boolean odd) {
    long res = x;
    if (odd) x /= 10;
    while (x > 0) {
      res = res * 10 + x % 10;
      x /= 10;
    }
    return res;
  }

  private boolean isBasePalindrome(long v, int k) {
    long rev = 0, t = v;
    while (t > 0) {
      rev = rev * k + t % k;
      t /= k;
    }
    return rev == v;
  }

  private long pow10(int e) {
    long res = 1;
    while (e-- > 0) res *= 10;
    return res;
  }
}
```

Explanation:
- 按十进制长度生成回文数，天然从小到大。
- 对每个候选检查其 k 进制表示是否也是回文。

## 2099. Find Subsequence of Length K With the Largest Sum (Find Subsequence of Length K With the Largest Sum)
**Difficulty**: easy | **Key Concept**: sorting, subsequence

**Original Problem**:
Return a subsequence of length `k` with the largest possible sum, preserving original order.
中文翻译：返回长度为 k 且和最大的子序列，结果必须保持原数组顺序。

**Example**:
Input: nums = [2,1,3,3], k = 2
Output: [3,3]

```java
class Solution {
  public int[] maxSubsequence(int[] nums, int k) {
    int n = nums.length;
    int[][] arr = new int[n][2];
    for (int i = 0; i < n; i++) arr[i] = new int[] {nums[i], i};
    Arrays.sort(arr, (a, b) -> b[0] - a[0]);
    Arrays.sort(arr, 0, k, (a, b) -> a[1] - b[1]);
    int[] ans = new int[k];
    for (int i = 0; i < k; i++) ans[i] = arr[i][0];
    return ans;
  }
}
```

Explanation:
- 先按值选出最大的 k 个元素。

## 2104. Sum of Subarray Ranges (Sum of Subarray Ranges)
**Difficulty**: medium | **Key Concept**: monotonic stack

**Original Problem**:
The range of a subarray is max minus min. Return the sum of ranges over all subarrays.
中文翻译：子数组范围等于最大值减最小值，返回所有子数组范围之和。

**Example**:
Input: nums = [1,2,3]
Output: 4

```java
class Solution {
  public long subArrayRanges(int[] nums) {
    return sum(nums, true) - sum(nums, false);
  }

  private long sum(int[] nums, boolean max) {
    int n = nums.length;
    long ans = 0;
    Deque<Integer> st = new ArrayDeque<>();
    for (int i = 0; i <= n; i++) {
      while (!st.isEmpty() && (i == n || (max ? nums[st.peek()] < nums[i] : nums[st.peek()] > nums[i]))) {
        int mid = st.pop();
        int left = st.isEmpty() ? -1 : st.peek();
        ans += (long) nums[mid] * (mid - left) * (i - mid);
      }
      st.push(i);
    }
    return ans;
  }
}
```

Explanation:
- 每个元素分别计算作为子数组最大值、最小值的贡献。
- 单调栈找到左右边界，答案为最大贡献和减最小贡献和。

class Solution {

## 2115. Find All Possible Recipes from Given Supplies (Find All Possible Recipes from Given Supplies)
**Difficulty**: medium | **Key Concept**: graph, topological sort

**Original Problem**:
Given recipes, ingredients, and supplies, return all recipes that can be made.
中文翻译：给定菜谱、原料列表和已有物资，返回所有能够制作的菜谱。

**Example**:
Input: recipes = ["bread"], ingredients = [["yeast","flour"]], supplies = ["yeast","flour","corn"]
Output: ["bread"]

```java
class Solution {
  public List<String> findAllRecipes(String[] recipes, List<List<String>> ingredients, String[] supplies) {
    Map<String, List<String>> graph = new HashMap<>();
    Map<String, Integer> indeg = new HashMap<>();
    for (String r : recipes) indeg.put(r, 0);
    for (int i = 0; i < recipes.length; i++) {
      for (String in : ingredients.get(i)) {
        graph.computeIfAbsent(in, x -> new ArrayList<>()).add(recipes[i]);
        indeg.put(recipes[i], indeg.get(recipes[i]) + 1);
      }
    }
    Queue<String> q = new ArrayDeque<>(Arrays.asList(supplies));
    List<String> ans = new ArrayList<>();
    while (!q.isEmpty()) {
      String cur = q.poll();
      for (String next : graph.getOrDefault(cur, Collections.emptyList())) {
        indeg.put(next, indeg.get(next) - 1);
        if (indeg.get(next) == 0) {
          ans.add(next);
          q.offer(next);
        }
      }
    }
    return ans;
  }
}
```

Explanation:
- 把原料指向依赖它的菜谱，入度表示还缺多少原料。
- 已有物资和新做出的菜谱都作为队列节点继续拓扑扩展。

## 2116. Check if a Parentheses String Can Be Valid (Check if a Parentheses String Can Be Valid)
**Difficulty**: medium | **Key Concept**: greedy, parentheses

**Original Problem**:
Given a parentheses string and a lock string, decide if unlocked positions can be changed to make it valid.
中文翻译：给定括号串和锁定标记，判断能否修改未锁定位置使括号串合法。

**Example**:
Input: s = "))()))", locked = "010100"
Output: true

```java
class Solution {
  public boolean canBeValid(String s, String locked) {
    int n = s.length();
    if (n % 2 == 1) return false;
    int bal = 0;
    for (int i = 0; i < n; i++) {
      if (locked.charAt(i) == '0' || s.charAt(i) == '(') bal++;
      else bal--;
      if (bal < 0) return false;
    }
    bal = 0;
    for (int i = n - 1; i >= 0; i--) {
      if (locked.charAt(i) == '0' || s.charAt(i) == ')') bal++;
      else bal--;
      if (bal < 0) return false;
    }
    return true;
  }
}
```

Explanation:
- 长度为奇数一定不合法。
- 从左到右保证前缀可有足够左括号，从右到左保证后缀可有足够右括号。

## 2134. Minimum Swaps to Group All 1's Together II (Minimum Swaps to Group All 1's Together II)
**Difficulty**: medium | **Key Concept**: sliding window, circular array

**Original Problem**:
Given a circular binary array, return the minimum swaps needed to group all `1`s together.
中文翻译：给定环形二进制数组，返回把所有 `1` 聚在一起所需的最少交换次数。

**Example**:
Input: nums = [0,1,0,1,1,0,0]
Output: 1

```java
class Solution {
  public int minSwaps(int[] nums) {
    int ones = 0, n = nums.length;
    for (int x : nums) ones += x;
    int cur = 0, best = 0;
    for (int i = 0; i < n + ones; i++) {
      cur += nums[i % n];
      if (i >= ones) cur -= nums[(i - ones) % n];
      best = Math.max(best, cur);
    }
    return ones - best;
  }
}
```

Explanation:
- 目标窗口长度等于 `1` 的总数，窗口内已有越多 `1` 越好。
- 环形数组用取模滑动，答案是窗口长度减最多 `1` 数。

## 2140. Solving Questions With Brainpower (Solving Questions With Brainpower)
**Difficulty**: medium | **Key Concept**: dynamic programming

**Original Problem**:
Each question gives points and brainpower skip count. Maximize points by solving or skipping questions.
中文翻译：每题有分数和解完后必须跳过的题数，求能获得的最大分数。

**Example**:
Input: questions = [[3,2],[4,3],[4,4],[2,5]]
Output: 5

```java
class Solution {
  public long mostPoints(int[][] questions) {
    int n = questions.length;
    long[] dp = new long[n + 1];
    for (int i = n - 1; i >= 0; i--) {
      int next = Math.min(n, i + questions[i][1] + 1);
      dp[i] = Math.max(dp[i + 1], questions[i][0] + dp[next]);
    }
    return dp[0];
  }
}
```

Explanation:
- `dp[i]` 表示从第 i 题开始最多得分。
- 每题只有跳过或解决两种选择，倒序转移即可。

## 2141. Maximum Running Time of N Computers (Maximum Running Time of N Computers)
**Difficulty**: hard | **Key Concept**: binary search, greedy

**Original Problem**:
Given `n` computers and batteries, return the maximum minutes all computers can run simultaneously.
中文翻译：给定 n 台电脑和若干电池，求所有电脑同时运行的最长分钟数。

**Example**:
Input: n = 2, batteries = [3,3,3]
Output: 4

```java
class Solution {
  public long maxRunTime(int n, int[] batteries) {
    long sum = 0;
    for (int b : batteries) sum += b;
    long left = 0, right = sum / n;
    while (left < right) {
      long mid = left + (right - left + 1) / 2;
      long have = 0;
      for (int b : batteries) have += Math.min(b, mid);
      if (have >= mid * n) left = mid;
      else right = mid - 1;
    }
    return left;
  }
}
```

Explanation:
- 二分所有电脑能共同运行的时间。
- 每块电池最多贡献 `mid` 分钟，总贡献达到 `mid * n` 即可行。

## 2145. Count the Hidden Sequences (Count the Hidden Sequences)
**Difficulty**: medium | **Key Concept**: prefix sum

**Original Problem**:
Given differences and bounds, count how many possible hidden arrays can produce those differences.
中文翻译：给定相邻差值和上下界，统计有多少隐藏数组能产生这些差值。

**Example**:
Input: differences = [1,-3,4], lower = 1, upper = 6
Output: 2

```java
class Solution {
  public int numberOfArrays(int[] differences, int lower, int upper) {
    long sum = 0, min = 0, max = 0;
    for (int d : differences) {
      sum += d;
      min = Math.min(min, sum);
      max = Math.max(max, sum);
    }
    long range = upper - lower - (max - min) + 1;
    return (int) Math.max(0, range);
  }
}
```

Explanation:
- 隐藏数组等于起点加前缀差值。
- 所有前缀的最小最大跨度必须能放进 `[lower, upper]`。

## 2161. Partition Array According to Given Pivot (Partition Array According to Given Pivot)

Rearrange the array as values less than pivot, equal to pivot, and greater than pivot, preserving relative order within each group.

**Example**:

Output: [9,5,3,10,10,12,14]

```java
class Solution {
  public int[] pivotArray(int[] nums, int pivot) {
    int[] ans = new int[nums.length];
    int idx = 0;
    for (int x : nums) if (x < pivot) ans[idx++] = x;
    for (int x : nums) if (x == pivot) ans[idx++] = x;
    for (int x : nums) if (x > pivot) ans[idx++] = x;
    return ans;
  }
}
```

Explanation:
- 三次稳定扫描即可保持每组相对顺序。
